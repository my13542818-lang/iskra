<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .product-container { max-width: 1200px; margin: 30px auto; padding: 0 24px; }
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; background: white; border-radius: 32px; border: 1px solid #f0e6ff; overflow: hidden; }
        .product-gallery { background: #f8f4ff; padding: 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }
        .main-image { width: 100%; max-height: 400px; object-fit: contain; border-radius: 20px; }
        .thumbnails { display: flex; gap: 12px; overflow-x: auto; width: 100%; justify-content: center; }
        .thumbnail { width: 80px; height: 80px; object-fit: cover; border-radius: 12px; cursor: pointer; border: 2px solid transparent; }
        .thumbnail.active { border-color: #e84393; }
        .product-info { padding: 40px; }
        .product-title { font-size: 28px; font-weight: 800; color: #2d1b4e; margin-bottom: 16px; }
        .product-price { font-size: 36px; font-weight: 800; color: #e84393; margin: 20px 0; }
        .specs-grid { background: #f8f4ff; border-radius: 20px; padding: 20px; margin: 20px 0; }
        .spec-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f0e6ff; }
        .spec-label { font-weight: 600; color: #9b59b6; }
        .action-buttons { display: flex; gap: 16px; margin-top: 24px; }
        .action-buttons .btn { flex: 1; text-align: center; padding: 14px; }
        @media (max-width: 768px) { .product-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="product-container">
    <div id="productContent" class="loading">Загрузка...</div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    let listing = null;
    let currentImageIndex = 0;
    const urlParams = new URLSearchParams(window.location.search);
    const listingId = urlParams.get('id');
    
    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        if (user) {
            document.getElementById('userActions').innerHTML = `
                <div class="user-info" id="userMenuBtn">
                    <img src="${user.photoURL || 'https://via.placeholder.com/35'}" class="user-avatar">
                    <span>${user.displayName?.split(' ')[0] || 'User'}</span>
                </div>
                <button class="btn" id="logoutBtn">Выйти</button>
            `;
            document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        } else {
            document.getElementById('userActions').innerHTML = '<button class="btn" id="loginBtn">Войти</button>';
            document.getElementById('loginBtn').onclick = () => window.location.href = "login.html";
        }
        await loadProduct();
    });
    
    async function loadProduct() {
        const doc = await db.collection("listings").doc(listingId).get();
        if (!doc.exists) {
            document.getElementById('productContent').innerHTML = '<div class="empty-state"><h3>❌ Товар не найден</h3></div>';
            return;
        }
        listing = { id: doc.id, ...doc.data() };
        await db.collection("listings").doc(listingId).update({ views: (listing.views || 0) + 1 });
        renderProduct();
    }
    
    function renderProduct() {
        const mediaFiles = listing.mediaFiles || [];
        const mainImage = mediaFiles.length > 0 ? mediaFiles[0].url : (listing.image && listing.image.startsWith('http') ? listing.image : null);
        
        const specsHtml = listing.specs ? Object.entries(listing.specs).map(([key, val]) => `
            <div class="spec-item"><span class="spec-label">${key}</span><span class="spec-value">${escapeHtml(val)}</span></div>
        `).join('') : '';
        
        document.getElementById('productContent').innerHTML = `
            <div class="product-grid">
                <div class="product-gallery">
                    ${mainImage ? `<img src="${mainImage}" class="main-image" id="mainImage">` : `<div class="main-image" style="display:flex;align-items:center;justify-content:center;font-size:100px;">${listing.image || '📦'}</div>`}
                    ${mediaFiles.length > 1 ? `
                        <div class="thumbnails">
                            ${mediaFiles.map((m, i) => `
                                <img src="${m.url}" class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeImage(${i})">
                            `).join('')}
                        </div>
                    ` : ''}
                </div>
                <div class="product-info">
                    <h1 class="product-title">${escapeHtml(listing.title)}</h1>
                    <div class="product-price">${Number(listing.price).toLocaleString()} ₽</div>
                    <div class="product-meta" style="display:flex; gap:16px; color:#666; font-size:14px;">
                        <span>📍 ${listing.location || 'Не указан'}</span>
                        <span>📦 ${listing.condition === 'new' ? 'Новое' : 'Б/У'}</span>
                        <span>👁️ ${listing.views || 0} просмотров</span>
                    </div>
                    ${specsHtml ? `<div class="specs-grid">${specsHtml}</div>` : ''}
                    <div class="product-description"><strong>Описание:</strong><br>${escapeHtml(listing.description) || 'Описание отсутствует'}</div>
                    <div class="seller-info" style="background:#f8f4ff; border-radius:20px; padding:16px; margin:20px 0;">
                        <div style="font-weight:600;">👤 ${escapeHtml(listing.sellerName || 'Продавец')}</div>
                        <div style="font-size:13px; color:#666;">⭐ Рейтинг: ${listing.sellerRating || 0}%</div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn btn-primary" id="cartBtn">🛒 В корзину</button>
                        <button class="btn" id="favoriteBtn">❤️ В избранное</button>
                        <button class="btn" id="chatBtn">💬 Написать</button>
                    </div>
                </div>
            </div>
        `;
        
        window.changeImage = (index) => {
            if (!mediaFiles[index]) return;
            currentImageIndex = index;
            const mainImg = document.getElementById('mainImage');
            if (mainImg) mainImg.src = mediaFiles[index].url;
            document.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });
        };
        
        document.getElementById('cartBtn')?.addEventListener('click', addToCart);
        document.getElementById('favoriteBtn')?.addEventListener('click', addToFavorites);
        document.getElementById('chatBtn')?.addEventListener('click', () => {
            if (!currentUser) { alert('Войдите в аккаунт'); window.location.href = "login.html"; return; }
            window.location.href = `chat.html?chatId=${listingId}`;
        });
    }
    
    async function addToCart() {
        if (!currentUser) { alert('Войдите в аккаунт'); window.location.href = "login.html"; return; }
        let cart = JSON.parse(localStorage.getItem('cart') || '[]');
        if (cart.some(item => item.id === listingId)) { alert('Товар уже в корзине'); return; }
        cart.push({ id: listingId });
        localStorage.setItem('cart', JSON.stringify(cart));
        alert('✅ Добавлено в корзину');
    }
    
    async function addToFavorites() {
        if (!currentUser) { alert('Войдите в аккаунт'); window.location.href = "login.html"; return; }
        const snapshot = await db.collection("favorites").where("userId", "==", currentUser.uid).where("listingId", "==", listingId).get();
        if (!snapshot.empty) {
            snapshot.forEach(doc => doc.ref.delete());
            alert('❌ Удалено из избранного');
        } else {
            await db.collection("favorites").add({ userId: currentUser.uid, listingId: listingId, addedAt: new Date().toISOString() });
            alert('❤️ Добавлено в избранное');
        }
    }
    
    function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m])); }
</script>
</body>
</html>
