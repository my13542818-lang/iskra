<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара — Куки</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a0c; color: white; }
        .header { background: #0b0b0e; border-bottom: 1px solid #2a1a2c; padding: 12px 20px; }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .btn { padding: 8px 16px; border-radius: 40px; border: 1px solid #441d46; background: #111014; color: white; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
        .btn-primary { background: #ac2f3a; border-color: #d44545; color: white; }
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .product-card { background: #0f0e13; border-radius: 28px; border: 1px solid #2d1e32; overflow: hidden; }
        .product-images { background: #1a1620; min-height: 400px; display: flex; align-items: center; justify-content: center; font-size: 100px; }
        .product-images img { width: 100%; height: 400px; object-fit: contain; }
        .product-info { padding: 24px; }
        .product-title { font-size: 28px; font-weight: 700; margin-bottom: 12px; color: #ffddd3; }
        .product-price { font-size: 36px; font-weight: 800; color: #ff6b4a; margin: 16px 0; }
        .product-meta { display: flex; gap: 24px; font-size: 14px; color: #a492b0; margin-bottom: 16px; }
        .product-description { margin: 20px 0; padding-top: 20px; border-top: 1px solid #2d1e32; }
        .product-description h3 { margin-bottom: 12px; }
        .seller-info { background: #1a1620; border-radius: 20px; padding: 20px; margin-top: 20px; }
        .reviews-section { margin-top: 30px; }
        .review-card { background: #1a1620; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .empty-state { text-align: center; padding: 60px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="main-container">
    <div id="productContainer" class="product-card">
        <div class="empty-state">Загрузка...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const urlParams = new URLSearchParams(window.location.search);
    const listingId = urlParams.get('id');
    
    let currentUser = null;
    let listing = null;
    
    async function getListingById(id) {
        const doc = await db.collection("listings").doc(id).get();
        return doc.exists ? { id: doc.id, ...doc.data() } : null;
    }
    
    async function addToFavorites(listingId) {
        const user = auth.currentUser;
        if (!user) return false;
        await db.collection("favorites").add({
            userId: user.uid,
            listingId: listingId,
            addedAt: new Date().toISOString()
        });
        return true;
    }
    
    async function removeFromFavorites(listingId) {
        const user = auth.currentUser;
        if (!user) return false;
        const snapshot = await db.collection("favorites")
            .where("userId", "==", user.uid)
            .where("listingId", "==", listingId).get();
        snapshot.forEach(async (doc) => { await doc.ref.delete(); });
        return true;
    }
    
    async function getFavorites() {
        const user = auth.currentUser;
        if (!user) return [];
        const snapshot = await db.collection("favorites").where("userId", "==", user.uid).get();
        return snapshot.docs.map(doc => doc.data().listingId);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    auth.onAuthStateChanged(async (user) => {
        currentUser = user;
        
        if (user) {
            document.getElementById('userActions').innerHTML = `
                <div class="user-info">
                    <img src="${user.photoURL || ''}" class="user-avatar">
                    <span>${user.displayName?.split(' ')[0] || 'User'}</span>
                </div>
                <a href="post-ad.html" class="btn">➕</a>
                <a href="profile.html" class="btn">👤</a>
                <button class="btn" id="logoutBtn">🚪</button>
            `;
            document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = 'index.html');
        } else {
            document.getElementById('userActions').innerHTML = '<button class="btn" id="loginBtn">Войти</button>';
            document.getElementById('loginBtn')?.addEventListener('click', () => window.location.href = 'index.html');
        }
        
        await loadProduct();
    });
    
    async function loadProduct() {
        listing = await getListingById(listingId);
        if (!listing) {
            document.getElementById('productContainer').innerHTML = '<div class="empty-state">❌ Товар не найден</div>';
            return;
        }
        
        let isFavorite = false;
        if (currentUser) {
            const favorites = await getFavorites();
            isFavorite = favorites.includes(listingId);
        }
        
        document.getElementById('productContainer').innerHTML = `
            <div class="product-images">
                ${listing.image && listing.image.startsWith('http') ? `<img src="${listing.image}" alt="${escapeHtml(listing.title)}">` : (listing.image || '📦')}
            </div>
            <div class="product-info">
                <div class="product-title">${escapeHtml(listing.title)}</div>
                <div class="product-price">${Number(listing.price).toLocaleString()} ₽</div>
                <div class="product-meta">
                    <span>📍 ${listing.location || 'Не указан'}</span>
                    <span>📦 ${listing.condition === 'new' ? 'Новое' : 'Б/У'}</span>
                    <span>⭐ ${listing.sellerRating || 0}%</span>
                </div>
                <div class="product-description">
                    <h3>📝 Описание</h3>
                    <p>${escapeHtml(listing.description) || 'Описание отсутствует'}</p>
                </div>
                <div class="seller-info">
                    <h3>👤 Продавец</h3>
                    <p>${escapeHtml(listing.sellerName) || 'Продавец'}</p>
                    <p class="text-muted">${listing.createdAt ? new Date(listing.createdAt).toLocaleDateString() : ''}</p>
                </div>
                <div class="card-actions" style="display: flex; gap: 12px; margin-top: 20px;">
                    <button class="btn-primary" id="chatBtn">💬 Написать продавцу</button>
                    <button class="btn" id="favBtn">❤️ ${isFavorite ? 'В избранном' : 'В избранное'}</button>
                </div>
            </div>
        `;
        
        document.getElementById('chatBtn')?.addEventListener('click', () => {
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            window.location.href = `chat.html?sellerId=${listing.sellerId}&listingId=${listing.id}&title=${encodeURIComponent(listing.title)}`;
        });
        
        document.getElementById('favBtn')?.addEventListener('click', async () => {
            if (!currentUser) {
                window.location.href = 'index.html';
                return;
            }
            if (isFavorite) {
                await removeFromFavorites(listingId);
                document.getElementById('favBtn').innerHTML = '❤️ В избранное';
            } else {
                await addToFavorites(listingId);
                document.getElementById('favBtn').innerHTML = '❤️ В избранном';
            }
            isFavorite = !isFavorite;
        });
    }
</script>
</body>
</html>
