<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара — Куки</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <div class="user-actions" id="userActions"></div>
    </div>
</div>

<div class="main-container" id="productContainer">
    <div class="empty-state">Загрузка...</div>
</div>

<script type="module">
    import { auth, db, onAuthStateChanged, signOutUser, getListingById, addToFavorites, removeFromFavorites, getFavorites, addReview, getReviews, reportListing } from './firebase-config.js';
    import { doc, updateDoc } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";
    
    const urlParams = new URLSearchParams(window.location.search);
    const listingId = urlParams.get('id');
    let listing = null;
    let isFavorite = false;
    
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            document.getElementById('userActions').innerHTML = `
                <div class="user-info">
                    <img src="${user.photoURL || 'https://via.placeholder.com/40'}" class="user-avatar">
                    <span>${user.displayName}</span>
                </div>
                <a href="index.html" class="btn">🏠 Главная</a>
                <a href="post-ad.html" class="btn btn-primary">➕ Подать</a>
                <button class="btn" id="logoutBtn">Выйти</button>
            `;
            document.getElementById('logoutBtn')?.addEventListener('click', signOutUser);
        } else {
            document.getElementById('userActions').innerHTML = `<button class="btn" id="loginBtn">Войти</button>`;
            document.getElementById('loginBtn')?.addEventListener('click', () => window.location.href = 'index.html');
        }
        
        await loadProduct();
    });
    
    async function loadProduct() {
        listing = await getListingById(listingId);
        if (!listing) {
            document.getElementById('productContainer').innerHTML = '<div class="empty-state"><h3>❌ Товар не найден</h3></div>';
            return;
        }
        
        if (auth.currentUser) {
            const favorites = await getFavorites();
            isFavorite = favorites.some(f => f.id === listingId);
        }
        
        const reviews = await getReviews(listing.sellerId);
        
        document.getElementById('productContainer').innerHTML = `
            <div class="listing-card" style="flex-direction: column; gap: 24px;">
                <div style="display: flex; gap: 24px; flex-wrap: wrap;">
                    <div class="listing-img" style="width: 200px; height: 200px; font-size: 80px;">${listing.image || '📦'}</div>
                    <div style="flex: 1;">
                        <h1 class="listing-title" style="font-size: 28px;">${listing.title}</h1>
                        <div class="listing-price" style="font-size: 36px;">${listing.price.toLocaleString()} ₽</div>
                        <div class="listing-meta" style="margin: 16px 0;">
                            <span>📍 ${listing.location || 'Не указан'}</span>
                            <span>📦 ${listing.condition === 'new' ? 'Новое' : 'Б/У'}</span>
                            <span>⭐ ${listing.sellerRating || 0}%</span>
                        </div>
                        <div class="seller-badge" style="margin-bottom: 16px;">👤 Продавец: ${listing.sellerName || listing.seller}</div>
                        <div class="card-actions">
                            ${auth.currentUser && auth.currentUser.uid !== listing.sellerId ? `<button class="btn-primary" id="chatBtn">💬 Написать продавцу</button>` : ''}
                            <button class="btn" id="favBtn">❤️ ${isFavorite ? 'В избранном' : 'В избранное'}</button>
                            <button class="btn" id="safeBtn">🛡️ Куки Доставка</button>
                        </div>
                    </div>
                </div>
                <div>
                    <h3>📝 Описание</h3>
                    <p style="margin-top: 12px; color: #a492b0;">${listing.description || 'Описание отсутствует'}</p>
                </div>
                <div>
                    <h3>⭐ Отзывы о продавце (${reviews.length})</h3>
                    <div id="reviewsList" style="margin-top: 12px;"></div>
                    ${auth.currentUser && auth.currentUser.uid !== listing.sellerId ? `
                        <div style="margin-top: 24px;">
                            <h4>Оставить отзыв</h4>
                            <select id="ratingSelect" style="padding: 10px; background: #121114; border: 1px solid #2f2332; border-radius: 20px; color: white;">
                                <option value="5">⭐⭐⭐⭐⭐</option>
                                <option value="4">⭐⭐⭐⭐</option>
                                <option value="3">⭐⭐⭐</option>
                                <option value="2">⭐⭐</option>
                                <option value="1">⭐</option>
                            </select>
                            <textarea id="reviewComment" rows="3" placeholder="Ваш отзыв..." style="width: 100%; margin-top: 12px; padding: 12px; background: #121114; border: 1px solid #2f2332; border-radius: 20px; color: white;"></textarea>
                            <button class="btn-primary" id="submitReviewBtn" style="margin-top: 12px;">Отправить отзыв</button>
                        </div>
                    ` : ''}
                </div>
            </div>
        `;
        
        // Отзывы
        const reviewsList = document.getElementById('reviewsList');
        if (reviews.length === 0) {
            reviewsList.innerHTML = '<p style="color: #a492b0;">Нет отзывов</p>';
        } else {
            reviewsList.innerHTML = reviews.map(r => `
                <div style="background: #1a1620; padding: 16px; border-radius: 20px; margin-bottom: 12px;">
                    <div><strong>${r.fromUserName}</strong> ${'⭐'.repeat(r.rating)}</div>
                    <div style="margin-top: 8px; color: #a492b0;">${r.comment}</div>
                    <div style="font-size: 12px; color: #666; margin-top: 8px;">${new Date(r.createdAt).toLocaleDateString()}</div>
                </div>
            `).join('');
        }
        
        // Обработчики
        document.getElementById('favBtn')?.addEventListener('click', async () => {
            if (!auth.currentUser) { window.location.href = 'index.html'; return; }
            if (isFavorite) {
                await removeFromFavorites(listingId);
            } else {
                await addToFavorites(listingId);
            }
            isFavorite = !isFavorite;
            document.getElementById('favBtn').textContent = isFavorite ? '❤️ В избранном' : '❤️ В избранное';
        });
        
        document.getElementById('chatBtn')?.addEventListener('click', () => {
            if (!auth.currentUser) { window.location.href = 'index.html'; return; }
            window.location.href = `chat.html?sellerId=${listing.sellerId}&listingId=${listing.id}&title=${encodeURIComponent(listing.title)}`;
        });
        
        document.getElementById('safeBtn')?.addEventListener('click', () => {
            alert('✅ Куки Доставка: деньги заморожены до получения. Возврат в ПВЗ в течение 14 дней.');
        });
        
        document.getElementById('submitReviewBtn')?.addEventListener('click', async () => {
            const rating = parseInt(document.getElementById('ratingSelect').value);
            const comment = document.getElementById('reviewComment').value;
            if (!comment) { alert('Напишите текст отзыва'); return; }
            await addReview(listing.sellerId, listingId, rating, comment);
            alert('Спасибо за отзыв!');
            await loadProduct();
        });
    }
</script>

</body>
</html>
