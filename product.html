<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .product-page { max-width: 1200px; margin: 30px auto; padding: 0 24px; }
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            overflow: hidden;
        }
        .product-gallery { padding: 30px; background: var(--bg-input); display: flex; flex-direction: column; gap: 16px; }
        .main-image-wrap {
            position: relative;
            border-radius: var(--radius-lg);
            overflow: hidden;
            background: var(--bg-dark);
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .main-image-wrap img { width: 100%; height: 100%; object-fit: contain; transition: transform 0.3s ease; }
        .main-image-wrap img:hover { transform: scale(1.05); }
        .main-image-wrap .placeholder { font-size: 80px; opacity: 0.5; }
        .main-image-wrap .badge-top {
            position: absolute;
            top: 16px;
            left: 16px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .thumbnail-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
        }
        .thumbnail {
            aspect-ratio: 1;
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            background: var(--bg-dark);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .thumbnail:hover { border-color: var(--border-light); transform: translateY(-2px); }
        .thumbnail.active { border-color: var(--secondary); box-shadow: 0 0 20px rgba(232, 67, 147, 0.3); }
        .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
        .thumbnail .thumb-placeholder { font-size: 30px; opacity: 0.3; }

        .product-info { padding: 30px 40px 30px 0; display: flex; flex-direction: column; gap: 16px; }
        .product-info .category-badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: var(--radius-full);
            background: rgba(155, 89, 182, 0.2);
            color: var(--primary-light);
            font-size: 12px;
            font-weight: 600;
            width: fit-content;
        }
        .product-info .title { font-size: 28px; font-weight: 700; line-height: 1.2; }
        .product-info .price { font-size: 32px; font-weight: 800; color: var(--secondary); }
        .product-info .meta-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 14px;
            color: var(--text-muted);
            padding: 12px 0;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .product-info .meta-row span { display: flex; align-items: center; gap: 6px; }
        .product-info .description { color: var(--text-secondary); line-height: 1.7; font-size: 15px; }

        .delivery-type-selector {
            display: flex;
            gap: 12px;
            margin: 8px 0;
            flex-wrap: wrap;
        }
        .delivery-type-selector .option {
            flex: 1;
            min-width: 140px;
            padding: 14px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            text-align: center;
            transition: var(--transition);
            background: var(--bg-input);
        }
        .delivery-type-selector .option:hover { border-color: var(--border-light); }
        .delivery-type-selector .option.active {
            border-color: var(--secondary);
            background: rgba(232, 67, 147, 0.1);
        }
        .delivery-type-selector .option .icon { font-size: 24px; display: block; }
        .delivery-type-selector .option .label { font-size: 13px; font-weight: 500; margin-top: 4px; }

        .delivery-info-box {
            background: var(--bg-input);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            font-size: 14px;
            color: var(--text-muted);
        }
        .delivery-info-box strong { color: var(--text-secondary); }

        .specs-block {
            background: var(--bg-input);
            border-radius: var(--radius);
            padding: 20px 24px;
            border: 1px solid var(--border-color);
        }
        .specs-block h4 { font-size: 15px; font-weight: 600; color: var(--text-secondary); margin-bottom: 12px; }
        .specs-block .spec-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px 20px; }
        .specs-block .spec-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 14px;
        }
        .specs-block .spec-item .label { color: var(--text-muted); }
        .specs-block .spec-item .value { color: var(--text-primary); font-weight: 500; }

        .seller-card {
            background: var(--bg-input);
            border-radius: var(--radius);
            padding: 16px 20px;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 16px;
        }
        .seller-card .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--secondary);
        }
        .seller-card .info { flex: 1; }
        .seller-card .info .name { font-weight: 600; font-size: 16px; }
        .seller-card .info .rating { font-size: 13px; color: #F1C40F; }
        .seller-card .info .stats { font-size: 12px; color: var(--text-muted); }

        .action-buttons { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 4px; }
        .action-buttons .btn { flex: 1; min-width: 120px; justify-content: center; padding: 14px 24px; font-size: 15px; }
        .action-buttons .btn-secondary { flex: 0.5; min-width: 60px; }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 600;
        }
        .badge-success { background: rgba(46, 204, 113, 0.2); color: #2ECC71; }
        .badge-danger { background: rgba(231, 76, 60, 0.2); color: #E74C3C; }
        .badge-warning { background: rgba(243, 156, 18, 0.2); color: #F39C12; }
        .badge-info { background: rgba(52, 152, 219, 0.2); color: #3498DB; }
        .badge-purple { background: rgba(155, 89, 182, 0.2); color: #9B59B6; }

        .notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: var(--radius);
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: var(--shadow-lg);
            z-index: 9999;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification-success { border-left: 4px solid #2ECC71; }
        .notification-error { border-left: 4px solid #E74C3C; }
        .notification-warning { border-left: 4px solid #F39C12; }
        .notification-info { border-left: 4px solid #3498DB; }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 20px;
            gap: 16px;
        }
        .loading-state .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border-color);
            border-top-color: var(--secondary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== SIMILAR PRODUCTS ===== */
        .similar-section {
            margin-top: 30px;
            padding: 20px 0;
            border-top: 1px solid var(--border-color);
        }
        .similar-section h3 {
            font-size: 18px;
            margin-bottom: 16px;
        }
        .similar-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
        }
        .similar-item {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }
        .similar-item:hover {
            transform: translateY(-4px);
            border-color: var(--secondary);
        }
        .similar-item .image {
            height: 150px;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            overflow: hidden;
        }
        .similar-item .image img { width: 100%; height: 100%; object-fit: cover; }
        .similar-item .info { padding: 12px; }
        .similar-item .info .title { font-weight: 600; font-size: 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .similar-item .info .price { color: var(--secondary); font-weight: 700; font-size: 16px; }

        /* ===== COMPARE BUTTON ===== */
        .compare-actions {
            display: flex;
            gap: 8px;
            margin-top: 4px;
        }
        .compare-actions .btn-sm {
            padding: 6px 14px;
            font-size: 12px;
        }

        @media (max-width: 992px) {
            .product-grid { grid-template-columns: 1fr; }
            .product-info { padding: 24px; }
            .specs-block .spec-grid { grid-template-columns: 1fr; }
        }
        @media (max-width: 600px) {
            .product-info .title { font-size: 22px; }
            .product-info .price { font-size: 26px; }
            .thumbnail-grid { grid-template-columns: repeat(auto-fill, minmax(60px, 1fr)); }
            .action-buttons .btn { min-width: 100%; }
            .action-buttons .btn-secondary { flex: 1; min-width: 100%; }
            .product-gallery { padding: 16px; }
            .delivery-type-selector .option { min-width: 100px; }
            .similar-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (max-width: 480px) {
            .similar-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">🍪 Куки</a>
            <div class="header-actions" id="headerActions">
                <div style="width:24px;height:24px;border:2px solid var(--border-color);border-top-color:var(--secondary);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
            </div>
        </div>
    </header>

    <!-- ===== PRODUCT PAGE ===== -->
    <div class="product-page">
        <div id="productContent">
            <div class="loading-state">
                <div class="spinner"></div>
                <p style="color:var(--text-muted);">Загрузка товара...</p>
            </div>
        </div>
        <div id="similarProducts"></div>
    </div>

    <script>
        // ========================================
        // FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========================================
        // STATE
        // ========================================
        let currentUser = null;
        let userData = {};
        let listing = null;
        let listingId = null;
        let isFavorite = false;
        let selectedDelivery = 'delivery';

        // ========================================
        // DOM
        // ========================================
        const headerActions = document.getElementById('headerActions');
        const productContent = document.getElementById('productContent');
        const similarContainer = document.getElementById('similarProducts');

        // ========================================
        // AUTH
        // ========================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;

            const doc = await db.collection("users").doc(user.uid).get();
            userData = doc.data() || {};

            setupHeader();
            await loadProduct();
            if (user && listingId) await checkFavorite();
        });

        // ========================================
        // HEADER
        // ========================================
        function setupHeader() {
            if (currentUser) {
                headerActions.innerHTML = `
                    <div class="balance-badge" onclick="window.location.href='wallet.html'">💰 ${(userData.balance || 0).toLocaleString()} ₽</div>
                    <a href="cart.html" class="btn btn-secondary btn-sm">🛒</a>
                    <a href="history.html" class="btn btn-secondary btn-sm">👁️</a>
                    <div class="header-user" onclick="window.location.href='profile/index.html'">
                        <img src="${userData.photoURL || 'https://ui-avatars.com/api/?name=' + (userData.name || 'User') + '&background=6C3B8E&color=fff'}" class="avatar">
                        <span class="name">${userData.name?.split(' ')[0] || 'Профиль'}</span>
                    </div>
                `;
            } else {
                headerActions.innerHTML = `
                    <a href="login.html" class="btn btn-primary btn-sm">Войти</a>
                    <a href="login.html?register=true" class="btn btn-secondary btn-sm">Регистрация</a>
                `;
            }
        }

        // ========================================
        // SAVE TO HISTORY
        // ========================================
        function saveToHistory(id) {
            let history = JSON.parse(localStorage.getItem('viewHistory') || '[]');
            history = history.filter(item => item !== id);
            history.unshift(id);
            if (history.length > 20) history.pop();
            localStorage.setItem('viewHistory', JSON.stringify(history));
        }

        // ========================================
        // LOAD PRODUCT
        // ========================================
        async function loadProduct() {
            const urlParams = new URLSearchParams(window.location.search);
            listingId = urlParams.get('id');

            if (!listingId) {
                productContent.innerHTML =
                    `
                    <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
                        <div style="font-size:64px;margin-bottom:16px;">🔍</div>
                        <h3>Товар не найден</h3>
                        <a href="index.html" class="btn btn-primary" style="margin-top:16px;">На главную</a>
                    </div>
                `;
                return;
            }

            // Сохраняем в историю
            saveToHistory(listingId);

            try {
                const doc = await db.collection("listings").doc(listingId).get();
                if (!doc.exists) {
                    productContent.innerHTML =
                        `
                        <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
                            <div style="font-size:64px;margin-bottom:16px;">📭</div>
                            <h3>Объявление удалено</h3>
                            <a href="index.html" class="btn btn-primary" style="margin-top:16px;">На главную</a>
                        </div>
                    `;
                    return;
                }

                listing = { id: doc.id, ...doc.data() };

                if (listing.status === 'sold' || listing.status === 'archived') {
                    productContent.innerHTML =
                        `
                        <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
                            <div style="font-size:64px;margin-bottom:16px;">✅</div>
                            <h3>Товар продан</h3>
                            <p style="color:var(--text-muted);">Это объявление уже неактивно</p>
                            <a href="index.html" class="btn btn-primary" style="margin-top:16px;">На главную</a>
                        </div>
                    `;
                    return;
                }

                await db.collection("listings").doc(listingId).update({
                    views: (listing.views || 0) + 1
                });
                renderProduct();
                loadSimilarProducts();

            } catch (error) {
                console.error('Ошибка загрузки:', error);
                productContent.innerHTML =
                    `
                    <div style="text-align:center;padding:60px 20px;color:var(--text-muted);">
                        <div style="font-size:64px;margin-bottom:16px;">❌</div>
                        <h3>Ошибка загрузки</h3>
                        <a href="index.html" class="btn btn-primary" style="margin-top:16px;">На главную</a>
                    </div>
                `;
            }
        }

        // ========================================
        // CHECK FAVORITE
        // ========================================
        async function checkFavorite() {
            if (!currentUser || !listingId) return;
            try {
                const snapshot = await db.collection("favorites")
                    .where("userId", "==", currentUser.uid)
                    .where("listingId", "==", listingId)
                    .get();
                isFavorite = !snapshot.empty;
                updateFavoriteButton();
            } catch (e) { console.error('Favorite check error:', e); }
        }

        // ========================================
        // RENDER PRODUCT
        // ========================================
        function renderProduct() {
            if (!listing) return;

            const mediaFiles = listing.mediaFiles || [];
            const mainImage = mediaFiles.length > 0 ? mediaFiles[0].url : (listing.image || null);
            const hasMultiple = mediaFiles.length > 1;
            const isOwner = currentUser && listing.sellerId === currentUser.uid;
            const deliveryType = listing.deliveryType || 'both';

            const specsHtml = listing.specs ? Object.entries(listing.specs).map(([key, val]) => `
                    <div class="spec-item">
                        <span class="label">${escapeHtml(key)}</span>
                        <span class="value">${escapeHtml(val)}</span>
                    </div>
                `).join('') : '';

            const conditionLabel = listing.condition === 'new' ? 'Новое' : 'Б/У';

            productContent.innerHTML = `
                    <div class="product-grid">
                        <!-- ===== GALLERY ===== -->
                        <div class="product-gallery">
                            <div class="main-image-wrap">
                                ${mainImage ? `<img src="${mainImage}" alt="${escapeHtml(listing.title)}" id="mainImage">` : `<div class="placeholder">📦</div>`}
                                <div class="badge-top">
                                    ${listing.status === 'active' ? '<span class="badge badge-success">Активно</span>' : '<span class="badge badge-danger">Снято</span>'}
                                    ${listing.condition === 'new' ? '<span class="badge badge-success">Новое</span>' : ''}
                                    ${listing.promotedAt ? '<span class="badge badge-purple">⭐ В ТОПе</span>' : ''}
                                </div>
                            </div>
                            ${hasMultiple ? `
                                <div class="thumbnail-grid" id="thumbnailGrid">
                                    ${mediaFiles.map((file, i) => `
                                        <div class="thumbnail ${i === 0 ? 'active' : ''}" data-index="${i}" onclick="changeImage(${i})">
                                            ${file.url ? `<img src="${file.url}" alt="Фото ${i+1}" loading="lazy">` : `<div class="thumb-placeholder">📷</div>`}
                                        </div>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>

                        <!-- ===== INFO ===== -->
                        <div class="product-info">
                            <span class="category-badge">${escapeHtml(listing.category || 'Без категории')}</span>
                            <h1 class="title">${escapeHtml(listing.title)}</h1>
                            <div class="price">${Number(listing.price).toLocaleString()} ₽</div>

                            <div class="meta-row">
                                <span>📍 ${escapeHtml(listing.location || 'Не указан')}</span>
                                <span>📦 ${conditionLabel}</span>
                                <span>👁️ ${listing.views || 0} просмотров</span>
                                <span>📅 ${listing.createdAt ? new Date(listing.createdAt).toLocaleDateString() : ''}</span>
                            </div>

                            ${listing.description ? `
                                <div class="description">
                                    <strong>Описание:</strong><br>
                                    ${escapeHtml(listing.description)}
                                </div>
                            ` : ''}

                            <!-- ===== ВЫБОР ТИПА СДЕЛКИ ===== -->
                            ${!isOwner && listing.status === 'active' ? `
                                <div class="delivery-type-selector" id="deliverySelector">
                                    ${deliveryType === 'delivery' || deliveryType === 'both' ? `
                                        <div class="option active" data-type="delivery">
                                            <span class="icon">🚚</span>
                                            <div class="label">С доставкой</div>
                                            <div style="font-size:11px;color:var(--text-muted);">Ozon ПВЗ</div>
                                        </div>
                                    ` : ''}
                                    ${deliveryType === 'meeting' || deliveryType === 'both' ? `
                                        <div class="option" data-type="meeting">
                                            <span class="icon">🤝</span>
                                            <div class="label">Без доставки</div>
                                            <div style="font-size:11px;color:var(--text-muted);">Встреча/договор</div>
                                        </div>
                                    ` : ''}
                                </div>
                            ` : ''}

                            ${!isOwner && listing.status === 'active' && deliveryType === 'delivery' ? `
                                <div class="delivery-info-box" id="deliveryInfo">
                                    <strong>🚚 Доставка через Ozon</strong>
                                    <p style="margin-top:4px;">Выберите пункт выдачи Ozon при оформлении заказа.</p>
                                </div>
                            ` : ''}

                            ${!isOwner && listing.status === 'active' && deliveryType === 'meeting' ? `
                                <div class="delivery-info-box" id="deliveryInfo">
                                    <strong>🤝 Встреча/договор</strong>
                                    <p style="margin-top:4px;">Свяжитесь с продавцом через чат и договоритесь о встрече.</p>
                                </div>
                            ` : ''}

                            ${specsHtml ? `
                                <div class="specs-block">
                                    <h4>📋 Характеристики</h4>
                                    <div class="spec-grid">${specsHtml}</div>
                                </div>
                            ` : ''}

                            <!-- ===== ПРОДАВЕЦ ===== -->
                            <div class="seller-card">
                                <img src="${listing.sellerPhoto || 'https://ui-avatars.com/api/?name=' + (listing.sellerName || 'Продавец') + '&background=6C3B8E&color=fff'}" class="avatar" alt="Продавец">
                                <div class="info">
                                    <div class="name">${escapeHtml(listing.sellerName || 'Продавец')}</div>
                                    <div class="rating">⭐ ${listing.sellerRating || 0}% рейтинг</div>
                                    <div class="stats">📦 ${listing.sellerDeals || 0} сделок</div>
                                </div>
                                ${!isOwner ? `<button class="btn btn-secondary btn-sm" onclick="openChat()">💬</button>` : ''}
                            </div>

                            <!-- ===== ДЕЙСТВИЯ ===== -->
                            ${isOwner ? `
                                <div class="action-buttons">
                                    <button class="btn btn-warning" onclick="promoteListing()">🚀 Продвинуть</button>
                                    <button class="btn btn-success" onclick="markAsSold()">✅ Продано</button>
                                    <button class="btn btn-secondary" onclick="editListing()">✏️ Редактировать</button>
                                </div>
                            ` : listing.status === 'active' ? `
                                <div class="action-buttons">
                                    ${selectedDelivery === 'delivery' ? `
                                        <button class="btn btn-primary" id="cartBtn">🛒 В корзину (доставка)</button>
                                    ` : `
                                        <button class="btn btn-success" id="chatBtn">💬 Перейти в чат</button>
                                    `}
                                    <button class="btn btn-secondary" id="favoriteBtn">🤍</button>
                                    <button class="btn btn-secondary btn-sm" id="shareBtn">📤</button>
                                    <div class="compare-actions">
                                        <button class="btn btn-secondary btn-sm" onclick="addToCompare()">📊 Сравнить</button>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;

            // ===== EVENTS =====
            document.getElementById('cartBtn')?.addEventListener('click', addToCart);
            document.getElementById('chatBtn')?.addEventListener('click', () => openChat());
            document.getElementById('favoriteBtn')?.addEventListener('click', toggleFavorite);
            document.getElementById('shareBtn')?.addEventListener('click', shareProduct);

            // ===== ВЫБОР ТИПА ДОСТАВКИ =====
            document.querySelectorAll('.delivery-type-selector .option').forEach(el => {
                el.onclick = () => {
                    document.querySelectorAll('.delivery-type-selector .option').forEach(o => o.classList.remove(
                    'active'));
                    el.classList.add('active');
                    selectedDelivery = el.dataset.type;

                    const actionButtons = document.querySelector('.action-buttons');
                    if (actionButtons) {
                        if (selectedDelivery === 'delivery') {
                            actionButtons.innerHTML = `
                                    <button class="btn btn-primary" id="cartBtn">🛒 В корзину (доставка)</button>
                                    <button class="btn btn-secondary" id="favoriteBtn">🤍</button>
                                    <button class="btn btn-secondary btn-sm" id="shareBtn">📤</button>
                                    <div class="compare-actions">
                                        <button class="btn btn-secondary btn-sm" onclick="addToCompare()">📊 Сравнить</button>
                                    </div>
                                `;
                            document.getElementById('cartBtn')?.addEventListener('click', addToCart);
                            document.getElementById('favoriteBtn')?.addEventListener('click', toggleFavorite);
                            document.getElementById('shareBtn')?.addEventListener('click', shareProduct);
                        } else {
                            actionButtons.innerHTML = `
                                    <button class="btn btn-success" id="chatBtn">💬 Перейти в чат</button>
                                    <button class="btn btn-secondary" id="favoriteBtn">🤍</button>
                                    <button class="btn btn-secondary btn-sm" id="shareBtn">📤</button>
                                    <div class="compare-actions">
                                        <button class="btn btn-secondary btn-sm" onclick="addToCompare()">📊 Сравнить</button>
                                    </div>
                                `;
                            document.getElementById('chatBtn')?.addEventListener('click', () => openChat());
                            document.getElementById('favoriteBtn')?.addEventListener('click', toggleFavorite);
                            document.getElementById('shareBtn')?.addEventListener('click', shareProduct);
                        }
                    }
                };
            });

            updateFavoriteButton();
        }

        // ========================================
        // CHANGE IMAGE
        // ========================================
        window.changeImage = function(index) {
            const mediaFiles = listing?.mediaFiles || [];
            if (!mediaFiles[index]) return;
            const mainImg = document.getElementById('mainImage');
            if (mainImg) mainImg.src = mediaFiles[index].url;
            document.querySelectorAll('.thumbnail').forEach((el, i) => {
                el.classList.toggle('active', i === index);
            });
        };

        // ========================================
        // ADD TO COMPARE
        // ========================================
        window.addToCompare = function() {
            let compare = JSON.parse(localStorage.getItem('compare') || '[]');
            if (compare.length >= 3) {
                showNotification('Максимум 3 товара для сравнения', 'warning');
                return;
            }
            if (compare.includes(listingId)) {
                showNotification('Товар уже в сравнении', 'info');
                return;
            }
            compare.push(listingId);
            localStorage.setItem('compare', JSON.stringify(compare));
            showNotification('✅ Добавлено в сравнение', 'success');
        };

        // ========================================
        // SIMILAR PRODUCTS
        // ========================================
        async function loadSimilarProducts() {
            if (!listing) return;

            try {
                const category = listing.category;
                const snapshot = await db.collection("listings")
                    .where("category", "==", category)
                    .where("status", "==", "active")
                    .limit(6)
                    .get();

                let items = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                items = items.filter(item => item.id !== listingId);

                if (items.length === 0) {
                    similarContainer.innerHTML = '';
                    return;
                }

                similarContainer.innerHTML = `
                        <div class="similar-section">
                            <h3>🔄 Похожие товары</h3>
                            <div class="similar-grid">
                                ${items.map(item => `
                                    <div class="similar-item" onclick="window.location.href='product.html?id=${item.id}'">
                                        <div class="image">${item.image || '📦'}</div>
                                        <div class="info">
                                            <div class="title">${escapeHtml(item.title)}</div>
                                            <div class="price">${Number(item.price).toLocaleString()} ₽</div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;

            } catch (error) {
                console.error('Error loading similar products:', error);
            }
        }

        // ========================================
        // ACTIONS
        // ========================================
        async function addToCart() {
            if (!currentUser) {
                showNotification('Войдите в аккаунт', 'warning');
                window.location.href = 'login.html';
                return;
            }
            if (currentUser.uid === listing.sellerId) {
                showNotification('Вы не можете купить свой товар', 'error');
                return;
            }

            let cart = JSON.parse(localStorage.getItem('cart') || '[]');
            if (cart.some(item => item.id === listingId)) {
                showNotification('Товар уже в корзине', 'info');
                return;
            }

            cart.push({
                id: listingId,
                qty: 1,
                deliveryType: selectedDelivery || 'delivery'
            });
            localStorage.setItem('cart', JSON.stringify(cart));
            showNotification('Добавлено в корзину!', 'success');
        }

        async function toggleFavorite() {
            if (!currentUser) {
                showNotification('Войдите в аккаунт', 'warning');
                window.location.href = 'login.html';
                return;
            }
            try {
                const snapshot = await db.collection("favorites")
                    .where("userId", "==", currentUser.uid)
                    .where("listingId", "==", listingId)
                    .get();
                if (!snapshot.empty) {
                    await snapshot.docs[0].ref.delete();
                    isFavorite = false;
                    showNotification('Удалено из избранного', 'info');
                } else {
                    await db.collection("favorites").add({
                        userId: currentUser.uid,
                        listingId: listingId,
                        addedAt: new Date().toISOString()
                    });
                    isFavorite = true;
                    showNotification('Добавлено в избранное', 'success');
                }
                updateFavoriteButton();
            } catch (error) {
                console.error('Favorite error:', error);
                showNotification('Ошибка', 'error');
            }
        }

        function updateFavoriteButton() {
            const btn = document.getElementById('favoriteBtn');
            if (btn) {
                btn.textContent = isFavorite ? '❤️' : '🤍';
                btn.style.color = isFavorite ? '#E84393' : '';
            }
        }

        function shareProduct() {
            const url = window.location.href;
            if (navigator.share) {
                navigator.share({
                    title: listing?.title || 'Куки',
                    text: `Посмотрите "${listing?.title || 'товар'}" на Куки!`,
                    url: url
                }).catch(() => {});
            } else {
                navigator.clipboard?.writeText(url).then(() => {
                    showNotification('Ссылка скопирована', 'success');
                }).catch(() => {
                    showNotification('📤 ' + url, 'info');
                });
            }
        }

        function openChat() {
            if (!currentUser) {
                showNotification('Войдите в аккаунт', 'warning');
                window.location.href = 'login.html';
                return;
            }
            if (!listing?.sellerId) {
                showNotification('Продавец не найден', 'error');
                return;
            }
            if (currentUser.uid === listing.sellerId) {
                showNotification('Это ваш товар', 'info');
                return;
            }
            window.location.href =
                `chat.html?sellerId=${listing.sellerId}&listingId=${listingId}&title=${encodeURIComponent(listing.title)}`;
        }

        function editListing() {
            window.location.href = `post-ad.html?edit=${listingId}`;
        }

        // ========================================
        // PROMOTE LISTING
        // ========================================
        async function promoteListing() {
            if (!currentUser || currentUser.uid !== listing.sellerId) {
                showNotification('Доступ запрещён', 'error');
                return;
            }

            const price = 199;
            const balance = userData.balance || 0;

            if (balance < price) {
                showNotification(`❌ Недостаточно средств! Нужно ${price} ₽. Пополните баланс.`, 'error');
                window.location.href = 'wallet.html';
                return;
            }

            if (!confirm(`Поднять объявление "${listing.title}" в ТОП за ${price} ₽?`)) return;

            try {
                const newBalance = balance - price;
                await db.collection("users").doc(currentUser.uid).update({
                    balance: newBalance
                });
                userData.balance = newBalance;

                await db.collection("transactions").add({
                    userId: currentUser.uid,
                    amount: -price,
                    description: `Продвижение "${listing.title}"`,
                    status: 'completed',
                    createdAt: new Date().toISOString()
                });

                await db.collection("listings").doc(listingId).update({
                    promotedAt: new Date().toISOString()
                });

                setupHeader();
                showNotification(`✅ Объявление поднято в ТОП! Списано ${price} ₽`, 'success');
                setTimeout(() => location.reload(), 1000);

            } catch (error) {
                console.error('Error promoting:', error);
                showNotification('❌ Ошибка продвижения', 'error');
            }
        }

        // ========================================
        // MARK AS SOLD
        // ========================================
        async function markAsSold() {
            if (!currentUser || currentUser.uid !== listing.sellerId) {
                showNotification('Доступ запрещён', 'error');
                return;
            }

            if (!confirm('Отметить товар как проданный?')) return;

            try {
                await db.collection("listings").doc(listingId).update({
                    status: 'archived',
                    archivedAt: new Date().toISOString()
                });

                const userRef = db.collection("users").doc(currentUser.uid);
                const userDoc = await userRef.get();
                const currentDeals = userDoc.data()?.completedDeals || 0;
                await userRef.update({
                    completedDeals: currentDeals + 1
                });

                showNotification('✅ Товар отмечен как проданный!', 'success');
                setTimeout(() => window.location.href = 'profile/index.html', 1500);

            } catch (error) {
                console.error('Error marking as sold:', error);
                showNotification('Ошибка', 'error');
            }
        }

        // ========================================
        // NOTIFICATIONS
        // ========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.notification').forEach(el => el.remove());
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                setTimeout(() => notification.remove(), 300);
            }, 3500);
        }

        // ========================================
        // UTILITY
        // ========================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
        }

        // ========================================
        // KEYBOARD
        // ========================================
        document.addEventListener('keydown', (e) => {
            if (!listing?.mediaFiles?.length) return;
            const mediaFiles = listing.mediaFiles;
            let currentIndex = 0;
            document.querySelectorAll('.thumbnail').forEach((el, i) => {
                if (el.classList.contains('active')) currentIndex = i;
            });
            if (e.key === 'ArrowLeft' && currentIndex > 0) {
                changeImage(currentIndex - 1);
            } else if (e.key === 'ArrowRight' && currentIndex < mediaFiles.length - 1) {
                changeImage(currentIndex + 1);
            }
        });
    </script>
</body>
</html>
