<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сообщения — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .messages-container { max-width: 1200px; margin: 30px auto; padding: 0 24px; }
        .messages-layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .chats-list { flex: 2; min-width: 280px; }
        .notifications-list { flex: 1; min-width: 280px; }
        .chat-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid #f0e6ff; cursor: pointer; transition: all 0.3s ease; }
        .chat-card:hover { background: #f5f0ff; transform: translateX(5px); }
        .notification-card { background: white; border-radius: 20px; padding: 16px; margin-bottom: 12px; border: 1px solid #f0e6ff; cursor: pointer; }
        .notification-card.unread { border-left: 3px solid #e84393; background: #fff5f8; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>
<div class="messages-container">
    <h1 style="margin-bottom: 24px;">💬 Сообщения</h1>
    <div class="messages-layout">
        <div class="chats-list"><h3>📨 Чаты</h3><div id="chatsList"></div></div>
        <div class="notifications-list"><h3>🔔 Уведомления</h3><div id="notificationsList"></div></div>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        await loadChats();
        await loadNotifications();
    });
    
    async function loadChats() {
        const snapshot = await db.collection("chats").where("participants", "array-contains", auth.currentUser.uid).get();
        const chats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const container = document.getElementById('chatsList');
        if (chats.length === 0) { container.innerHTML = '<div class="empty-state">Нет чатов</div>'; return; }
        container.innerHTML = chats.map(chat => `<div class="chat-card" onclick="window.location.href='chat.html?chatId=${chat.id}'"><strong>${chat.listingTitle || 'Товар'}</strong><div class="text-muted">${chat.lastMessage || 'Новое сообщение'}</div></div>`).join('');
    }
    
    async function loadNotifications() {
        const snapshot = await db.collection("notifications").where("userId", "==", auth.currentUser.uid).orderBy("createdAt", "desc").get();
        const notifications = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const container = document.getElementById('notificationsList');
        if (notifications.length === 0) { container.innerHTML = '<div class="empty-state">Нет уведомлений</div>'; return; }
        container.innerHTML = notifications.map(n => `<div class="notification-card ${n.read ? '' : 'unread'}" onclick="markRead('${n.id}')"><div>${n.message}</div><div class="text-muted">${new Date(n.createdAt).toLocaleString()}</div></div>`).join('');
    }
    
    window.markRead = async (id) => { await db.collection("notifications").doc(id).update({ read: true }); location.reload(); };
</script>
</body>
</html>
