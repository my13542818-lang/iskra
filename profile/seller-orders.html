<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заказы продавца — Куки</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .seller-orders-container { max-width: 1200px; margin: 30px auto; padding: 0 24px; }
        .seller-orders-container h2 { font-size: 24px; margin-bottom: 24px; }
        .mini-listing {
            display: flex; align-items: center; gap: 16px;
            padding: 12px 16px; background: var(--bg-input);
            border-radius: var(--radius); margin-bottom: 10px;
            transition: var(--transition); border: 1px solid transparent;
        }
        .mini-listing:hover { border-color: var(--border-light); background: var(--bg-card-hover); }
        .mini-listing .thumb {
            width: 64px; height: 64px; border-radius: var(--radius);
            background: var(--bg-dark); display: flex; align-items: center;
            justify-content: center; font-size: 30px; flex-shrink: 0;
        }
        .mini-listing .info { flex: 1; min-width: 0; }
        .mini-listing .info .title { font-weight: 500; font-size: 14px; }
        .mini-listing .info .price { color: var(--secondary); font-weight: 600; font-size: 16px; }
        .mini-listing .info .meta { font-size: 12px; color: var(--text-muted); }
        .mini-listing .actions { display: flex; gap: 6px; flex-shrink: 0; }
        .badge {
            display: inline-flex; align-items: center; gap: 4px;
            padding: 4px 12px; border-radius: var(--radius-full);
            font-size: 12px; font-weight: 600;
        }
        .badge-success { background: rgba(46, 204, 113, 0.2); color: #2ECC71; }
        .badge-danger { background: rgba(231, 76, 60, 0.2); color: #E74C3C; }
        .badge-warning { background: rgba(243, 156, 18, 0.2); color: #F39C12; }
        .badge-info { background: rgba(52, 152, 219, 0.2); color: #3498DB; }
        .back-link { display: inline-block; margin-top: 16px; }
        .empty-state { text-align: center; padding: 60px 20px; }
        .empty-state .icon { font-size: 64px; display: block; margin-bottom: 16px; }
        .empty-state h3 { font-size: 22px; margin-bottom: 8px; }
        .empty-state p { color: var(--text-muted); max-width: 400px; margin: 0 auto 20px; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="logo">🍪 Куки</a>
            <div class="header-actions" id="headerActions"></div>
        </div>
    </header>

    <div class="seller-orders-container">
        <h2>📦 Заказы продавца</h2>
        <div id="ordersList"><div class="loading-spinner"></div></div>
        <a href="index.html" class="back-link btn btn-secondary">← Вернуться в профиль</a>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.firestore();

        function getStatusText(status) {
            const map = {
                'pending': '⏳ Ожидает',
                'paid': '✅ Оплачен',
                'shipped': '🚚 Отправлен',
                'delivered': '📦 Доставлен',
                'completed': '🎉 Завершён',
                'cancelled': '❌ Отменён'
            };
            return map[status] || status;
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
        }

        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = '../login.html'; return; }

            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.data() || {};

            document.getElementById('headerActions').innerHTML = `
                <div class="balance-badge" onclick="window.location.href='../wallet.html'">💰 ${(data.balance || 0).toLocaleString()} ₽</div>
                <div class="header-user" onclick="window.location.href='index.html'">
                    <img src="${data.photoURL || 'https://ui-avatars.com/api/?name=' + (data.name || 'User') + '&background=6C3B8E&color=fff'}" class="avatar">
                    <span class="name">${data.name?.split(' ')[0] || 'Профиль'}</span>
                </div>
            `;

            const snapshot = await db.collection("orders")
                .where("sellerId", "==", user.uid)
                .orderBy("createdAt", "desc")
                .get();

            const orders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
            const container = document.getElementById('ordersList');

            if (orders.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        <h3>Нет заказов</h3>
                        <p>У вас пока нет заказов от покупателей</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => `
                <div class="mini-listing">
                    <div class="thumb">📦</div>
                    <div class="info">
                        <div class="title">Заказ #${order.id.substring(0,8)}</div>
                        <div class="price">${Number(order.total).toLocaleString()} ₽</div>
                        <div class="meta">
                            <span>👤 ${escapeHtml(order.buyerName || 'Покупатель')}</span>
                            <span class="badge ${order.status === 'completed' ? 'badge-success' : order.status === 'cancelled' ? 'badge-danger' : order.status === 'shipped' ? 'badge-info' : 'badge-warning'}">
                                ${getStatusText(order.status)}
                            </span>
                        </div>
                        <div class="meta">${order.deliveryType === 'delivery' ? '🚚 Доставка Ozon' : '🤝 Без доставки'}</div>
                        ${order.trackingNumber ? `<div class="meta">📮 Трек: ${order.trackingNumber}</div>` : ''}
                    </div>
                    <div class="actions">
                        ${order.status === 'paid' ? `
                            <button class="btn btn-primary btn-sm" onclick="updateStatus('${order.id}', 'shipped')">🚚 Отправить</button>
                        ` : ''}
                        ${order.status === 'shipped' ? `
                            <button class="btn btn-success btn-sm" onclick="updateStatus('${order.id}', 'delivered')">📦 Доставлен</button>
                        ` : ''}
                        ${order.status === 'delivered' ? `
                            <button class="btn btn-success btn-sm" onclick="updateStatus('${order.id}', 'completed')">✅ Завершить</button>
                        ` : ''}
                        ${order.status === 'pending' || order.status === 'paid' ? `
                            <button class="btn btn-danger btn-sm" onclick="updateStatus('${order.id}', 'cancelled')">❌ Отменить</button>
                        ` : ''}
                        ${order.status === 'shipped' || order.status === 'delivered' ? `
                            <button class="btn btn-secondary btn-sm" onclick="addTracking('${order.id}')">📮 Трек</button>
                        ` : ''}
                    </div>
                </div>
            `).join('');

            window.updateStatus = async (orderId, status) => {
                if (!confirm(`Изменить статус заказа на "${getStatusText(status)}"?`)) return;

                try {
                    await db.collection("orders").doc(orderId).update({
                        status: status,
                        updatedAt: new Date().toISOString()
                    });

                    if (status === 'completed') {
                        const orderDoc = await db.collection("orders").doc(orderId).get();
                        const order = orderDoc.data();
                        const userRef = db.collection("users").doc(order.sellerId);
                        const userDoc = await userRef.get();
                        const currentDeals = userDoc.data()?.completedDeals || 0;
                        await userRef.update({ completedDeals: currentDeals + 1 });
                    }

                    alert('✅ Статус обновлён!');
                    location.reload();

                } catch (error) {
                    console.error('Error updating order:', error);
                    alert('❌ Ошибка обновления статуса');
                }
            };

            window.addTracking = async (orderId) => {
                const tracking = prompt('Введите трек-номер для отслеживания:');
                if (!tracking) return;

                try {
                    await db.collection("orders").doc(orderId).update({
                        trackingNumber: tracking,
                        updatedAt: new Date().toISOString()
                    });
                    alert('✅ Трек-номер добавлен!');
                    location.reload();
                } catch (error) {
                    console.error('Error adding tracking:', error);
                    alert('❌ Ошибка');
                }
            };
        });
    </script>
</body>
</html>
