<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Редактировать профиль — Куки</title>
    <link rel="stylesheet" href="../styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .edit-container { max-width: 700px; margin: 30px auto; padding: 0 24px; }
        .edit-container .card { padding: 32px; border-radius: var(--radius-xl); }
        .edit-container .card h2 { font-size: 24px; margin-bottom: 24px; }
        .edit-container .avatar-section { text-align: center; margin-bottom: 24px; }
        .edit-container .avatar-section .avatar-wrap {
            position: relative;
            width: 120px; height: 120px;
            margin: 0 auto;
            border-radius: 50%;
            border: 4px solid var(--secondary);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }
        .edit-container .avatar-section .avatar-wrap:hover { transform: scale(1.05); }
        .edit-container .avatar-section .avatar-wrap img {
            width: 100%; height: 100%; object-fit: cover;
        }
        .edit-container .avatar-section .avatar-wrap .overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.6);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; transition: var(--transition);
            color: white; font-size: 13px;
        }
        .edit-container .avatar-section .avatar-wrap:hover .overlay { opacity: 1; }
        .edit-container .avatar-section .hint {
            font-size: 12px; color: var(--text-muted);
            margin-top: 8px; cursor: pointer;
        }
        .edit-container .form-group { margin-bottom: 20px; }
        .edit-container .form-group label { display: block; margin-bottom: 6px; color: var(--text-secondary); font-weight: 500; }
        .edit-container .form-group .required { color: var(--secondary); }
        .back-link { display: inline-block; margin-top: 16px; }

        .upload-progress {
            display: none;
            margin: 12px 0;
            padding: 12px 16px;
            background: var(--bg-input);
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
        }
        .upload-progress .bar {
            height: 6px;
            background: var(--bg-dark);
            border-radius: 3px;
            overflow: hidden;
            margin-top: 6px;
        }
        .upload-progress .bar .fill {
            height: 100%;
            background: var(--gradient-main);
            border-radius: 3px;
            transition: width 0.4s ease;
            width: 0%;
        }
        .upload-progress .status { font-size: 12px; color: var(--text-muted); }

        .notification {
            position: fixed; bottom: 24px; right: 24px;
            padding: 16px 24px; border-radius: var(--radius);
            background: var(--bg-card); border: 1px solid var(--border-color);
            color: var(--text-primary); box-shadow: var(--shadow-lg);
            z-index: 9999; max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .notification-success { border-left: 4px solid #2ECC71; }
        .notification-error { border-left: 4px solid #E74C3C; }
        .notification-warning { border-left: 4px solid #F39C12; }
    </style>
</head>
<body>

    <header class="header">
        <div class="header-container">
            <a href="../index.html" class="logo">🍪 Куки</a>
            <div class="header-actions" id="headerActions"></div>
        </div>
    </header>

    <div class="edit-container">
        <div class="card card-glow">
            <h2>✏️ Редактировать профиль</h2>

            <!-- ===== AVATAR ===== -->
            <div class="avatar-section">
                <div class="avatar-wrap" id="avatarWrap">
                    <img id="avatarPreview" src="https://ui-avatars.com/api/?name=User&background=6C3B8E&color=fff" alt="Аватар">
                    <div class="overlay">📷 Сменить</div>
                </div>
                <div class="hint" id="changeAvatarHint">Нажмите чтобы сменить фото</div>
                <input type="file" id="avatarInput" accept="image/*" style="display:none">
            </div>

            <!-- ===== PROGRESS ===== -->
            <div class="upload-progress" id="uploadProgress">
                <div class="status" id="uploadStatus">⏳ Загрузка...</div>
                <div class="bar"><div class="fill" id="progressFill"></div></div>
            </div>

            <!-- ===== FORM ===== -->
            <div class="form-group">
                <label>Полное имя <span class="required">*</span></label>
                <input type="text" class="form-control" id="editName" placeholder="Иванов Иван">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" class="form-control" id="editEmail" disabled>
            </div>
            <div class="form-group">
                <label>Телефон <span class="required">*</span></label>
                <input type="tel" class="form-control" id="editPhone" placeholder="+7 999 123-45-67">
            </div>
            <div class="form-group">
                <label>Город</label>
                <input type="text" class="form-control" id="editCity" placeholder="Москва">
            </div>
            <div class="form-group">
                <label>О себе</label>
                <textarea class="form-control" id="editBio" rows="4" placeholder="Расскажите о себе..."></textarea>
            </div>

            <button class="btn btn-primary" id="saveBtn">💾 Сохранить изменения</button>
            <a href="index.html" class="back-link btn btn-secondary">← Вернуться в профиль</a>
        </div>
    </div>

    <script>
        // ========================================
        // FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========================================
        // IMGBB API КЛЮЧ
        // ========================================
        const IMGBB_API_KEY = '1ba0f59d8c0c0079dce45a876e2a07f5';

        // ========================================
        // DOM REFS
        // ========================================
        const headerActions = document.getElementById('headerActions');
        const avatarPreview = document.getElementById('avatarPreview');
        const avatarInput = document.getElementById('avatarInput');
        const avatarWrap = document.getElementById('avatarWrap');
        const changeAvatarHint = document.getElementById('changeAvatarHint');
        const uploadProgress = document.getElementById('uploadProgress');
        const progressFill = document.getElementById('progressFill');
        const uploadStatus = document.getElementById('uploadStatus');

        // ========================================
        // AUTH
        // ========================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = '../login.html';
                return;
            }

            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.data() || {};

            // Заполняем форму
            avatarPreview.src = data.photoURL || `https://ui-avatars.com/api/?name=${data.name || 'User'}&background=6C3B8E&color=fff`;
            document.getElementById('editName').value = data.name || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editPhone').value = data.phone || '';
            document.getElementById('editCity').value = data.city || '';
            document.getElementById('editBio').value = data.bio || '';

            // Хедер
            headerActions.innerHTML = `
                <div class="balance-badge" onclick="window.location.href='../wallet.html'">💰 ${(data.balance || 0).toLocaleString()} ₽</div>
                <div class="header-user" onclick="window.location.href='index.html'">
                    <img src="${data.photoURL || 'https://ui-avatars.com/api/?name=' + (data.name || 'User') + '&background=6C3B8E&color=fff'}" class="avatar">
                    <span class="name">${data.name?.split(' ')[0] || 'Профиль'}</span>
                </div>
            `;

            // ========================================
            // ЗАГРУЗКА АВАТАРА ЧЕРЕЗ IMGBB
            // ========================================
            async function uploadAvatar(file) {
                // Проверяем размер (макс 5 МБ)
                if (file.size > 5 * 1024 * 1024) {
                    showNotification('Файл слишком большой! Максимум 5 МБ', 'error');
                    return null;
                }

                // Сжимаем изображение
                const compressed = await compressImage(file, 300, 0.85);
                if (!compressed) {
                    showNotification('Ошибка обработки изображения', 'error');
                    return null;
                }

                // Показываем прогресс
                uploadProgress.style.display = 'block';
                progressFill.style.width = '30%';
                uploadStatus.textContent = '⏳ Загрузка на ImgBB...';

                try {
                    const formData = new FormData();
                    formData.append('key', IMGBB_API_KEY);
                    formData.append('image', compressed.split(',')[1]);

                    const response = await fetch('https://api.imgbb.com/1/upload', {
                        method: 'POST',
                        body: formData
                    });

                    progressFill.style.width = '80%';
                    uploadStatus.textContent = '⏳ Обработка...';

                    const data = await response.json();

                    if (data.success) {
                        progressFill.style.width = '100%';
                        uploadStatus.textContent = '✅ Готово!';
                        setTimeout(() => {
                            uploadProgress.style.display = 'none';
                        }, 1000);
                        return data.data.url;
                    } else {
                        throw new Error(data.error?.message || 'Ошибка загрузки');
                    }

                } catch (error) {
                    console.error('ImgBB upload error:', error);
                    showNotification('❌ Ошибка загрузки: ' + error.message, 'error');
                    uploadProgress.style.display = 'none';
                    return null;
                }
            }

            // ========================================
            // СЖАТИЕ ИЗОБРАЖЕНИЯ
            // ========================================
            function compressImage(file, maxSize = 300, quality = 0.85) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            let width = img.width;
                            let height = img.height;

                            if (width > height) {
                                if (width > maxSize) {
                                    height = (height * maxSize) / width;
                                    width = maxSize;
                                }
                            } else {
                                if (height > maxSize) {
                                    width = (width * maxSize) / height;
                                    height = maxSize;
                                }
                            }

                            canvas.width = width;
                            canvas.height = height;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, width, height);
                            resolve(canvas.toDataURL('image/jpeg', quality));
                        };
                        img.onerror = reject;
                        img.src = e.target.result;
                    };
                    reader.onerror = reject;
                    reader.readAsDataURL(file);
                });
            }

            // ========================================
            // ВЫБОР ФАЙЛА
            // ========================================
            avatarWrap.onclick = () => avatarInput.click();
            changeAvatarHint.onclick = () => avatarInput.click();

            avatarInput.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;

                if (!file.type.startsWith('image/')) {
                    showNotification('Пожалуйста, выберите изображение', 'error');
                    return;
                }

                const url = await uploadAvatar(file);
                if (url) {
                    // Сохраняем в Firestore
                    try {
                        await db.collection("users").doc(user.uid).update({
                            photoURL: url
                        });
                        avatarPreview.src = url;
                        showNotification('✅ Аватар обновлён!', 'success');

                        // Обновляем хедер
                        headerActions.innerHTML = `
                            <div class="balance-badge" onclick="window.location.href='../wallet.html'">💰 ${(data.balance || 0).toLocaleString()} ₽</div>
                            <div class="header-user" onclick="window.location.href='index.html'">
                                <img src="${url}" class="avatar">
                                <span class="name">${data.name?.split(' ')[0] || 'Профиль'}</span>
                            </div>
                        `;
                    } catch (error) {
                        console.error('Save error:', error);
                        showNotification('❌ Ошибка сохранения', 'error');
                    }
                }
            };

            // ========================================
            // СОХРАНЕНИЕ ПРОФИЛЯ
            // ========================================
            document.getElementById('saveBtn').onclick = async () => {
                const name = document.getElementById('editName').value.trim();
                const phone = document.getElementById('editPhone').value.trim();

                if (!name || !phone) {
                    showNotification('Заполните имя и телефон', 'error');
                    return;
                }

                try {
                    await db.collection("users").doc(user.uid).update({
                        name: name,
                        phone: phone,
                        city: document.getElementById('editCity').value.trim(),
                        bio: document.getElementById('editBio').value.trim()
                    });
                    showNotification('✅ Профиль обновлён!', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } catch (error) {
                    console.error('Save error:', error);
                    showNotification('❌ Ошибка сохранения', 'error');
                }
            };
        });

        // ========================================
        // УВЕДОМЛЕНИЯ
        // ========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.notification').forEach(el => el.remove());

            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                setTimeout(() => notification.remove(), 300);
            }, 3500);
        }
    </script>
</body>
</html>
