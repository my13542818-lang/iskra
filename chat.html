<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чаты — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="chat-container">
    <div class="chat-wrapper">
        <div class="chat-sidebar">
            <div class="chat-search">
                <input type="text" id="searchChat" placeholder="Поиск чатов...">
            </div>
            <div class="chat-users-list" id="chatUsersList"></div>
        </div>
        <div class="chat-main">
            <div class="chat-header" id="chatHeader">
                <div style="display: flex; align-items: center; gap: 12px;">
                    <div style="font-weight: 600;">💬 Выберите чат</div>
                </div>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area" id="chatInputArea" style="display: none;">
                <button class="chat-attach-btn" id="attachBtn">📎</button>
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button class="btn-primary" id="sendBtn">➤</button>
                <input type="file" id="fileInput" accept="image/*,video/*" style="display: none;">
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();
    
    let currentUser = null;
    let currentChatId = null;
    let chats = [];
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        currentUser = user;
        
        document.getElementById('userActions').innerHTML = `
            <div class="user-info" id="userMenuBtn">
                <img src="${user.photoURL || 'https://via.placeholder.com/35'}" class="user-avatar">
                <span>${user.displayName?.split(' ')[0] || 'User'}</span>
            </div>
            <button class="btn" id="logoutBtn">Выйти</button>
        `;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        
        await loadChats();
        
        // Проверяем параметры URL для прямого перехода
        const urlParams = new URLSearchParams(window.location.search);
        const chatId = urlParams.get('chatId');
        if (chatId) {
            currentChatId = chatId;
            await loadMessages(currentChatId);
            document.getElementById('chatInputArea').style.display = 'flex';
            highlightChat(currentChatId);
        }
    });
    
    async function loadChats() {
        const snapshot = await db.collection("chats")
            .where("participants", "array-contains", currentUser.uid)
            .orderBy("lastMessageTime", "desc")
            .get();
        
        chats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        renderChatsList();
    }
    
    function renderChatsList() {
        const container = document.getElementById('chatUsersList');
        if (chats.length === 0) {
            container.innerHTML = '<div style="padding:20px; text-align:center;">Нет чатов</div>';
            return;
        }
        
        container.innerHTML = chats.map(chat => {
            const otherParticipant = chat.participants?.find(p => p !== currentUser.uid);
            const isSeller = otherParticipant === chat.sellerId;
            return `
                <div class="chat-user-item" data-chat-id="${chat.id}" data-other="${otherParticipant}">
                    <div class="chat-user-avatar" style="background:#f0e6ff; display:flex; align-items:center; justify-content:center;">${isSeller ? '👤' : '🛒'}</div>
                    <div class="chat-user-info">
                        <div class="chat-user-name">${isSeller ? 'Продавец' : 'Покупатель'} — ${chat.listingTitle || 'Товар'}</div>
                        <div class="chat-user-last">${chat.lastMessage?.substring(0, 30) || 'Новое сообщение'}</div>
                    </div>
                </div>
            `;
        }).join('');
        
        document.querySelectorAll('.chat-user-item').forEach(item => {
            item.onclick = async () => {
                currentChatId = item.dataset.chatId;
                await loadMessages(currentChatId);
                document.getElementById('chatInputArea').style.display = 'flex';
                highlightChat(currentChatId);
            };
        });
    }
    
    function highlightChat(chatId) {
        document.querySelectorAll('.chat-user-item').forEach(item => {
            item.classList.remove('active');
            if (item.dataset.chatId === chatId) {
                item.classList.add('active');
            }
        });
    }
    
    async function loadMessages(chatId) {
        const chatDoc = await db.collection("chats").doc(chatId).get();
        const chat = chatDoc.data();
        const otherParticipant = chat.participants?.find(p => p !== currentUser.uid);
        
        document.getElementById('chatHeader').innerHTML = `
            <div style="display: flex; align-items: center; gap: 12px;">
                <div style="font-weight: 600;">💬 Чат: ${chat.listingTitle || 'Товар'}</div>
                <div style="font-size: 12px; color: #b8a9d4;">Собеседник: ${otherParticipant === chat.sellerId ? 'Продавец' : 'Покупатель'}</div>
            </div>
        `;
        
        const snapshot = await db.collection("messages")
            .where("chatId", "==", chatId)
            .orderBy("timestamp", "asc")
            .get();
        
        const messages = snapshot.docs.map(doc => doc.data());
        renderMessages(messages);
        
        // Подписка на новые сообщения
        db.collection("messages")
            .where("chatId", "==", chatId)
            .orderBy("timestamp", "asc")
            .onSnapshot((snap) => {
                const newMessages = snap.docs.map(doc => doc.data());
                renderMessages(newMessages);
            });
    }
    
    function renderMessages(messages) {
        const container = document.getElementById('chatMessages');
        if (messages.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:40px;">Напишите первое сообщение</div>';
            return;
        }
        
        container.innerHTML = messages.map(msg => `
            <div class="message ${msg.senderId === currentUser.uid ? 'my' : 'their'}">
                <div>${escapeHtml(msg.text || '')}</div>
                ${msg.imageUrl ? `<img src="${msg.imageUrl}" class="message-img">` : ''}
                ${msg.videoUrl ? `<video src="${msg.videoUrl}" class="message-img" controls></video>` : ''}
                <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString()}</div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text && !selectedFile) return;
        
        let imageUrl = null;
        let videoUrl = null;
        
        if (selectedFile) {
            const storageRef = storage.ref(`chat_files/${currentChatId}/${Date.now()}_${selectedFile.name}`);
            await storageRef.put(selectedFile);
            const url = await storageRef.getDownloadURL();
            if (selectedFile.type.startsWith('image/')) {
                imageUrl = url;
            } else {
                videoUrl = url;
            }
            selectedFile = null;
            updateFilePreview();
        }
        
        await db.collection("messages").add({
            chatId: currentChatId,
            senderId: currentUser.uid,
            senderName: currentUser.displayName,
            text: text,
            imageUrl: imageUrl,
            videoUrl: videoUrl,
            timestamp: new Date().toISOString()
        });
        
        await db.collection("chats").doc(currentChatId).update({
            lastMessage: text || (imageUrl ? '📷 Фото' : '🎥 Видео'),
            lastMessageTime: new Date().toISOString()
        });
        
        input.value = '';
        document.getElementById('attachBtn').style.display = 'flex';
    }
    
    let selectedFile = null;
    document.getElementById('attachBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = (e) => {
        selectedFile = e.target.files[0];
        if (selectedFile) {
            document.getElementById('attachBtn').style.display = 'none';
            alert(`Выбран файл: ${selectedFile.name}`);
        }
    };
    
    document.getElementById('sendBtn').onclick = sendMessage;
    document.getElementById('messageInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
</script>
</body>
</html>
