<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чаты — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
    <style>
        /* ===== CHAT LAYOUT ===== */
        .chat-layout {
            display: grid;
            grid-template-columns: 360px 1fr;
            gap: 0;
            max-width: 1400px;
            margin: 24px auto;
            padding: 0 24px;
            min-height: 600px;
            height: calc(100vh - 120px);
        }

        /* ===== SIDEBAR ===== */
        .chat-sidebar {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl) 0 0 var(--radius-xl);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .chat-sidebar .sidebar-header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-card);
        }
        .chat-sidebar .sidebar-header h3 {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .chat-sidebar .sidebar-header h3 .count {
            font-size: 13px;
            font-weight: 400;
            color: var(--text-muted);
            margin-left: auto;
        }
        .chat-sidebar .search {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
        }
        .chat-sidebar .search input {
            width: 100%;
            padding: 10px 16px 10px 40px;
            background: var(--bg-input);
            border: 2px solid transparent;
            border-radius: var(--radius-full);
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
            transition: var(--transition);
        }
        .chat-sidebar .search input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(232, 67, 147, 0.1);
        }
        .chat-sidebar .search .search-icon {
            position: absolute;
            left: 28px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 16px;
        }
        .chat-sidebar .search-wrap {
            position: relative;
        }

        .chat-list {
            overflow-y: auto;
            flex: 1;
            padding: 4px 0;
        }
        .chat-list::-webkit-scrollbar {
            width: 4px;
        }
        .chat-list::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .chat-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
            position: relative;
        }
        .chat-item:hover {
            background: var(--bg-input);
        }
        .chat-item.active {
            background: var(--bg-input);
            border-left-color: var(--secondary);
        }
        .chat-item .avatar-wrap {
            position: relative;
            flex-shrink: 0;
        }
        .chat-item .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
            flex-shrink: 0;
        }
        .chat-item .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-item .online-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            border: 2.5px solid var(--bg-card);
            background: #2ECC71;
            display: none;
        }
        .chat-item .online-dot.online {
            display: block;
            animation: pulse-dot 2s infinite;
        }
        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .chat-item .info {
            flex: 1;
            min-width: 0;
        }
        .chat-item .info .name {
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .chat-item .info .name .badge-seller {
            font-size: 10px;
            padding: 1px 8px;
            border-radius: var(--radius-full);
            background: rgba(46, 204, 113, 0.15);
            color: #2ECC71;
            font-weight: 500;
        }
        .chat-item .info .last-msg {
            font-size: 13px;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-item .info .last-msg .typing-indicator {
            color: var(--secondary);
            font-style: italic;
        }
        .chat-item .time {
            font-size: 11px;
            color: var(--text-muted);
            flex-shrink: 0;
        }
        .chat-item .unread {
            background: var(--secondary);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 50px;
            flex-shrink: 0;
            min-width: 20px;
            text-align: center;
        }

        /* ===== MAIN ===== */
        .chat-main {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-left: none;
            border-radius: 0 var(--radius-xl) var(--radius-xl) 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ===== CHAT HEADER ===== */
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--bg-card);
            flex-shrink: 0;
        }
        .chat-header .avatar-wrap {
            position: relative;
        }
        .chat-header .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--gradient-main);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: white;
            flex-shrink: 0;
        }
        .chat-header .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }
        .chat-header .avatar .online-dot {
            position: absolute;
            bottom: 0;
            right: 0;
            width: 11px;
            height: 11px;
            border-radius: 50%;
            border: 2.5px solid var(--bg-card);
            background: #2ECC71;
            display: none;
        }
        .chat-header .avatar .online-dot.online {
            display: block;
        }
        .chat-header .info {
            flex: 1;
        }
        .chat-header .info .name {
            font-weight: 600;
            font-size: 17px;
        }
        .chat-header .info .status {
            font-size: 13px;
            color: var(--text-muted);
        }
        .chat-header .info .status .typing-status {
            color: var(--secondary);
            font-style: italic;
        }

        .chat-header .header-actions {
            display: flex;
            gap: 8px;
        }
        .chat-header .header-actions button {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .chat-header .header-actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* ===== MESSAGES ===== */
        .chat-messages {
            flex: 1;
            padding: 20px 24px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--bg-dark);
        }
        .chat-messages::-webkit-scrollbar {
            width: 4px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        .date-divider {
            text-align: center;
            font-size: 11px;
            color: var(--text-muted);
            padding: 12px 0 8px;
            width: 100%;
            position: relative;
        }
        .date-divider span {
            background: var(--bg-dark);
            padding: 0 16px;
            position: relative;
            z-index: 1;
        }
        .date-divider::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border-color);
            opacity: 0.3;
        }

        .message {
            max-width: 72%;
            padding: 10px 16px;
            border-radius: var(--radius);
            word-wrap: break-word;
            animation: fadeIn 0.25s ease;
            position: relative;
        }
        .message.my {
            background: var(--gradient-main);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            box-shadow: 0 2px 8px rgba(232, 67, 147, 0.2);
        }
        .message.their {
            background: var(--bg-input);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }
        .message .sender {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 3px;
            opacity: 0.7;
        }
        .message .text {
            font-size: 14.5px;
            line-height: 1.5;
        }
        .message .time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }
        .message.my .time {
            color: rgba(255,255,255,0.7);
        }
        .message .media {
            max-width: 280px;
            border-radius: var(--radius);
            margin-top: 6px;
        }
        .message .media img {
            width: 100%;
            border-radius: var(--radius);
        }
        .message .media video {
            width: 100%;
            border-radius: var(--radius);
        }

        /* ===== VOICE MESSAGE ===== */
        .voice-message {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 14px;
            background: rgba(255,255,255,0.08);
            border-radius: var(--radius);
            margin-top: 4px;
            min-width: 140px;
        }
        .message.my .voice-message {
            background: rgba(255,255,255,0.12);
        }
        .voice-message .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: var(--transition);
        }
        .voice-message .play-btn:hover {
            background: rgba(255,255,255,0.25);
        }
        .voice-message .waveform {
            flex: 1;
            height: 28px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .voice-message .waveform .bar {
            width: 3px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            transition: height 0.2s;
        }
        .message.my .voice-message .waveform .bar {
            background: rgba(255,255,255,0.5);
        }
        .voice-message .duration {
            font-size: 11px;
            opacity: 0.7;
            min-width: 35px;
        }

        /* ===== INPUT ===== */
        .chat-input {
            padding: 12px 20px 16px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-card);
            flex-shrink: 0;
        }
        .chat-input .input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input .input-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            background: var(--bg-input);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-full);
            padding: 4px 4px 4px 20px;
            transition: var(--transition);
        }
        .chat-input .input-wrap:focus-within {
            border-color: var(--secondary);
            box-shadow: 0 0 0 4px rgba(232, 67, 147, 0.08);
        }
        .chat-input .input-wrap input {
            flex: 1;
            padding: 10px 8px;
            background: transparent;
            border: none;
            color: var(--text-primary);
            outline: none;
            font-size: 14px;
        }
        .chat-input .input-wrap input::placeholder {
            color: var(--text-muted);
        }
        .chat-input .input-wrap .quick-reply-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 6px 8px;
            font-size: 18px;
            transition: var(--transition);
            border-radius: 50%;
        }
        .chat-input .input-wrap .quick-reply-btn:hover {
            color: var(--secondary);
            background: var(--bg-hover);
        }

        .chat-input .btn-icon {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .chat-input .btn-icon:hover {
            border-color: var(--secondary);
            color: var(--text-primary);
            background: var(--bg-hover);
        }
        .chat-input .send-btn {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            border: none;
            background: var(--gradient-main);
            color: white;
            cursor: pointer;
            transition: var(--transition);
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(232, 67, 147, 0.3);
        }
        .chat-input .send-btn:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 6px 24px rgba(232, 67, 147, 0.4);
        }
        .chat-input .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        /* ===== QUICK REPLIES ===== */
        .quick-replies-popup {
            display: none;
            position: absolute;
            bottom: 60px;
            left: 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 8px;
            min-width: 240px;
            max-width: 300px;
            box-shadow: var(--shadow-lg);
            z-index: 10;
        }
        .quick-replies-popup.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }
        .quick-replies-popup .reply-item {
            padding: 8px 14px;
            cursor: pointer;
            border-radius: var(--radius);
            transition: var(--transition);
            font-size: 13px;
            color: var(--text-secondary);
        }
        .quick-replies-popup .reply-item:hover {
            background: var(--bg-input);
            color: var(--secondary);
        }
        .quick-replies-popup .reply-item .emoji {
            margin-right: 8px;
        }

        /* ===== VOICE RECORDING ===== */
        .voice-recording {
            display: none;
            align-items: center;
            gap: 14px;
            padding: 10px 18px;
            background: var(--bg-input);
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            margin-top: 8px;
            animation: fadeIn 0.3s ease;
        }
        .voice-recording.active {
            display: flex;
        }
        .voice-recording .pulse {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #E74C3C;
            animation: pulse-rec 1s infinite;
        }
        @keyframes pulse-rec {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.3; transform: scale(1.4); }
        }
        .voice-recording .rec-label {
            font-size: 13px;
            font-weight: 500;
            color: #E74C3C;
        }
        .voice-recording .timer {
            font-size: 14px;
            color: var(--text-muted);
            font-weight: 600;
            min-width: 40px;
        }
        .voice-recording .cancel-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 18px;
            padding: 4px 8px;
            transition: var(--transition);
        }
        .voice-recording .cancel-btn:hover {
            color: #E74C3C;
        }
        .voice-recording .stop-btn {
            padding: 6px 18px;
            border-radius: var(--radius-full);
            border: none;
            background: #E74C3C;
            color: white;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: var(--transition);
        }
        .voice-recording .stop-btn:hover {
            transform: scale(1.05);
        }

        /* ===== EMPTY ===== */
        .empty-chat {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            color: var(--text-muted);
            text-align: center;
            padding: 40px;
        }
        .empty-chat .icon {
            font-size: 72px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        .empty-chat h3 {
            font-size: 20px;
            margin-bottom: 4px;
            color: var(--text-secondary);
        }
        .empty-chat p {
            font-size: 14px;
        }

        /* ===== NOTIFICATION BANNER ===== */
        .notification-banner {
            padding: 8px 20px;
            background: rgba(232, 67, 147, 0.08);
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
            flex-shrink: 0;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 992px) {
            .chat-layout {
                grid-template-columns: 1fr;
                height: auto;
                padding: 0 12px;
            }
            .chat-sidebar {
                border-radius: var(--radius-xl) var(--radius-xl) 0 0;
                max-height: 340px;
            }
            .chat-main {
                border-radius: 0 0 var(--radius-xl) var(--radius-xl);
                border-left: 1px solid var(--border-color);
                min-height: 450px;
                height: 500px;
            }
            .chat-list {
                max-height: 200px;
            }
            .message {
                max-width: 85%;
            }
            .chat-input .input-wrap {
                flex: 1;
                min-width: 80px;
            }
        }
        @media (max-width: 600px) {
            .chat-layout {
                margin: 12px auto;
                padding: 0 8px;
            }
            .chat-header {
                padding: 12px 16px;
            }
            .chat-messages {
                padding: 14px 16px;
            }
            .chat-input {
                padding: 10px 12px 14px;
            }
            .chat-input .input-wrap {
                padding: 2px 2px 2px 14px;
            }
            .chat-input .input-wrap input {
                font-size: 13px;
                padding: 8px 4px;
            }
            .chat-input .btn-icon {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            .chat-input .send-btn {
                width: 42px;
                height: 42px;
                font-size: 17px;
            }
            .message {
                max-width: 90%;
                padding: 8px 12px;
            }
            .message .text {
                font-size: 13px;
            }
            .chat-sidebar .sidebar-header h3 {
                font-size: 16px;
            }
            .chat-item {
                padding: 10px 12px;
                gap: 10px;
            }
            .chat-item .avatar {
                width: 42px;
                height: 42px;
                font-size: 18px;
            }
            .quick-replies-popup {
                min-width: 180px;
                max-width: 240px;
                left: 4px;
                bottom: 50px;
            }
        }
        @media (max-width: 400px) {
            .chat-header .info .name {
                font-size: 14px;
            }
            .chat-header .info .status {
                font-size: 11px;
            }
            .chat-item .info .name {
                font-size: 13px;
            }
            .chat-item .info .last-msg {
                font-size: 12px;
            }
            .voice-recording {
                flex-wrap: wrap;
                gap: 8px;
                padding: 8px 14px;
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message {
            animation: fadeIn 0.2s ease;
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">🍪 Куки</a>
            <div class="header-actions" id="headerActions">
                <div class="loading-spinner" style="width:24px;height:24px;margin:0;"></div>
            </div>
        </div>
    </header>

    <!-- ===== CHAT LAYOUT ===== -->
    <div class="chat-layout">

        <!-- ===== SIDEBAR ===== -->
        <aside class="chat-sidebar">
            <div class="sidebar-header">
                <h3>
                    💬 Чаты
                    <span class="count" id="chatCount">0</span>
                </h3>
            </div>
            <div class="search">
                <div class="search-wrap">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="searchChat" placeholder="Поиск чатов...">
                </div>
            </div>
            <div class="chat-list" id="chatList">
                <div class="loading-spinner" style="margin:20px auto;"></div>
            </div>
        </aside>

        <!-- ===== MAIN ===== -->
        <main class="chat-main">

            <!-- ===== CHAT HEADER ===== -->
            <div class="chat-header" id="chatHeader">
                <div class="avatar-wrap">
                    <div class="avatar" id="chatAvatar">💬</div>
                    <div class="online-dot" id="chatOnlineDot"></div>
                </div>
                <div class="info">
                    <div class="name" id="chatName">Выберите чат</div>
                    <div class="status" id="chatStatus">Начните общение</div>
                </div>
                <div class="header-actions">
                    <button id="chatMenuBtn" title="Ещё">⋯</button>
                </div>
            </div>

            <!-- ===== MESSAGES ===== -->
            <div class="chat-messages" id="chatMessages">
                <div class="empty-chat">
                    <div class="icon">💬</div>
                    <h3>Нет сообщений</h3>
                    <p>Выберите чат слева или начните новый</p>
                </div>
            </div>

            <!-- ===== INPUT ===== -->
            <div class="chat-input" id="chatInput" style="display:none;">
                <div class="input-row">
                    <div class="input-wrap">
                        <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off">
                        <button class="quick-reply-btn" id="quickReplyBtn" title="Быстрые ответы">⚡</button>
                        <div class="quick-replies-popup" id="quickRepliesPopup"></div>
                    </div>
                    <button class="btn-icon" id="attachBtn" title="Прикрепить файл">📎</button>
                    <button class="btn-icon" id="voiceBtn" title="Голосовое сообщение">🎤</button>
                    <button class="send-btn" id="sendBtn">➤</button>
                    <input type="file" id="fileInput" accept="image/*,video/*" style="display:none">
                </div>

                <!-- ===== VOICE RECORDING ===== -->
                <div class="voice-recording" id="voiceRecording">
                    <span class="pulse"></span>
                    <span class="rec-label">🔴 Запись</span>
                    <span class="timer" id="voiceTimer">0:00</span>
                    <button class="cancel-btn" id="cancelRecordingBtn">✕</button>
                    <button class="stop-btn" id="stopRecordingBtn">⏹️ Остановить</button>
                </div>
            </div>

        </main>
    </div>

    <script>
        // ========================================
        // FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ========================================
        // QUICK REPLIES
        // ========================================
        const QUICK_REPLIES = [
            { emoji: '👋', text: 'Здравствуйте! Товар ещё доступен?' },
            { emoji: '✅', text: 'Да, товар в наличии' },
            { emoji: '📅', text: 'Когда можно забрать?' },
            { emoji: '👀', text: 'Можно посмотреть товар?' },
            { emoji: '🙏', text: 'Спасибо за покупку!' },
            { emoji: '🤝', text: 'Договорились!' },
            { emoji: '💰', text: 'Цена окончательная?' },
            { emoji: '🤔', text: 'Можно торг?' },
            { emoji: '📍', text: 'Где находитесь?' },
            { emoji: '📮', text: 'Отправьте адрес' }
        ];

        // ========================================
        // STATE
        // ========================================
        let currentUser = null;
        let userData = {};
        let currentChatId = null;
        let chats = [];
        let unsubscribe = null;
        let selectedFile = null;
        let audioBlob = null;
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimer = null;
        let recordingSeconds = 0;
        let isRecording = false;

        // ========================================
        // DOM REFS
        // ========================================
        const headerActions = document.getElementById('headerActions');
        const chatList = document.getElementById('chatList');
        const chatHeader = document.getElementById('chatHeader');
        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const attachBtn = document.getElementById('attachBtn');
        const fileInput = document.getElementById('fileInput');
        const searchChat = document.getElementById('searchChat');
        const quickReplyBtn = document.getElementById('quickReplyBtn');
        const quickRepliesPopup = document.getElementById('quickRepliesPopup');
        const voiceBtn = document.getElementById('voiceBtn');
        const voiceRecording = document.getElementById('voiceRecording');
        const stopRecordingBtn = document.getElementById('stopRecordingBtn');
        const cancelRecordingBtn = document.getElementById('cancelRecordingBtn');
        const voiceTimer = document.getElementById('voiceTimer');
        const chatCount = document.getElementById('chatCount');

        // ========================================
        // AUTH
        // ========================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }
            currentUser = user;
            const doc = await db.collection("users").doc(user.uid).get();
            userData = doc.data() || {};
            setupHeader();
            setupOnlineStatus();
            await loadChats();
            setupEvents();
            setupQuickReplies();

            const urlParams = new URLSearchParams(window.location.search);
            const chatId = urlParams.get('chatId');
            if (chatId) {
                currentChatId = chatId;
                await openChat(chatId);
            }
        });

        // ========================================
        // ONLINE STATUS
        // ========================================
        function setupOnlineStatus() {
            const onlineRef = db.collection("online").doc(currentUser.uid);
            onlineRef.set({
                userId: currentUser.uid,
                online: true,
                lastSeen: new Date().toISOString()
            }, { merge: true });

            window.addEventListener('beforeunload', () => {
                onlineRef.update({ online: false, lastSeen: new Date().toISOString() });
            });

            setInterval(() => {
                onlineRef.update({ lastSeen: new Date().toISOString() });
            }, 30000);
        }

        async function checkOnline(userId) {
            try {
                const doc = await db.collection("online").doc(userId).get();
                if (!doc.exists) return false;
                const data = doc.data();
                if (!data.online) return false;
                const lastSeen = new Date(data.lastSeen);
                const now = new Date();
                return (now - lastSeen) < 60000;
            } catch (e) { return false; }
        }

        // ========================================
        // HEADER
        // ========================================
        function setupHeader() {
            headerActions.innerHTML = `
                <div class="balance-badge" onclick="window.location.href='wallet.html'">💰 ${(userData.balance || 0).toLocaleString()} ₽</div>
                <a href="cart.html" class="btn btn-secondary btn-sm">🛒</a>
                <div class="header-user" onclick="window.location.href='profile/index.html'">
                    <img src="${userData.photoURL || 'https://ui-avatars.com/api/?name=' + (userData.name || 'User') + '&background=6C3B8E&color=fff'}" class="avatar">
                    <span class="name">${userData.name?.split(' ')[0] || 'Профиль'}</span>
                </div>
            `;
        }

        // ========================================
        // QUICK REPLIES
        // ========================================
        function setupQuickReplies() {
            quickRepliesPopup.innerHTML = QUICK_REPLIES.map(q => `
                <div class="reply-item" data-text="${q.text}">
                    <span class="emoji">${q.emoji}</span> ${q.text}
                </div>
            `).join('');

            quickRepliesPopup.querySelectorAll('.reply-item').forEach(item => {
                item.onclick = () => {
                    const text = item.dataset.text;
                    messageInput.value = text;
                    quickRepliesPopup.classList.remove('active');
                    messageInput.focus();
                    sendMessage();
                };
            });
        }

        // ========================================
        // CHATS
        // ========================================
        async function loadChats() {
            try {
                const snapshot = await db.collection("chats")
                    .where("participants", "array-contains", currentUser.uid)
                    .orderBy("lastMessageTime", "desc")
                    .get();

                chats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                chatCount.textContent = chats.length;
                renderChats();
            } catch (error) {
                console.error('Error loading chats:', error);
                chatList.innerHTML = `
                    <div style="padding:30px; text-align:center; color:var(--text-muted);">
                        <div style="font-size:32px; margin-bottom:8px;">⚠️</div>
                        <p>Ошибка загрузки</p>
                    </div>
                `;
            }
        }

        function renderChats(filter = '') {
            const filtered = filter ?
                chats.filter(c => (c.listingTitle || '').toLowerCase().includes(filter.toLowerCase())) :
                chats;

            if (filtered.length === 0) {
                chatList.innerHTML = `
                    <div style="padding:30px; text-align:center; color:var(--text-muted);">
                        <div style="font-size:32px; margin-bottom:8px;">💬</div>
                        <p>${filter ? 'Ничего не найдено' : 'Нет чатов'}</p>
                        ${!filter ? '<p style="font-size:13px;">Начните общение с продавцом</p>' : ''}
                    </div>
                `;
                return;
            }

            chatList.innerHTML = filtered.map(chat => {
                const otherUser = chat.participants?.find(p => p !== currentUser.uid);
                const isActive = chat.id === currentChatId;
                const unread = chat.unread?.[currentUser.uid] || 0;

                return `
                    <div class="chat-item ${isActive ? 'active' : ''}" data-chat-id="${chat.id}">
                        <div class="avatar-wrap">
                            <div class="avatar">${chat.listingTitle?.charAt(0).toUpperCase() || '💬'}</div>
                            <div class="online-dot" id="online-${chat.id}"></div>
                        </div>
                        <div class="info">
                            <div class="name">
                                ${escapeHtml(chat.listingTitle || 'Товар')}
                                ${chat.isSeller ? '<span class="badge-seller">Продавец</span>' : ''}
                            </div>
                            <div class="last-msg" id="lastMsg-${chat.id}">
                                ${chat.lastMessage || 'Новое сообщение'}
                                ${chat.typing?.[currentUser.uid] ? '<span class="typing-indicator">✍️ печатает...</span>' : ''}
                            </div>
                        </div>
                        <div class="time">${chat.lastMessageTime ? new Date(chat.lastMessageTime).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</div>
                        ${unread > 0 ? `<div class="unread">${unread}</div>` : ''}
                    </div>
                `;
            }).join('');

            // Проверяем онлайн статус
            filtered.forEach(chat => {
                const otherUser = chat.participants?.find(p => p !== currentUser.uid);
                if (otherUser) {
                    checkOnline(otherUser).then(isOnline => {
                        const dot = document.getElementById(`online-${chat.id}`);
                        if (dot) {
                            dot.classList.toggle('online', isOnline);
                        }
                    });
                }
            });

            chatList.querySelectorAll('.chat-item').forEach(item => {
                item.onclick = () => {
                    const chatId = item.dataset.chatId;
                    currentChatId = chatId;
                    openChat(chatId);
                };
            });
        }

        // ========================================
        // OPEN CHAT
        // ========================================
        async function openChat(chatId) {
            document.querySelectorAll('.chat-item').forEach(el => {
                el.classList.toggle('active', el.dataset.chatId === chatId);
            });

            const chatDoc = await db.collection("chats").doc(chatId).get();
            if (!chatDoc.exists) {
                showNotification('Чат не найден', 'error');
                return;
            }

            const chat = chatDoc.data();
            const otherUser = chat.participants?.find(p => p !== currentUser.uid);

            // Обновляем шапку
            document.getElementById('chatAvatar').innerHTML = chat.listingTitle?.charAt(0).toUpperCase() || '💬';
            document.getElementById('chatName').textContent = chat.listingTitle || 'Чат';

            if (otherUser) {
                const isOnline = await checkOnline(otherUser);
                const statusEl = document.getElementById('chatStatus');
                const dot = document.getElementById('chatOnlineDot');

                if (isOnline) {
                    statusEl.innerHTML = '<span style="color:#2ECC71;">🟢 Онлайн</span>';
                    dot.classList.add('online');
                } else {
                    statusEl.textContent = 'Был(а) недавно';
                    dot.classList.remove('online');
                }

                try {
                    const userDoc = await db.collection("users").doc(otherUser).get();
                    if (userDoc.exists) {
                        const otherData = userDoc.data();
                        if (otherData.name) {
                            document.getElementById('chatName').textContent = otherData.name;
                        }
                        if (otherData.photoURL) {
                            document.getElementById('chatAvatar').innerHTML =
                                `<img src="${otherData.photoURL}" alt="Аватар">`;
                        }
                    }
                } catch (e) {}
            }

            chatInput.style.display = 'block';

            // Отмечаем прочитанные
            if (chat.unread?.[currentUser.uid]) {
                const updates = {};
                updates[`unread.${currentUser.uid}`] = 0;
                await db.collection("chats").doc(chatId).update(updates);
                await loadChats();
            }

            // Подписка на сообщения
            if (unsubscribe) unsubscribe();
            unsubscribe = db.collection("messages")
                .where("chatId", "==", chatId)
                .orderBy("timestamp", "asc")
                .onSnapshot((snapshot) => {
                    const messages = snapshot.docs.map(doc => doc.data());
                    renderMessages(messages);
                });

            // Подписка на статус печати
            db.collection("chats").doc(chatId).onSnapshot((doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    const isTyping = data.typing?.[currentUser.uid] || false;
                    const statusEl = document.getElementById('chatStatus');
                    if (isTyping) {
                        statusEl.innerHTML = '<span class="typing-status">✍️ печатает...</span>';
                    } else {
                        const other = chat.participants?.find(p => p !== currentUser.uid);
                        if (other) {
                            checkOnline(other).then(online => {
                                statusEl.innerHTML = online ?
                                    '<span style="color:#2ECC71;">🟢 Онлайн</span>' :
                                    'Был(а) недавно';
                            });
                        }
                    }
                }
            });

            // Сохраняем в URL
            const url = new URL(window.location);
            url.searchParams.set('chatId', chatId);
            window.history.pushState({}, '', url);
        }

        // ========================================
        // RENDER MESSAGES
        // ========================================
        function renderMessages(messages) {
            const container = chatMessages;

            if (messages.length === 0) {
                container.innerHTML = `
                    <div class="empty-chat">
                        <div class="icon">💬</div>
                        <h3>Нет сообщений</h3>
                        <p>Напишите первое сообщение</p>
                    </div>
                `;
                return;
            }

            let lastDate = '';
            container.innerHTML = messages.map(msg => {
                const isMy = msg.senderId === currentUser.uid;
                const msgDate = msg.timestamp ? new Date(msg.timestamp).toLocaleDateString('ru-RU', {
                    day: 'numeric',
                    month: 'long'
                }) : '';

                let dateSeparator = '';
                if (msgDate && msgDate !== lastDate) {
                    dateSeparator = `
                        <div class="date-divider"><span>${msgDate}</span></div>
                    `;
                    lastDate = msgDate;
                }

                let mediaHtml = '';
                if (msg.imageUrl) {
                    mediaHtml = `<img src="${msg.imageUrl}" class="media" loading="lazy">`;
                }
                if (msg.videoUrl) {
                    mediaHtml = `<video src="${msg.videoUrl}" class="media" controls></video>`;
                }

                let voiceHtml = '';
                if (msg.voiceUrl) {
                    const randomBars = Array.from({ length: 20 }, () => Math.floor(Math.random() * 20) + 5);
                    voiceHtml = `
                        <div class="voice-message">
                            <button class="play-btn" onclick="toggleVoice(this, '${msg.voiceUrl}')">▶️</button>
                            <div class="waveform">
                                ${randomBars.map(h => `<div class="bar" style="height:${h}px;"></div>`).join('')}
                            </div>
                            <span class="duration">${msg.duration || '0:05'}</span>
                        </div>
                    `;
                }

                return `
                    ${dateSeparator}
                    <div class="message ${isMy ? 'my' : 'their'}">
                        ${!isMy ? `<div class="sender">${escapeHtml(msg.senderName || 'Пользователь')}</div>` : ''}
                        ${msg.text ? `<div class="text">${escapeHtml(msg.text)}</div>` : ''}
                        ${mediaHtml}
                        ${voiceHtml}
                        <div class="time">${msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'}) : ''}</div>
                    </div>
                `;
            }).join('');

            container.scrollTop = container.scrollHeight;
        }

        // ========================================
        // VOICE PLAYER
        // ========================================
        let currentAudio = null;

        window.toggleVoice = function(btn, url) {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio = null;
                btn.textContent = '▶️';
                return;
            }

            const audio = new Audio(url);
            currentAudio = audio;
            btn.textContent = '⏸️';

            audio.play();
            audio.onended = () => {
                btn.textContent = '▶️';
                currentAudio = null;
            };
            audio.onerror = () => {
                btn.textContent = '▶️';
                currentAudio = null;
                showNotification('Ошибка воспроизведения', 'error');
            };
        };

        // ========================================
        // SEND MESSAGE
        // ========================================
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text && !selectedFile && !audioBlob) return;

            const msgData = {
                chatId: currentChatId,
                senderId: currentUser.uid,
                senderName: userData.name || 'Пользователь',
                timestamp: new Date().toISOString()
            };

            if (text) msgData.text = text;
            if (selectedFile) {
                try {
                    const ref = storage.ref(`chat_files/${currentChatId}/${Date.now()}_${selectedFile.name}`);
                    await ref.put(selectedFile);
                    const url = await ref.getDownloadURL();

                    if (selectedFile.type.startsWith('image/')) {
                        msgData.imageUrl = url;
                    } else if (selectedFile.type.startsWith('video/')) {
                        msgData.videoUrl = url;
                    }
                    selectedFile = null;
                } catch (e) {
                    console.error('File upload error:', e);
                    showNotification('Ошибка загрузки файла', 'error');
                    return;
                }
            }

            if (audioBlob) {
                try {
                    const ref = storage.ref(`chat_voice/${currentChatId}/${Date.now()}.webm`);
                    await ref.put(audioBlob);
                    const url = await ref.getDownloadURL();
                    msgData.voiceUrl = url;
                    msgData.duration = formatDuration(recordingSeconds);
                    audioBlob = null;
                    recordingSeconds = 0;
                } catch (e) {
                    console.error('Voice upload error:', e);
                    showNotification('Ошибка загрузки голосового', 'error');
                    return;
                }
            }

            await db.collection("messages").add(msgData);

            // Обновляем чат
            await db.collection("chats").doc(currentChatId).update({
                lastMessage: text || (msgData.imageUrl ? '📷 Фото' : msgData.voiceUrl ? '🎤 Голосовое' : '🎥 Видео'),
                lastMessageTime: new Date().toISOString()
            });

            messageInput.value = '';
            sendBtn.disabled = true;
            voiceRecording.classList.remove('active');
            await loadChats();

            // Сбрасываем статус печати
            await db.collection("chats").doc(currentChatId).update({
                [`typing.${currentUser.uid}`]: false
            });
        }

        // ========================================
        // TYPING INDICATOR
        // ========================================
        messageInput.addEventListener('input', () => {
            if (!currentChatId) return;

            if (messageInput.value.length > 0) {
                db.collection("chats").doc(currentChatId).update({
                    [`typing.${currentUser.uid}`]: true
                });

                if (typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    db.collection("chats").doc(currentChatId).update({
                        [`typing.${currentUser.uid}`]: false
                    });
                }, 3000);
            } else {
                db.collection("chats").doc(currentChatId).update({
                    [`typing.${currentUser.uid}`]: false
                });
            }

            const text = messageInput.value.trim();
            sendBtn.disabled = text.length === 0 && !selectedFile && !audioBlob;
        });

        // ========================================
        // VOICE RECORDING
        // ========================================
        async function startRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = (event) => {
                    audioChunks.push(event.data);
                };

                mediaRecorder.onstop = () => {
                    audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    stream.getTracks().forEach(track => track.stop());
                    if (audioBlob.size > 0) {
                        showNotification('🎤 Голосовое записано!', 'success');
                        sendMessage();
                    }
                };

                mediaRecorder.start();
                isRecording = true;
                recordingSeconds = 0;

                voiceRecording.classList.add('active');
                voiceBtn.style.display = 'none';

                recordingTimer = setInterval(() => {
                    recordingSeconds++;
                    voiceTimer.textContent = formatDuration(recordingSeconds);
                }, 1000);

            } catch (error) {
                console.error('Microphone error:', error);
                showNotification('❌ Нет доступа к микрофону', 'error');
            }
        }

        function stopRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingTimer);
                voiceRecording.classList.remove('active');
                voiceBtn.style.display = 'flex';
                voiceTimer.textContent = '0:00';
            }
        }

        function cancelRecording() {
            if (mediaRecorder && isRecording) {
                mediaRecorder.stop();
                isRecording = false;
                clearInterval(recordingTimer);
                audioChunks = [];
                audioBlob = null;
                voiceRecording.classList.remove('active');
                voiceBtn.style.display = 'flex';
                voiceTimer.textContent = '0:00';
                showNotification('Запись отменена', 'info');
            }
        }

        function formatDuration(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s.toString().padStart(2, '0')}`;
        }

        // ========================================
        // EVENTS
        // ========================================
        function setupEvents() {
            // Send
            sendBtn.onclick = sendMessage;
            messageInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });

            // Attach file
            attachBtn.onclick = () => fileInput.click();
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    if (file.size > 10 * 1024 * 1024) {
                        showNotification('Файл слишком большой (макс 10 МБ)', 'error');
                        return;
                    }
                    selectedFile = file;
                    showNotification(`📎 Выбран файл: ${file.name}`, 'info');
                    sendBtn.disabled = false;
                }
                fileInput.value = '';
            };

            // Quick replies
            quickReplyBtn.onclick = (e) => {
                e.stopPropagation();
                quickRepliesPopup.classList.toggle('active');
            };
            document.addEventListener('click', () => {
                quickRepliesPopup.classList.remove('active');
            });

            // Voice
            voiceBtn.onclick = startRecording;
            stopRecordingBtn.onclick = stopRecording;
            cancelRecordingBtn.onclick = cancelRecording;

            // Search
            searchChat.addEventListener('input', (e) => {
                renderChats(e.target.value);
            });
        }

        // ========================================
        // NOTIFICATIONS
        // ========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.notification').forEach(el => el.remove());

            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                setTimeout(() => notification.remove(), 300);
            }, 3500);
        }

        // ========================================
        // UTILITY
        // ========================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
        }
    </script>
</body>
</html>
