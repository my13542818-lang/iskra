<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кошелёк — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="wallet-container">
    <div class="balance-card">
        <h3>💰 Мой кошелёк</h3>
        <div class="balance-amount" id="balance">0 ₽</div>
        <button class="btn" id="addFundsBtn" style="background:white; color:#9b59b6;">Пополнить</button>
    </div>
    <div class="content-card" style="margin-top:24px;">
        <h3>🎁 Промокод</h3>
        <div class="promo-input" style="display:flex; gap:12px;">
            <input type="text" id="promoCode" class="form-control" placeholder="Введите промокод">
            <button class="btn-primary" id="applyPromoBtn">Активировать</button>
        </div>
    </div>
    <div class="content-card">
        <h3>📋 История операций</h3>
        <div id="transactionsList"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        await loadWallet();
    });
    
    async function loadWallet() {
        const userDoc = await db.collection("users").doc(auth.currentUser.uid).get();
        const balance = userDoc.data()?.balance || 0;
        document.getElementById('balance').innerHTML = balance.toLocaleString() + ' ₽';
        const transactions = await db.collection("transactions").where("userId", "==", auth.currentUser.uid).orderBy("createdAt", "desc").get();
        const container = document.getElementById('transactionsList');
        if (transactions.empty) { container.innerHTML = '<div class="empty-state">Нет операций</div>'; return; }
        container.innerHTML = transactions.docs.map(t => `<div class="transaction-item"><span>${t.data().description}</span><span>${t.data().amount > 0 ? '+' : ''}${t.data().amount} ₽</span></div>`).join('');
    }
    
    document.getElementById('addFundsBtn').onclick = () => { const amount = prompt('Введите сумму пополнения (от 100 ₽):'); if(amount && parseInt(amount) >= 100) alert(`Демо: добавлено ${amount} ₽ на счёт.`); };
    document.getElementById('applyPromoBtn').onclick = () => { const code = document.getElementById('promoCode').value; if(code) alert(`✅ Промокод ${code} активирован! Бонус зачислен.`); };
</script>
</body>
</html>
