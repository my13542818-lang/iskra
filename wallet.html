<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой кошелёк — Куки</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a0c; color: white; }
        .header { background: #0b0b0e; border-bottom: 1px solid #2a1a2c; padding: 12px 20px; }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .btn { padding: 8px 16px; border-radius: 40px; border: 1px solid #441d46; background: #111014; color: white; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #ac2f3a; border-color: #d44545; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .wallet-card { background: #0f0e13; border-radius: 32px; padding: 32px; border: 1px solid #2d1e32; text-align: center; }
        .balance { font-size: 48px; font-weight: 800; color: #ff6b4a; margin: 20px 0; }
        .btn-large { padding: 14px 28px; font-size: 16px; margin: 10px; }
        .transactions { margin-top: 32px; }
        .transaction-item { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #2d1e32; }
        .transaction-positive { color: #5cb85c; }
        .transaction-negative { color: #d9534f; }
        .promo-input { display: flex; gap: 10px; margin-top: 20px; }
        .promo-input input { flex: 1; padding: 12px; background: #121114; border: 1px solid #2f2332; border-radius: 40px; color: white; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="container">
    <div class="wallet-card">
        <h2>💳 Мой кошелёк</h2>
        <div class="balance" id="balance">0 ₽</div>
        
        <button class="btn btn-primary btn-large" id="addFundsBtn">➕ Пополнить</button>
        
        <div class="promo-input">
            <input type="text" id="promoCode" placeholder="Введите промокод">
            <button class="btn btn-primary" id="applyPromoBtn">🎁 Активировать</button>
        </div>
        
        <div class="transactions">
            <h3>📋 История операций</h3>
            <div id="transactionsList"></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        
        document.getElementById('userActions').innerHTML = `
            <div class="user-info">
                <img src="${user.photoURL || ''}" class="user-avatar">
                <span>${user.displayName?.split(' ')[0] || 'User'}</span>
            </div>
            <button class="btn" id="logoutBtn">Выйти</button>
        `;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        
        await loadWallet();
        await loadTransactions();
        await loadPromoCodes();
    });
    
    async function loadWallet() {
        const userDoc = await db.collection("users").doc(auth.currentUser.uid).get();
        const balance = userDoc.data()?.balance || 0;
        document.getElementById('balance').innerHTML = balance.toLocaleString() + ' ₽';
    }
    
    async function loadTransactions() {
        const snapshot = await db.collection("transactions")
            .where("userId", "==", auth.currentUser.uid)
            .orderBy("createdAt", "desc")
            .limit(50)
            .get();
        
        const transactions = snapshot.docs.map(doc => doc.data());
        const container = document.getElementById('transactionsList');
        
        if (transactions.length === 0) {
            container.innerHTML = '<div style="text-align:center; padding:20px;">Нет операций</div>';
            return;
        }
        
        container.innerHTML = transactions.map(t => `
            <div class="transaction-item">
                <span>${t.description}</span>
                <span class="${t.amount > 0 ? 'transaction-positive' : 'transaction-negative'}">
                    ${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()} ₽
                </span>
                <span style="font-size:12px; color:#666;">${new Date(t.createdAt).toLocaleDateString()}</span>
            </div>
        `).join('');
    }
    
    async function loadPromoCodes() {
        // Проверяем использованные промокоды
        const usedSnapshot = await db.collection("used_promocodes")
            .where("userId", "==", auth.currentUser.uid)
            .get();
        const usedCodes = usedSnapshot.docs.map(doc => doc.data().code);
        window.usedPromoCodes = usedCodes;
        
        // Загружаем активные промокоды
        const promoSnapshot = await db.collection("promocodes")
            .where("active", "==", true)
            .get();
        window.activePromoCodes = promoSnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }
    
    document.getElementById('addFundsBtn').onclick = () => {
        const amount = prompt('Введите сумму пополнения (от 100 ₽):');
        if (amount && parseInt(amount) >= 100) {
            alert(`Демо: Добавлено ${amount} ₽ на счёт. В реальном проекте здесь будет подключена платёжная система.`);
            // В реальном проекте здесь будет вызов платёжной системы
        }
    };
    
    document.getElementById('applyPromoBtn').onclick = async () => {
        const code = document.getElementById('promoCode').value.trim().toUpperCase();
        if (!code) { alert('Введите промокод'); return; }
        
        if (window.usedPromoCodes && window.usedPromoCodes.includes(code)) {
            alert('❌ Вы уже использовали этот промокод');
            return;
        }
        
        const promo = window.activePromoCodes?.find(p => p.code === code);
        if (!promo) {
            alert('❌ Промокод не найден или неактивен');
            return;
        }
        
        // Начисляем бонус
        const userRef = db.collection("users").doc(auth.currentUser.uid);
        const userDoc = await userRef.get();
        const currentBalance = userDoc.data()?.balance || 0;
        const newBalance = currentBalance + promo.bonus;
        
        await userRef.update({ balance: newBalance });
        
        await db.collection("transactions").add({
            userId: auth.currentUser.uid,
            amount: promo.bonus,
            description: `Промокод ${code}`,
            createdAt: new Date().toISOString()
        });
        
        await db.collection("used_promocodes").add({
            userId: auth.currentUser.uid,
            code: code,
            usedAt: new Date().toISOString()
        });
        
        alert(`✅ Активирован промокод ${code}! Получено ${promo.bonus} ₽`);
        document.getElementById('promoCode').value = '';
        await loadWallet();
        await loadTransactions();
        await loadPromoCodes();
    };
</script>
</body>
</html>
