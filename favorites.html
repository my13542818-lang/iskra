<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Избранное — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
</head>
<body>
<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>
<div class="favorites-container" style="max-width:1200px; margin:30px auto; padding:0 24px;">
    <h1 style="margin-bottom:24px;">❤️ Избранное</h1>
    <div id="favoritesGrid" class="favorites-grid"></div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        await loadFavorites();
    });
    
    async function loadFavorites() {
        const snapshot = await db.collection("favorites").where("userId", "==", auth.currentUser.uid).get();
        const favorites = [];
        for (const fav of snapshot.docs) {
            const listing = await db.collection("listings").doc(fav.data().listingId).get();
            if (listing.exists) favorites.push({ id: listing.id, ...listing.data() });
        }
        const container = document.getElementById('favoritesGrid');
        if (favorites.length === 0) { container.innerHTML = '<div class="empty-state"><h3>⭐ Нет избранных</h3><a href="index.html" class="btn-primary">Перейти к покупкам</a></div>'; return; }
        container.innerHTML = favorites.map(ad => `
            <div class="listing-card" onclick="window.location.href='product.html?id=${ad.id}'">
                <div class="listing-img">${ad.image || '📦'}</div>
                <div class="listing-info">
                    <div class="listing-title">${ad.title}</div>
                    <div class="listing-price">${ad.price} ₽</div>
                    <div class="listing-meta">📍 ${ad.location || 'Не указан'}</div>
                </div>
            </div>
        `).join('');
    }
</script>
</body>
</html>
