<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Куки — доска объявлений</title>
    
    <!-- Firebase SDK (через CDN) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <!-- Конфигурация Firebase -->
    <script src="firebase-config.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a0c; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        .header { background: #0b0b0e; border-bottom: 1px solid #2a1a2c; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1200px; margin: 0 auto; padding: 12px 20px; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 15px; }
        .logo { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        
        .search-wrapper { flex: 1; max-width: 500px; margin: 0 auto; }
        .search-bar { display: flex; gap: 8px; background: #121114; border: 1px solid #2f2332; border-radius: 60px; padding: 4px 4px 4px 18px; }
        .search-bar input { flex: 1; background: transparent; border: none; color: white; outline: none; font-size: 15px; padding: 10px 0; }
        .search-bar button { background: linear-gradient(95deg, #b52b1a, #8a1c50); border: none; padding: 8px 24px; border-radius: 60px; color: white; cursor: pointer; font-weight: bold; }
        
        .btn { padding: 8px 16px; border-radius: 40px; border: 1px solid #441d46; background: #111014; color: white; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; }
        .btn-primary { background: #ac2f3a; border-color: #d44545; color: white; }
        
        .user-actions { display: flex; align-items: center; gap: 10px; }
        .user-info { display: flex; align-items: center; gap: 10px; background: #121114; padding: 5px 12px 5px 8px; border-radius: 40px; cursor: pointer; }
        .user-avatar { width: 32px; height: 32px; border-radius: 50%; background: #1a1620; display: flex; align-items: center; justify-content: center; }
        
        .filters { background: #0c0b10f2; border-bottom: 1px solid #291e2c; padding: 10px 20px; position: sticky; top: 70px; z-index: 99; overflow-x: auto; }
        .filters-container { max-width: 1200px; margin: 0 auto; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .filter-group { display: inline-flex; align-items: center; gap: 6px; background: #18141c; padding: 6px 14px; border-radius: 40px; border: 1px solid #3a253e; }
        .filter-group span { font-size: 12px; color: #ffcfbf; }
        .filter-group select, .filter-group input { background: transparent; border: none; color: white; padding: 5px 0; outline: none; font-size: 12px; }
        
        .main-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; flex: 1; }
        .listings-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .listing-card { background: #0f0e13; border-radius: 20px; border: 1px solid #2d1e32; overflow: hidden; cursor: pointer; transition: 0.2s; }
        .listing-card:hover { border-color: #b6474a; transform: translateY(-3px); }
        .listing-img { height: 170px; background: #1a1620; display: flex; align-items: center; justify-content: center; font-size: 50px; overflow: hidden; }
        .listing-info { padding: 12px; }
        .listing-title { font-size: 16px; font-weight: 700; margin-bottom: 5px; color: #ffddd3; }
        .listing-price { font-size: 20px; font-weight: 800; color: #ff6b4a; margin: 6px 0; }
        .card-actions { display: flex; gap: 8px; margin-top: 10px; }
        .small-btn { padding: 5px 12px; border-radius: 30px; background: #19161f; border: 1px solid #3f2a44; color: white; cursor: pointer; font-size: 11px; }
        .small-btn.fav-active { background: #b52b2b; }
        
        .empty-state { text-align: center; padding: 60px; background: #0f0e13; border-radius: 20px; }
        
        .footer { background: #0b0b0e; border-top: 1px solid #2a1a2c; padding: 30px 20px; margin-top: 40px; }
        .footer-container { max-width: 1200px; margin: 0 auto; display: flex; flex-wrap: wrap; justify-content: space-between; gap: 30px; }
        .footer-section { flex: 1; min-width: 200px; }
        .footer-section h4 { color: #ffcfbf; margin-bottom: 15px; }
        .footer-section p, .footer-section a { color: #a492b0; font-size: 13px; text-decoration: none; }
        .footer-bottom { text-align: center; padding-top: 20px; margin-top: 20px; border-top: 1px solid #2a1a2c; color: #666; font-size: 12px; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0f0e13; border-radius: 32px; padding: 32px; max-width: 450px; width: 90%; border: 1px solid #b6474a; }
        .form-row { margin-bottom: 16px; }
        .form-row input { width: 100%; padding: 12px; background: #121114; border: 1px solid #2f2332; border-radius: 20px; color: white; outline: none; }
        .divider { text-align: center; margin: 20px 0; position: relative; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #2d1e32; }
        .divider span { background: #0f0e13; padding: 0 15px; position: relative; color: #a492b0; }
        .google-btn { background: #111014; border: 1px solid #3a253e; width: 100%; padding: 12px; border-radius: 40px; color: white; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .close-modal { float: right; font-size: 24px; cursor: pointer; color: #a492b0; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <div class="search-wrapper">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Что вы ищете?">
                <button id="searchBtn">Найти</button>
            </div>
        </div>
        <div id="userActions"></div>
    </div>
</div>

<div class="filters">
    <div class="filters-container">
        <div class="filter-group"><span>📂 Категория</span><select id="categoryFilter"><option value="all">Все</option><option value="электроника">Электроника</option><option value="одежда">Одежда</option><option value="авто">Авто</option></select></div>
        <div class="filter-group"><span>💰 Цена до</span><input type="number" id="priceFilter" placeholder="Любая"></div>
        <div class="filter-group"><span>📌 Состояние</span><select id="conditionFilter"><option value="all">Любое</option><option value="new">Новое</option><option value="used">Б/У</option></select></div>
        <div class="filter-group"><span>🌍 Город</span><input type="text" id="locationFilter" placeholder="Город"></div>
    </div>
</div>

<div class="main-container">
    <div id="listingsContainer" class="listings-grid"></div>
</div>

<div class="footer">
    <div class="footer-container">
        <div class="footer-section"><h4>🍪 КУКИ</h4><p>Доска объявлений</p></div>
        <div class="footer-section"><h4>📞 Контакты</h4><p>Телефон: <a href="tel:+79531114942">+7 (953) 111-49-42</a></p><p>Email: <a href="mailto:my13542818@gmail.com">my13542818@gmail.com</a></p></div>
        <div class="footer-section"><h4>💰 Реквизиты</h4><p>Самозанятая Вагина Нина Васильевна</p><p>ИНН: 233501711069</p></div>
    </div>
    <div class="footer-bottom"><p>© 2024-2025 Куки. Все права защищены.</p></div>
</div>

<div id="authModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="document.getElementById('authModal').style.display='none'">&times;</span>
        <h2 style="text-align:center;">🍪 Вход</h2>
        <button class="google-btn" id="googleSignInBtn">📧 Войти через Google</button>
    </div>
</div>

<script>
    // Ждём загрузки страницы и Firebase
    document.addEventListener('DOMContentLoaded', async () => {
        // Проверяем, загрузилась ли Firebase
        if (typeof firebase === 'undefined') {
            console.error("Firebase не загрузился!");
            document.getElementById('listingsContainer').innerHTML = '<div class="empty-state">Ошибка загрузки Firebase. Проверьте интернет-соединение.</div>';
            return;
        }
        
        console.log("Firebase загружен, инициализация...");
        
        let currentUser = null;
        let favorites = [];
        let allListings = [];
        
        const authModal = document.getElementById('authModal');
        const userActions = document.getElementById('userActions');
        
        // Фильтры
        document.getElementById('categoryFilter')?.addEventListener('change', loadListings);
        document.getElementById('priceFilter')?.addEventListener('input', loadListings);
        document.getElementById('conditionFilter')?.addEventListener('change', loadListings);
        document.getElementById('locationFilter')?.addEventListener('input', loadListings);
        document.getElementById('searchBtn')?.addEventListener('click', loadListings);
        
        document.getElementById('googleSignInBtn').onclick = async () => {
            if (window.signInWithGoogle) await window.signInWithGoogle();
        };
        
        function renderListings(listings) {
            const container = document.getElementById('listingsContainer');
            if (!listings || listings.length === 0) {
                container.innerHTML = `<div class="empty-state"><h3>🍪 Ничего не найдено</h3><p>Попробуйте другой поиск</p></div>`;
                return;
            }
            container.innerHTML = listings.map(ad => `
                <div class="listing-card" data-id="${ad.id}">
                    <div class="listing-img">${ad.image || '📦'}</div>
                    <div class="listing-info">
                        <div class="listing-title">${ad.title}</div>
                        <div class="listing-price">${Number(ad.price).toLocaleString()} ₽</div>
                        <div class="card-actions">
                            <button class="small-btn chat-btn" data-id="${ad.id}" data-seller="${ad.sellerId}" data-title="${ad.title}">💬 Чат</button>
                            <button class="small-btn fav-btn ${favorites.some(f => f.id === ad.id) ? 'fav-active' : ''}" data-id="${ad.id}">❤️</button>
                        </div>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.fav-btn').forEach(btn => {
                btn.onclick = async (e) => { e.stopPropagation(); if (!currentUser) { authModal.style.display = 'flex'; return; }
                    const id = btn.dataset.id;
                    if (favorites.some(f => f.id === id)) { await window.removeFromFavorites(id); favorites = favorites.filter(f => f.id !== id); }
                    else { await window.addToFavorites(id); const listing = allListings.find(l => l.id === id); if (listing) favorites.push(listing); }
                    btn.classList.toggle('fav-active', favorites.some(f => f.id === id));
                };
            });
            document.querySelectorAll('.chat-btn').forEach(btn => {
                btn.onclick = (e) => { e.stopPropagation(); if (!currentUser) { authModal.style.display = 'flex'; return; }
                    window.location.href = `chat.html?sellerId=${btn.dataset.seller}&listingId=${btn.dataset.id}&title=${encodeURIComponent(btn.dataset.title)}`;
                };
            });
        }
        
        async function loadListings() {
            const category = document.getElementById('categoryFilter')?.value || 'all';
            const maxPrice = parseInt(document.getElementById('priceFilter')?.value) || Infinity;
            if (window.getListings) {
                allListings = await window.getListings({ category, maxPrice });
                renderListings(allListings);
            }
        }
        
        function showUserDropdown() {
            const existing = document.querySelector('.user-dropdown');
            if (existing) { existing.remove(); return; }
            const dropdown = document.createElement('div');
            dropdown.className = 'user-dropdown';
            dropdown.style.cssText = 'position: absolute; top: 60px; right: 20px; background: #0f0e13; border: 1px solid #2d1e32; border-radius: 20px; width: 180px; z-index: 200;';
            dropdown.innerHTML = `<div style="padding:12px 16px; cursor:pointer;" id="dropdownLogout">🚪 Выйти</div>`;
            document.body.appendChild(dropdown);
            document.getElementById('dropdownLogout').onclick = () => { if(window.signOutUser) window.signOutUser(); };
            setTimeout(() => document.addEventListener('click', function remove(e) { if (!dropdown.contains(e.target) && !e.target.closest('.user-info')) { dropdown.remove(); document.removeEventListener('click', remove); } }), 0);
        }
        
        window.onAuthStateChanged(async (user) => {
            if (user) {
                currentUser = user;
                authModal.style.display = 'none';
                userActions.innerHTML = `<div class="user-info"><div class="user-avatar">👤</div><span>${user.displayName?.split(' ')[0] || 'User'}</span></div>`;
                document.querySelector('.user-info').onclick = showUserDropdown;
                if (window.getFavorites) favorites = await window.getFavorites();
                await loadListings();
            } else {
                currentUser = null;
                userActions.innerHTML = '<button class="btn" id="loginBtn">Войти</button>';
                document.getElementById('loginBtn')?.addEventListener('click', () => authModal.style.display = 'flex');
                await loadListings();
            }
        });
    });
</script>
</body>
</html>
