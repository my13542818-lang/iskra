<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Вход — Куки</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C3B8E;
            --primary-dark: #4A1A6B;
            --primary-light: #9B59B6;
            --accent: #6C3FC5;
            --accent-hover: #5A2FB0;
            --bg-base: #0D0B14;
            --bg-surface: #15121E;
            --bg-hover: #1E1A2E;
            --text-primary: #FFFFFF;
            --text-secondary: #C4B5D8;
            --text-muted: #7A6B8A;
            --border-color: #2D1F3D;
            --radius: 16px;
            --radius-full: 9999px;
            --shadow: 0 8px 32px rgba(108, 59, 142, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light {
            --bg-base: #F8F9FB;
            --bg-surface: #FFFFFF;
            --bg-hover: #F0F0F5;
            --text-primary: #1A1C24;
            --text-secondary: #5A5D6E;
            --text-muted: #8A8D9C;
            --border-color: #E8E8ED;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: var(--transition);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 28px;
        }
        .auth-logo .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 4px;
        }
        .auth-logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #6C3B8E, #E84393);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-logo p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-title h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .auth-title p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-base);
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 16px;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 63, 197, 0.15);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin: 16px 0;
            cursor: pointer;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: var(--accent);
            cursor: pointer;
            flex-shrink: 0;
        }
        .checkbox-group label {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.5;
            cursor: pointer;
        }
        .checkbox-group label a {
            color: var(--accent);
            text-decoration: none;
        }
        .checkbox-group label a:hover {
            text-decoration: underline;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-primary {
            background: linear-gradient(135deg, #21A038, #1B8A30);
            color: white;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(33, 160, 56, 0.4);
        }
        .btn-primary:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover:not(:disabled) {
            background: var(--bg-hover);
            border-color: var(--accent);
        }
        .btn-secondary:active:not(:disabled) {
            transform: scale(0.97);
        }

        .btn-google {
            background: var(--bg-base);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-google:hover:not(:disabled) {
            background: var(--bg-hover);
            border-color: var(--accent);
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .auth-footer a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        .notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            z-index: 9999;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        .notification-success { border-left: 4px solid #2ECC71; }
        .notification-error { border-left: 4px solid #E74C3C; }
        .notification-warning { border-left: 4px solid #F39C12; }
        .notification-info { border-left: 4px solid #3498DB; }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 28px 20px;
            }
            .auth-logo h1 {
                font-size: 24px;
            }
            .auth-title h2 {
                font-size: 20px;
            }
            .btn {
                font-size: 15px;
                padding: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-logo">
            <span class="icon">🍪</span>
            <h1>Куки</h1>
            <p>Покупай и продавай с удовольствием</p>
        </div>

        <div class="auth-title">
            <h2>Вход по номеру телефона</h2>
            <p>Введите номер телефона. Вы получите СМС с кодом</p>
        </div>

        <div class="form-group">
            <label>Номер телефона</label>
            <input type="tel" id="phoneInput" placeholder="+7 (999) 123-45-67" value="+7 999 1234567">
        </div>

        <div class="checkbox-group">
            <input type="checkbox" id="consent" checked>
            <label for="consent">
                Я даю согласие на обработку персональных данных в соответствии с
                <a href="#" target="_blank">политикой конфиденциальности</a>
            </label>
        </div>

        <button class="btn btn-primary" id="smsBtn">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
            </svg>
            Получить код по СМС
        </button>

        <button class="btn btn-secondary" id="callBtn" style="margin-top:10px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
            </svg>
            Получить звонок с кодом
        </button>

        <div class="divider"><span>или</span></div>

        <button class="btn btn-google" id="googleBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            Войти через Google
        </button>

        <div class="auth-footer">
            Уже есть аккаунт? <a href="#">Войти</a>
        </div>
    </div>

    <script>
        // ========================================
        // FIREBASE — ВСЁ ВНУТРИ, firebase ГЛОБАЛЬНЫЙ
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };

        // Инициализация Firebase
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========================================
        // DOM REFS
        // ========================================
        const phoneInput = document.getElementById('phoneInput');
        const smsBtn = document.getElementById('smsBtn');
        const callBtn = document.getElementById('callBtn');
        const googleBtn = document.getElementById('googleBtn');

        // ========================================
        // ФУНКЦИИ
        // ========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.notification').forEach(el => el.remove());

            const notif = document.createElement('div');
            notif.className = `notification notification-${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transform = 'translateX(100px)';
                setTimeout(() => notif.remove(), 300);
            }, 3500);
        }

        function formatPhone(phone) {
            let cleaned = phone.replace(/\D/g, '');
            if (cleaned.length === 11 && cleaned.startsWith('7')) {
                cleaned = '+' + cleaned;
            } else if (cleaned.length === 10) {
                cleaned = '+7' + cleaned;
            } else if (!cleaned.startsWith('+')) {
                cleaned = '+' + cleaned;
            }
            return cleaned;
        }

        // ========================================
        // SMS BUTTON
        // ========================================
        smsBtn.onclick = async () => {
            const phone = formatPhone(phoneInput.value);
            if (phone.length < 10) {
                showNotification('Введите корректный номер телефона', 'error');
                return;
            }

            smsBtn.disabled = true;
            smsBtn.textContent = '⏳ Отправка...';

            try {
                // Здесь будет отправка SMS через ваш сервис
                setTimeout(() => {
                    showNotification(`✅ Код отправлен на ${phone}`, 'success');
                    smsBtn.disabled = false;
                    smsBtn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                        </svg>
                        Получить код по СМС
                    `;
                }, 1500);

            } catch (error) {
                console.error('SMS error:', error);
                showNotification('❌ Ошибка отправки SMS', 'error');
                smsBtn.disabled = false;
                smsBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-1-13h2v6h-2zm0 8h2v2h-2z"/>
                    </svg>
                    Получить код по СМС
                `;
            }
        };

        // ========================================
        // CALL BUTTON
        // ========================================
        callBtn.onclick = async () => {
            const phone = formatPhone(phoneInput.value);
            if (phone.length < 10) {
                showNotification('Введите корректный номер телефона', 'error');
                return;
            }

            callBtn.disabled = true;
            callBtn.textContent = '⏳ Звонок...';

            try {
                setTimeout(() => {
                    showNotification(`📞 Звонок на ${phone} выполнен`, 'success');
                    callBtn.disabled = false;
                    callBtn.innerHTML = `
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                        </svg>
                        Получить звонок с кодом
                    `;
                }, 1500);

            } catch (error) {
                console.error('Call error:', error);
                showNotification('❌ Ошибка звонка', 'error');
                callBtn.disabled = false;
                callBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
                    </svg>
                    Получить звонок с кодом
                `;
            }
        };

        // ========================================
        // GOOGLE BUTTON
        // ========================================
        googleBtn.onclick = async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                const userRef = db.collection("users").doc(user.uid);
                const userDoc = await userRef.get();

                if (!userDoc.exists) {
                    await userRef.set({
                        uid: user.uid,
                        name: user.displayName || 'Пользователь',
                        email: user.email,
                        photoURL: user.photoURL || '',
                        phone: user.phoneNumber || '',
                        role: 'user',
                        balance: 0,
                        rating: 0,
                        completedDeals: 0,
                        createdAt: new Date().toISOString()
                    });
                }

                showNotification('✅ Вход выполнен!', 'success');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Google login error:', error);
                showNotification('❌ Ошибка входа через Google: ' + error.message, 'error');
            }
        };

        // ========================================
        // ENTER KEY
        // ========================================
        phoneInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') smsBtn.click();
        });

        // ========================================
        // PHONE FORMAT
        // ========================================
        phoneInput.addEventListener('input', function(e) {
            let value = this.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);

            if (value.length === 0) {
                this.value = '';
                return;
            }

            let formatted = '';
            if (value.startsWith('7') || value.startsWith('8')) {
                if (value.startsWith('8')) value = '7' + value.slice(1);
                formatted = '+' + value.slice(0, 1) + ' ';
                if (value.length > 1) formatted += '(' + value.slice(1, 4);
                if (value.length > 4) formatted += ') ' + value.slice(4, 7);
                if (value.length > 7) formatted += '-' + value.slice(7, 9);
                if (value.length > 9) formatted += '-' + value.slice(9, 11);
            } else {
                formatted = '+' + value;
            }

            this.value = formatted;
        });

        console.log('✅ Страница входа загружена');
        console.log('✅ Firebase инициализирован');
    </script>
</body>
</html>
