<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Вход — Куки</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
        
        body {
            background: linear-gradient(135deg, #0a0a0c 0%, #1a0a2e 50%, #0a0a0c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }
        
        /* Анимированный фон */
        body::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,59,47,0.1) 0%, rgba(176,44,230,0.1) 50%, transparent 70%);
            animation: rotate 20s linear infinite;
            pointer-events: none;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        /* Огромная иконка Куки */
        .cookie-icon {
            text-align: center;
            margin-bottom: 30px;
            animation: bounce 2s ease-in-out infinite;
        }
        
        .cookie-icon span {
            font-size: 120px;
            display: inline-block;
            filter: drop-shadow(0 0 30px rgba(255,107,74,0.5));
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        /* Карточка входа */
        .login-card {
            background: rgba(15,14,19,0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px;
            max-width: 450px;
            width: 90%;
            border: 1px solid rgba(255,107,74,0.3);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            z-index: 10;
            transition: transform 0.3s ease;
        }
        
        .login-card:hover {
            transform: scale(1.02);
            border-color: #ff6b4a;
        }
        
        h1 {
            text-align: center;
            font-size: 32px;
            background: linear-gradient(135deg, #ff3b2f, #b02ce6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .subtitle {
            text-align: center;
            color: #a492b0;
            margin-bottom: 32px;
            font-size: 14px;
        }
        
        .form-row {
            margin-bottom: 20px;
        }
        
        .form-row input {
            width: 100%;
            padding: 16px 20px;
            background: #121114;
            border: 1px solid #2f2332;
            border-radius: 60px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .form-row input:focus {
            border-color: #ff6b4a;
            box-shadow: 0 0 0 3px rgba(255,107,74,0.2);
            transform: scale(1.02);
        }
        
        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
        }
        
        .btn-primary {
            background: linear-gradient(95deg, #b52b1a, #8a1c50);
            color: white;
        }
        
        .btn-primary:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px rgba(255,107,74,0.5);
        }
        
        .btn-google {
            background: #111014;
            border: 1px solid #3a253e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-google:hover {
            background: #1a1620;
            transform: scale(1.02);
        }
        
        .divider {
            text-align: center;
            margin: 24px 0;
            position: relative;
        }
        
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #2d1e32;
        }
        
        .divider span {
            background: rgba(15,14,19,0.9);
            padding: 0 15px;
            position: relative;
            color: #a492b0;
            font-size: 13px;
        }
        
        .register-link {
            text-align: center;
            margin-top: 24px;
            color: #a492b0;
        }
        
        .register-link a {
            color: #ff6b4a;
            text-decoration: none;
            cursor: pointer;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        /* Плавающие частицы */
        .particle {
            position: absolute;
            background: rgba(255,107,74,0.3);
            border-radius: 50%;
            pointer-events: none;
            animation: float 6s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) translateX(0); opacity: 0; }
            50% { transform: translateY(-100px) translateX(50px); opacity: 0.5; }
        }
    </style>
</head>
<body>
    <!-- Плавающие частицы -->
    <div id="particles"></div>
    
    <div class="login-card">
        <div class="cookie-icon">
            <span>🍪</span>
        </div>
        <h1>КУКИ</h1>
        <p class="subtitle">Войдите, чтобы продолжить</p>
        
        <div id="phoneLoginView">
            <div class="form-row">
                <input type="tel" id="phoneNumber" placeholder="📱 Номер телефона" value="+7">
            </div>
            <button class="btn btn-primary" id="sendCodeBtn">📨 Отправить код</button>
        </div>
        
        <div id="codeVerifyView" style="display: none;">
            <div class="form-row">
                <input type="text" id="verificationCode" placeholder="🔐 6-значный код">
            </div>
            <button class="btn btn-primary" id="verifyCodeBtn">✅ Войти</button>
            <div id="codeTimer" style="color: #ff6b4a; text-align: center; margin-top: 12px;"></div>
            <button id="backBtn" style="margin-top: 12px; background: none; border: none; color: #a492b0; cursor: pointer;">← Назад</button>
        </div>
        
        <div class="divider"><span>или</span></div>
        
        <button class="btn btn-google" id="googleSignInBtn">
            <span>📧</span> Войти через Google
        </button>
        
        <div class="register-link">
            Нет аккаунта? <a id="registerBtn">Зарегистрироваться</a>
        </div>
    </div>
    
    <div id="recaptcha-container"></div>

    <script>
        // Генерация плавающих частиц
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 10 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = Math.random() * 10 + 5 + 's';
                container.appendChild(particle);
            }
        }
        createParticles();
        
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        
        const auth = firebase.auth();
        const db = firebase.firestore();
        
        let confirmationResult = null;
        let timerInterval = null;
        
        function showError(msg) {
            alert(msg);
        }
        
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            let seconds = 60;
            const timerDiv = document.getElementById('codeTimer');
            timerInterval = setInterval(() => {
                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    timerDiv.innerHTML = '';
                } else {
                    timerDiv.innerHTML = `Повторная отправка через ${seconds} сек`;
                    seconds--;
                }
            }, 1000);
        }
        
        document.getElementById('sendCodeBtn').onclick = async () => {
            let phone = document.getElementById('phoneNumber').value.trim();
            if (!phone) { showError('Введите номер телефона'); return; }
            if (!phone.startsWith('+')) phone = '+' + phone;
            
            try {
                const recaptchaVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container', { size: 'invisible' });
                const result = await auth.signInWithPhoneNumber(phone, recaptchaVerifier);
                confirmationResult = result;
                document.getElementById('phoneLoginView').style.display = 'none';
                document.getElementById('codeVerifyView').style.display = 'block';
                startTimer();
            } catch (error) {
                showError('Ошибка: ' + error.message);
            }
        };
        
        document.getElementById('verifyCodeBtn').onclick = async () => {
            const code = document.getElementById('verificationCode').value.trim();
            if (!code) { showError('Введите код'); return; }
            
            try {
                const result = await confirmationResult.confirm(code);
                const userRef = db.collection("users").doc(result.user.uid);
                const userSnap = await userRef.get();
                if (!userSnap.exists()) {
                    await userRef.set({
                        uid: result.user.uid,
                        name: result.user.phoneNumber,
                        phone: result.user.phoneNumber,
                        role: "user",
                        balance: 0,
                        createdAt: new Date().toISOString(),
                        rating: 0,
                        completedDeals: 0
                    });
                }
                window.location.href = "index.html";
            } catch (error) {
                showError('Неверный код');
            }
        };
        
        document.getElementById('backBtn').onclick = () => {
            document.getElementById('codeVerifyView').style.display = 'none';
            document.getElementById('phoneLoginView').style.display = 'block';
            if (timerInterval) clearInterval(timerInterval);
        };
        
        document.getElementById('googleSignInBtn').onclick = async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;
                const userRef = db.collection("users").doc(user.uid);
                const userSnap = await userRef.get();
                if (!userSnap.exists()) {
                    await userRef.set({
                        uid: user.uid,
                        name: user.displayName,
                        email: user.email,
                        photoURL: user.photoURL,
                        role: "user",
                        balance: 0,
                        createdAt: new Date().toISOString(),
                        rating: 0,
                        completedDeals: 0
                    });
                }
                window.location.href = "index.html";
            } catch (error) {
                showError('Ошибка: ' + error.message);
            }
        };
        
        document.getElementById('registerBtn').onclick = () => {
            document.getElementById('phoneNumber').focus();
            alert('Введите номер телефона и нажмите "Отправить код" для регистрации');
        };
    </script>
</body>
</html>
