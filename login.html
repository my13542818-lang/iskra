<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D0B14;
            color: #FFFFFF;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: #15121E;
            border: 1px solid #2D1F3D;
            border-radius: 24px;
            padding: 40px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
        }
        .auth-card .icon { font-size: 64px; margin-bottom: 8px; }
        .auth-card h1 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #6C3B8E, #E84393);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-card .subtitle {
            color: #7A6B8A;
            font-size: 14px;
            margin: 4px 0 24px;
        }
        .form-group { margin-bottom: 14px; text-align: left; }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #C4B5D8;
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 16px;
            background: #1A1625;
            border: 2px solid #2D1F3D;
            border-radius: 14px;
            color: #FFFFFF;
            font-size: 16px;
            outline: none;
            transition: all 0.3s ease;
        }
        .form-group input:focus {
            border-color: #E84393;
            box-shadow: 0 0 0 4px rgba(232, 67, 147, 0.15);
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #6C3B8E, #E84393);
            color: white;
            box-shadow: 0 4px 20px rgba(108, 59, 142, 0.4);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(108, 59, 142, 0.6); }
        .btn-google {
            background: #ffffff;
            color: #333;
            border: 1px solid #ddd;
        }
        .btn-google:hover {
            background: #f5f5f5;
            transform: translateY(-2px);
        }
        .btn-google img { width: 20px; height: 20px; }
        .btn-secondary {
            background: transparent;
            color: #C4B5D8;
            border: 1px solid #2D1F3D;
            margin-top: 8px;
        }
        .btn-secondary:hover { border-color: #E84393; }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: #7A6B8A;
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #2D1F3D;
        }

        .switch-link {
            margin-top: 16px;
            color: #7A6B8A;
            font-size: 14px;
        }
        .switch-link a {
            color: #E84393;
            cursor: pointer;
            text-decoration: none;
        }
        .switch-link a:hover { text-decoration: underline; }

        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid #E74C3C;
            color: #E74C3C;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid #2ECC71;
            color: #2ECC71;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="auth-card">
    <!-- ===== ИКОНКА ===== -->
    <div class="icon">🍪</div>
    <h1>Куки</h1>
    <p class="subtitle">Войдите в аккаунт</p>

    <!-- ===== СООБЩЕНИЯ ===== -->
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>

    <!-- ===== ВХОД ЧЕРЕЗ GOOGLE ===== -->
    <button class="btn btn-google" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Войти через Google
    </button>

    <div class="divider"><span>или</span></div>

    <!-- ===== ФОРМА ВХОДА ===== -->
    <div id="loginForm">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="loginPassword" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" id="loginBtn">Войти</button>
        <div class="switch-link">
            Нет аккаунта? <a id="showRegisterBtn">Зарегистрироваться</a>
        </div>
        <div class="switch-link">
            <a id="forgotPasswordBtn">Забыли пароль?</a>
        </div>
    </div>

    <!-- ===== ФОРМА РЕГИСТРАЦИИ ===== -->
    <div id="registerForm" class="hidden">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
        <div class="form-group">
            <label>Пароль</label>
            <input type="password" id="regPassword" placeholder="Минимум 6 символов">
        </div>
        <div class="form-group">
            <label>Подтвердите пароль</label>
            <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
        </div>
        <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
        <div class="switch-link">
            Уже есть аккаунт? <a id="showLoginBtn">Войти</a>
        </div>
    </div>

    <!-- ===== ВОССТАНОВЛЕНИЕ ПАРОЛЯ ===== -->
    <div id="resetForm" class="hidden">
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="resetEmail" placeholder="your@email.com">
        </div>
        <button class="btn btn-primary" id="resetBtn">Отправить письмо</button>
        <div class="switch-link">
            <a id="backToLoginBtn">← Вернуться ко входу</a>
        </div>
    </div>
</div>

<script>
    // ========================================
    // FIREBASE
    // ========================================
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const auth = firebase.auth();
    const db = firebase.firestore();

    // ========================================
    // DOM
    // ========================================
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    // ========================================
    // УВЕДОМЛЕНИЯ
    // ========================================
    function showError(text) {
        errorMsg.textContent = text;
        errorMsg.style.display = 'block';
        successMsg.style.display = 'none';
        setTimeout(() => errorMsg.style.display = 'none', 5000);
    }

    function showSuccess(text) {
        successMsg.textContent = text;
        successMsg.style.display = 'block';
        errorMsg.style.display = 'none';
        setTimeout(() => successMsg.style.display = 'none', 3000);
    }

    // ========================================
    // ВХОД ЧЕРЕЗ GOOGLE
    // ========================================
    document.getElementById('googleBtn').onclick = async () => {
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            const result = await auth.signInWithPopup(provider);
            const user = result.user;

            // Проверяем существует ли пользователь в Firestore
            const userRef = db.collection("users").doc(user.uid);
            const userDoc = await userRef.get();

            if (!userDoc.exists) {
                // Создаём нового пользователя
                await userRef.set({
                    uid: user.uid,
                    name: user.displayName || 'Пользователь',
                    email: user.email,
                    photoURL: user.photoURL || '',
                    phone: user.phoneNumber || '',
                    role: 'user',
                    balance: 0,
                    rating: 0,
                    completedDeals: 0,
                    createdAt: new Date().toISOString()
                });
                showSuccess('✅ Аккаунт создан! Перенаправление...');
            } else {
                showSuccess('✅ Вход выполнен! Перенаправление...');
            }

            // Сохраняем в localStorage
            localStorage.setItem('userData', JSON.stringify({
                uid: user.uid,
                name: user.displayName,
                email: user.email,
                photoURL: user.photoURL
            }));

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);

        } catch (error) {
            console.error('Google login error:', error);
            showError('❌ Ошибка входа через Google: ' + error.message);
        }
    };

    // ========================================
    // ПЕРЕКЛЮЧЕНИЕ ФОРМ
    // ========================================
    document.getElementById('showRegisterBtn').onclick = () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.remove('hidden');
        document.getElementById('resetForm').classList.add('hidden');
    };

    document.getElementById('showLoginBtn').onclick = () => {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('resetForm').classList.add('hidden');
    };

    document.getElementById('forgotPasswordBtn').onclick = () => {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('resetForm').classList.remove('hidden');
    };

    document.getElementById('backToLoginBtn').onclick = () => {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('registerForm').classList.add('hidden');
        document.getElementById('resetForm').classList.add('hidden');
    };

    // ========================================
    // РЕГИСТРАЦИЯ
    // ========================================
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;

        if (!email || !password) {
            showError('Заполните все поля');
            return;
        }
        if (password !== confirm) {
            showError('Пароли не совпадают');
            return;
        }
        if (password.length < 6) {
            showError('Пароль должен быть минимум 6 символов');
            return;
        }

        try {
            const result = await auth.createUserWithEmailAndPassword(email, password);
            const user = result.user;

            await db.collection("users").doc(user.uid).set({
                uid: user.uid,
                name: '',
                email: user.email,
                photoURL: '',
                phone: '',
                role: 'user',
                balance: 0,
                rating: 0,
                completedDeals: 0,
                createdAt: new Date().toISOString()
            });

            showSuccess('✅ Регистрация успешна! Перенаправление...');
            setTimeout(() => {
                window.location.href = 'complete-profile.html';
            }, 1500);

        } catch (error) {
            console.error('Register error:', error);
            showError('❌ Ошибка регистрации: ' + error.message);
        }
    };

    // ========================================
    // ВХОД ПО EMAIL/ПАРОЛЮ
    // ========================================
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showError('Заполните все поля');
            return;
        }

        try {
            const result = await auth.signInWithEmailAndPassword(email, password);
            const user = result.user;

            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data() || {};

            localStorage.setItem('userData', JSON.stringify({
                uid: user.uid,
                name: userData.name || user.displayName,
                email: user.email,
                photoURL: userData.photoURL || user.photoURL
            }));

            showSuccess('✅ Вход выполнен! Перенаправление...');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);

        } catch (error) {
            console.error('Login error:', error);
            showError('❌ Неверный email или пароль');
        }
    };

    // ========================================
    // ВОССТАНОВЛЕНИЕ ПАРОЛЯ
    // ========================================
    document.getElementById('resetBtn').onclick = async () => {
        const email = document.getElementById('resetEmail').value.trim();

        if (!email) {
            showError('Введите email');
            return;
        }

        try {
            await auth.sendPasswordResetEmail(email);
            showSuccess('✅ Письмо отправлено на ' + email);
            setTimeout(() => {
                document.getElementById('backToLoginBtn').click();
            }, 2000);
        } catch (error) {
            console.error('Reset error:', error);
            showError('❌ Ошибка: ' + error.message);
        }
    };

    // ========================================
    // ENTER НА ВВОД
    // ========================================
    document.getElementById('loginPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('loginBtn').click();
    });
    document.getElementById('regPassword').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') document.getElementById('registerBtn').click();
    });
</script>
</body>
</html>
