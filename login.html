<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .auth-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: white;
            border-radius: 48px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 40px rgba(155, 89, 182, 0.15);
            border: 1px solid #f0e6ff;
        }
        .cookie-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
            display: inline-block;
        }
        @keyframes bounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .auth-card h1 {
            font-size: 32px;
            background: linear-gradient(135deg, #9b59b6, #e84393);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .subtitle {
            color: #b8a9d4;
            margin-bottom: 32px;
        }
        .btn-block {
            width: 100%;
            padding: 14px;
            margin-top: 12px;
        }
        .divider {
            margin: 24px 0;
            position: relative;
        }
        .divider::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #f0e6ff;
        }
        .divider span {
            background: white;
            padding: 0 15px;
            position: relative;
            color: #b8a9d4;
            font-size: 13px;
        }
        .switch-link {
            margin-top: 20px;
            color: #b8a9d4;
        }
        .switch-link a {
            color: #e84393;
            cursor: pointer;
            text-decoration: none;
        }
        .success-message {
            background: linear-gradient(135deg, #9b59b6, #e84393);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <div class="cookie-icon">🍪</div>
        <h1>КУКИ</h1>
        <div id="successMessage" class="success-message">✅ Вход выполнен! Перенаправление...</div>
        
        <div id="loginForm">
            <p class="subtitle">Войдите в аккаунт</p>
            <div class="form-row"><input type="email" id="loginEmail" placeholder="Email"></div>
            <div class="form-row"><input type="password" id="loginPassword" placeholder="Пароль"></div>
            <button class="btn btn-primary btn-block" id="loginBtn">Войти</button>
            <div class="switch-link">Нет аккаунта? <a id="showRegisterBtn">Зарегистрироваться</a></div>
            <div class="switch-link"><a id="forgotPasswordBtn">Забыли пароль?</a></div>
        </div>
        
        <div id="registerForm" style="display:none">
            <p class="subtitle">Создайте аккаунт</p>
            <div class="form-row"><input type="email" id="regEmail" placeholder="Email"></div>
            <div class="form-row"><input type="password" id="regPassword" placeholder="Пароль (мин. 6 символов)"></div>
            <div class="form-row"><input type="password" id="regConfirmPassword" placeholder="Подтвердите пароль"></div>
            <button class="btn btn-primary btn-block" id="registerBtn">Зарегистрироваться</button>
            <div class="switch-link">Уже есть аккаунт? <a id="showLoginBtn">Войти</a></div>
        </div>
        
        <div id="resetForm" style="display:none">
            <p class="subtitle">Восстановление пароля</p>
            <div class="form-row"><input type="email" id="resetEmail" placeholder="Email"></div>
            <button class="btn btn-primary btn-block" id="sendResetBtn">Отправить письмо</button>
            <div class="switch-link"><a id="backToLoginBtn">← Вернуться ко входу</a></div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    function showSuccess(msg, redirect) {
        const div = document.getElementById('successMessage');
        div.textContent = msg;
        div.style.display = 'block';
        setTimeout(() => window.location.href = redirect, 1500);
    }
    function showError(msg) { alert(msg); }
    
    document.getElementById('showRegisterBtn').onclick = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='block'; document.getElementById('resetForm').style.display='none'; };
    document.getElementById('showLoginBtn').onclick = () => { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; document.getElementById('resetForm').style.display='none'; };
    document.getElementById('forgotPasswordBtn').onclick = () => { document.getElementById('loginForm').style.display='none'; document.getElementById('registerForm').style.display='none'; document.getElementById('resetForm').style.display='block'; };
    document.getElementById('backToLoginBtn').onclick = () => { document.getElementById('loginForm').style.display='block'; document.getElementById('registerForm').style.display='none'; document.getElementById('resetForm').style.display='none'; };
    
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        if (!email || !password) { showError('Заполните все поля'); return; }
        try {
            await auth.signInWithEmailAndPassword(email, password);
            showSuccess('✅ Вход выполнен!', 'index.html');
        } catch(e) { showError('Ошибка: неверный email или пароль'); }
    };
    
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value;
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        if (!email || !password) { showError('Заполните все поля'); return; }
        if (password !== confirm) { showError('Пароли не совпадают'); return; }
        if (password.length < 6) { showError('Пароль должен быть не менее 6 символов'); return; }
        try {
            const result = await auth.createUserWithEmailAndPassword(email, password);
            await db.collection("users").doc(result.user.uid).set({
                uid: result.user.uid, email: email, name: "", phone: "", city: "",
                role: "user", balance: 0, createdAt: new Date().toISOString(), rating: 0, completedDeals: 0
            });
            showSuccess('✅ Регистрация успешна!', 'complete-profile.html');
        } catch(e) { showError('Ошибка: ' + e.message); }
    };
    
    document.getElementById('sendResetBtn').onclick = async () => {
        const email = document.getElementById('resetEmail').value;
        if (!email) { showError('Введите email'); return; }
        try {
            await auth.sendPasswordResetEmail(email);
            alert('Письмо для сброса пароля отправлено на ' + email);
            document.getElementById('backToLoginBtn').click();
        } catch(e) { showError('Ошибка: ' + e.message); }
    };
</script>
</body>
</html>
