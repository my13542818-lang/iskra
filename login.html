<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Вход — Куки</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js">
    </script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6C3B8E;
            --accent: #6C3FC5;
            --bg-base: #0D0B14;
            --bg-surface: #15121E;
            --bg-hover: #1E1A2E;
            --text-primary: #FFFFFF;
            --text-secondary: #C4B5D8;
            --text-muted: #7A6B8A;
            --border-color: #2D1F3D;
            --radius: 16px;
            --shadow: 0 8px 32px rgba(108, 59, 142, 0.3);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .light {
            --bg-base: #F8F9FB;
            --bg-surface: #FFFFFF;
            --bg-hover: #F0F0F5;
            --text-primary: #1A1C24;
            --text-secondary: #5A5D6E;
            --text-muted: #8A8D9C;
            --border-color: #E8E8ED;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-base);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: var(--transition);
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow: var(--shadow);
            transition: var(--transition);
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-logo .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 4px;
        }
        .auth-logo h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #6C3B8E, #E84393);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .auth-logo p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .auth-title {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-title h2 {
            font-size: 22px;
            font-weight: 700;
        }
        .auth-title p {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 14px 18px;
            background: var(--bg-base);
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 15px;
            outline: none;
            transition: var(--transition);
        }
        .form-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(108, 63, 197, 0.15);
        }
        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .btn-primary {
            background: linear-gradient(135deg, #6C3B8E, #E84393);
            color: white;
            box-shadow: 0 4px 20px rgba(108, 59, 142, 0.4);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(108, 59, 142, 0.6);
        }

        .btn-google {
            background: var(--bg-base);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        .btn-google:hover:not(:disabled) {
            background: var(--bg-hover);
            border-color: var(--accent);
        }
        .btn-google img {
            width: 20px;
            height: 20px;
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .btn-secondary:hover:not(:disabled) {
            background: var(--bg-hover);
            border-color: var(--accent);
            color: var(--text-primary);
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-muted);
            font-size: 13px;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border-color);
        }

        .switch-link {
            text-align: center;
            margin-top: 16px;
            font-size: 14px;
            color: var(--text-muted);
        }
        .switch-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        .switch-link a:hover {
            text-decoration: underline;
        }

        .error-msg {
            background: rgba(231, 76, 60, 0.15);
            border: 1px solid #E74C3C;
            color: #E74C3C;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }
        .success-msg {
            background: rgba(46, 204, 113, 0.15);
            border: 1px solid #2ECC71;
            color: #2ECC71;
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 16px;
            display: none;
        }

        .notification {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 16px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            box-shadow: var(--shadow);
            z-index: 9999;
            max-width: 400px;
            animation: slideIn 0.3s ease;
        }
        .notification-success {
            border-left: 4px solid #2ECC71;
        }
        .notification-error {
            border-left: 4px solid #E74C3C;
        }
        .notification-warning {
            border-left: 4px solid #F39C12;
        }
        .notification-info {
            border-left: 4px solid #3498DB;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 28px 20px;
            }
            .auth-logo h1 {
                font-size: 24px;
            }
            .auth-title h2 {
                font-size: 20px;
            }
            .btn {
                font-size: 15px;
                padding: 12px;
            }
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <!-- ===== LOGO ===== -->
        <div class="auth-logo">
            <span class="icon">🍪</span>
            <h1>Куки</h1>
            <p>Покупай и продавай с удовольствием</p>
        </div>

        <!-- ===== MESSAGES ===== -->
        <div id="errorMsg" class="error-msg"></div>
        <div id="successMsg" class="success-msg"></div>

        <!-- ===== LOGIN FORM ===== -->
        <div id="loginForm">
            <div class="auth-title">
                <h2>Войти в аккаунт</h2>
                <p>Используйте email или Google аккаунт</p>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Пароль</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>

            <button class="btn btn-primary" id="loginBtn">Войти</button>

            <div class="switch-link">
                <a id="showRegisterBtn">Нет аккаунта? Зарегистрироваться</a>
            </div>
            <div class="switch-link">
                <a id="forgotPasswordBtn">Забыли пароль?</a>
            </div>

            <div class="divider"><span>или</span></div>

            <button class="btn btn-google" id="googleBtn">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
                Войти через Google
            </button>
        </div>

        <!-- ===== REGISTER FORM ===== -->
        <div id="registerForm" class="hidden">
            <div class="auth-title">
                <h2>Регистрация</h2>
                <p>Создайте аккаунт за 1 минуту</p>
            </div>

            <div class="form-group">
                <label>Email <span class="required">*</span></label>
                <input type="email" id="regEmail" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Пароль <span class="required">*</span></label>
                <input type="password" id="regPassword" placeholder="Минимум 6 символов">
            </div>
            <div class="form-group">
                <label>Подтвердите пароль <span class="required">*</span></label>
                <input type="password" id="regConfirmPassword" placeholder="Повторите пароль">
            </div>

            <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>

            <div class="switch-link">
                <a id="showLoginBtn">Уже есть аккаунт? Войти</a>
            </div>
        </div>

        <!-- ===== RESET FORM ===== -->
        <div id="resetForm" class="hidden">
            <div class="auth-title">
                <h2>Восстановление пароля</h2>
                <p>Мы отправим ссылку на ваш email</p>
            </div>

            <div class="form-group">
                <label>Email</label>
                <input type="email" id="resetEmail" placeholder="your@email.com">
            </div>

            <button class="btn btn-primary" id="resetBtn">Отправить письмо</button>

            <div class="switch-link">
                <a id="backToLoginBtn">← Вернуться ко входу</a>
            </div>
        </div>
    </div>

    <script>
        // ========================================
        // FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========================================
        // DOM REFS
        // ========================================
        const errorMsg = document.getElementById('errorMsg');
        const successMsg = document.getElementById('successMsg');

        // ========================================
        // SHOW ERROR/SUCCESS
        // ========================================
        function showError(text) {
            errorMsg.textContent = text;
            errorMsg.style.display = 'block';
            successMsg.style.display = 'none';
            setTimeout(() => errorMsg.style.display = 'none', 5000);
        }

        function showSuccess(text) {
            successMsg.textContent = text;
            successMsg.style.display = 'block';
            errorMsg.style.display = 'none';
            setTimeout(() => successMsg.style.display = 'none', 3000);
        }

        function showNotification(message, type = 'info') {
            document.querySelectorAll('.notification').forEach(el => el.remove());

            const notif = document.createElement('div');
            notif.className = `notification notification-${type}`;
            notif.textContent = message;
            document.body.appendChild(notif);

            setTimeout(() => {
                notif.style.opacity = '0';
                notif.style.transform = 'translateX(100px)';
                setTimeout(() => notif.remove(), 300);
            }, 3500);
        }

        // ========================================
        // SWITCH FORMS
        // ========================================
        document.getElementById('showRegisterBtn').onclick = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
            document.getElementById('resetForm').classList.add('hidden');
        };

        document.getElementById('showLoginBtn').onclick = () => {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('resetForm').classList.add('hidden');
        };

        document.getElementById('forgotPasswordBtn').onclick = () => {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('resetForm').classList.remove('hidden');
        };

        document.getElementById('backToLoginBtn').onclick = () => {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('resetForm').classList.add('hidden');
        };

        // ========================================
        // REGISTER
        // ========================================
        document.getElementById('registerBtn').onclick = async () => {
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirmPassword').value;

            if (!email || !password) {
                showError('Заполните все поля');
                return;
            }
            if (password !== confirm) {
                showError('Пароли не совпадают');
                return;
            }
            if (password.length < 6) {
                showError('Пароль должен быть минимум 6 символов');
                return;
            }

            try {
                const result = await auth.createUserWithEmailAndPassword(email, password);
                const user = result.user;

                await db.collection("users").doc(user.uid).set({
                    uid: user.uid,
                    name: '',
                    email: user.email,
                    photoURL: '',
                    phone: '',
                    role: 'user',
                    balance: 0,
                    rating: 0,
                    completedDeals: 0,
                    createdAt: new Date().toISOString()
                });

                showSuccess('✅ Регистрация успешна!');
                setTimeout(() => {
                    window.location.href = 'profile/complete-profile.html';
                }, 1500);

            } catch (error) {
                console.error('Register error:', error);
                showError('❌ ' + error.message);
            }
        };

        // ========================================
        // LOGIN
        // ========================================
        document.getElementById('loginBtn').onclick = async () => {
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!email || !password) {
                showError('Заполните все поля');
                return;
            }

            try {
                const result = await auth.signInWithEmailAndPassword(email, password);
                const user = result.user;

                const userDoc = await db.collection("users").doc(user.uid).get();
                const userData = userDoc.data() || {};

                localStorage.setItem('userData', JSON.stringify({
                    uid: user.uid,
                    name: userData.name || user.displayName,
                    email: user.email,
                    photoURL: userData.photoURL || user.photoURL
                }));

                showSuccess('✅ Вход выполнен!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Login error:', error);
                showError('❌ Неверный email или пароль');
            }
        };

        // ========================================
        // GOOGLE LOGIN
        // ========================================
        document.getElementById('googleBtn').onclick = async () => {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                const result = await auth.signInWithPopup(provider);
                const user = result.user;

                const userRef = db.collection("users").doc(user.uid);
                const userDoc = await userRef.get();

                if (!userDoc.exists) {
                    await userRef.set({
                        uid: user.uid,
                        name: user.displayName || 'Пользователь',
                        email: user.email,
                        photoURL: user.photoURL || '',
                        phone: user.phoneNumber || '',
                        role: 'user',
                        balance: 0,
                        rating: 0,
                        completedDeals: 0,
                        createdAt: new Date().toISOString()
                    });
                }

                localStorage.setItem('userData', JSON.stringify({
                    uid: user.uid,
                    name: user.displayName,
                    email: user.email,
                    photoURL: user.photoURL
                }));

                showSuccess('✅ Вход через Google выполнен!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);

            } catch (error) {
                console.error('Google login error:', error);
                showError('❌ ' + error.message);
            }
        };

        // ========================================
        // RESET PASSWORD
        // ========================================
        document.getElementById('resetBtn').onclick = async () => {
            const email = document.getElementById('resetEmail').value.trim();

            if (!email) {
                showError('Введите email');
                return;
            }

            try {
                await auth.sendPasswordResetEmail(email);
                showSuccess('✅ Письмо отправлено на ' + email);
                setTimeout(() => {
                    document.getElementById('backToLoginBtn').click();
                }, 2000);

            } catch (error) {
                console.error('Reset error:', error);
                showError('❌ ' + error.message);
            }
        };

        // ========================================
        // ENTER KEY
        // ========================================
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('loginBtn').click();
        });
        document.getElementById('regPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click();
        });

        console.log('✅ Страница входа загружена');
    </script>
</body>
</html>
