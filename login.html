<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="referrer" content="origin">
    <title>Вход — Куки</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a0c 0%, #1a0a2e 50%, #0a0a0c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-card {
            background: rgba(15,14,19,0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(255,107,74,0.3);
        }
        .cookie-icon { font-size: 60px; margin-bottom: 20px; text-align: center; animation: bounce 2s ease-in-out infinite; display: inline-block; width: 100%; }
        @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        h1 { font-size: 32px; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; margin-bottom: 8px; }
        .subtitle { color: #a492b0; text-align: center; margin-bottom: 32px; font-size: 14px; }
        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; margin-bottom: 8px; font-size: 13px; color: #a492b0; }
        .form-row input { width: 100%; padding: 14px 16px; background: #121114; border: 1px solid #2f2332; border-radius: 60px; color: white; font-size: 16px; outline: none; transition: all 0.3s ease; }
        .form-row input:focus { border-color: #ff6b4a; box-shadow: 0 0 0 3px rgba(255,107,74,0.2); }
        .btn { width: 100%; padding: 14px; border-radius: 60px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; transition: all 0.3s ease; margin-top: 10px; }
        .btn-primary { background: linear-gradient(95deg, #b52b1a, #8a1c50); color: white; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,107,74,0.5); }
        .btn-secondary { background: #111014; border: 1px solid #3a253e; color: white; }
        .btn-secondary:hover { background: #1a1620; transform: scale(1.02); }
        .divider { text-align: center; margin: 24px 0; position: relative; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #2d1e32; }
        .divider span { background: rgba(15,14,19,0.9); padding: 0 15px; position: relative; color: #a492b0; font-size: 13px; }
        .switch-link { text-align: center; margin-top: 20px; color: #a492b0; font-size: 14px; }
        .switch-link a { color: #ff6b4a; cursor: pointer; text-decoration: none; }
        .switch-link a:hover { text-decoration: underline; }
        .success-message { background: #2a7a4b; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; text-align: center; }
        .error-message { background: #d9534f; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="auth-card">
    <div class="cookie-icon">🍪</div>
    <h1>КУКИ</h1>
    
    <div id="successMessage" class="success-message"></div>
    <div id="errorMessage" class="error-message"></div>
    
    <!-- Форма входа -->
    <div id="loginForm">
        <p class="subtitle">Войдите в аккаунт</p>
        <div class="form-row">
            <label>📧 Email</label>
            <input type="email" id="loginEmail" placeholder="your@email.com">
        </div>
        <div class="form-row">
            <label>🔐 Пароль</label>
            <input type="password" id="loginPassword" placeholder="••••••">
        </div>
        <button class="btn btn-primary" id="loginBtn">Войти</button>
        <div class="switch-link">Нет аккаунта? <a id="showRegisterBtn">Зарегистрироваться</a></div>
        <div class="switch-link"><a id="forgotPasswordBtn">Забыли пароль?</a></div>
    </div>
    
    <!-- Форма регистрации -->
    <div id="registerForm" style="display: none;">
        <p class="subtitle">Создайте аккаунт</p>
        <div class="form-row">
            <label>📧 Email</label>
            <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
        <div class="form-row">
            <label>🔐 Пароль (мин. 6 символов)</label>
            <input type="password" id="regPassword" placeholder="••••••">
        </div>
        <div class="form-row">
            <label>🔐 Подтвердите пароль</label>
            <input type="password" id="regConfirmPassword" placeholder="••••••">
        </div>
        <button class="btn btn-primary" id="registerBtn">Зарегистрироваться</button>
        <div class="switch-link">Уже есть аккаунт? <a id="showLoginBtn">Войти</a></div>
    </div>
    
    <!-- Форма сброса пароля -->
    <div id="resetForm" style="display: none;">
        <p class="subtitle">Восстановление пароля</p>
        <div class="form-row">
            <label>📧 Email</label>
            <input type="email" id="resetEmail" placeholder="your@email.com">
        </div>
        <button class="btn btn-primary" id="sendResetBtn">Отправить письмо</button>
        <div class="switch-link"><a id="backToLoginBtn">← Вернуться ко входу</a></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    function showError(msg) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }
    
    function showSuccess(msg, redirect = false) {
        const successDiv = document.getElementById('successMessage');
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        if (redirect) {
            setTimeout(() => { window.location.href = redirect; }, 2000);
        } else {
            setTimeout(() => successDiv.style.display = 'none', 3000);
        }
    }
    
    // Переключение форм
    document.getElementById('showRegisterBtn').onclick = () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('resetForm').style.display = 'none';
    };
    
    document.getElementById('showLoginBtn').onclick = () => {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('resetForm').style.display = 'none';
    };
    
    document.getElementById('forgotPasswordBtn').onclick = () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('resetForm').style.display = 'block';
    };
    
    document.getElementById('backToLoginBtn').onclick = () => {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.getElementById('resetForm').style.display = 'none';
    };
    
    // Вход
    document.getElementById('loginBtn').onclick = async () => {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        
        if (!email || !password) {
            showError('Заполните все поля');
            return;
        }
        
        try {
            const result = await auth.signInWithEmailAndPassword(email, password);
            const user = result.user;
            
            // Проверяем, заполнен ли профиль
            const userDoc = await db.collection("users").doc(user.uid).get();
            const userData = userDoc.data();
            
            if (!userData || !userData.name) {
                // Неполный профиль — отправляем на дорегистрацию
                showSuccess('Вход выполнен! Перенаправление для завершения регистрации...', 'complete-profile.html');
            } else {
                showSuccess('Вход выполнен! Перенаправление...', 'index.html');
            }
        } catch (error) {
            let msg = 'Ошибка входа';
            if (error.code === 'auth/user-not-found') msg = 'Пользователь не найден';
            if (error.code === 'auth/wrong-password') msg = 'Неверный пароль';
            if (error.code === 'auth/invalid-email') msg = 'Неверный email';
            showError(msg);
        }
    };
    
    // Регистрация
    document.getElementById('registerBtn').onclick = async () => {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirmPassword').value;
        
        if (!email || !password) {
            showError('Заполните все поля');
            return;
        }
        if (password !== confirm) {
            showError('Пароли не совпадают');
            return;
        }
        if (password.length < 6) {
            showError('Пароль должен быть не менее 6 символов');
            return;
        }
        
        try {
            const result = await auth.createUserWithEmailAndPassword(email, password);
            const user = result.user;
            
            // Создаём базовую запись в Firestore
            await db.collection("users").doc(user.uid).set({
                uid: user.uid,
                email: email,
                name: "",
                phone: "",
                city: "",
                bio: "",
                role: "user",
                balance: 0,
                createdAt: new Date().toISOString(),
                rating: 0,
                completedDeals: 0
            });
            
            showSuccess('Регистрация успешна! Перенаправление для заполнения профиля...', 'complete-profile.html');
        } catch (error) {
            let msg = 'Ошибка регистрации';
            if (error.code === 'auth/email-already-in-use') msg = 'Email уже используется';
            if (error.code === 'auth/invalid-email') msg = 'Неверный email';
            showError(msg);
        }
    };
    
    // Сброс пароля
    document.getElementById('sendResetBtn').onclick = async () => {
        const email = document.getElementById('resetEmail').value.trim();
        if (!email) {
            showError('Введите email');
            return;
        }
        try {
            await auth.sendPasswordResetEmail(email);
            showSuccess('Письмо для сброса пароля отправлено на ' + email);
            setTimeout(() => document.getElementById('backToLoginBtn').click(), 3000);
        } catch (error) {
            showError('Ошибка: ' + error.message);
        }
    };
</script>
</body>
</html>
