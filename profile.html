<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль — Куки</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a0c; color: #ededee; }
        .header { background: rgba(11,11,14,0.95); border-bottom: 1px solid rgba(42,26,44,0.5); padding: 12px 24px; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .logo { font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .btn { padding: 8px 16px; border-radius: 40px; border: 1px solid #441d46; background: rgba(17,16,20,0.9); color: white; cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; font-size: 14px; transition: all 0.3s ease; }
        .btn-primary { background: linear-gradient(95deg, #b52b1a, #8a1c50); border: none; color: white; }
        .profile-container { max-width: 1400px; margin: 30px auto; padding: 0 24px; }
        .profile-layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .profile-sidebar { width: 280px; flex-shrink: 0; }
        .profile-menu { background: rgba(15,14,19,0.9); border-radius: 24px; border: 1px solid rgba(255,107,74,0.15); overflow: hidden; position: sticky; top: 90px; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: all 0.3s ease; border-left: 3px solid transparent; color: #a492b0; }
        .menu-item:hover { background: rgba(255,255,255,0.05); color: white; }
        .menu-item.active { background: linear-gradient(95deg, rgba(181,43,26,0.15), rgba(138,28,80,0.15)); border-left-color: #ff6b4a; color: #ff6b4a; }
        .menu-icon { font-size: 20px; width: 28px; }
        .menu-text { font-size: 14px; font-weight: 500; }
        .content-card { background: rgba(15,14,19,0.9); border-radius: 24px; border: 1px solid rgba(255,107,74,0.15); padding: 28px; margin-bottom: 24px; }
        .content-card h2 { font-size: 22px; margin-bottom: 24px; color: #ffcfbf; }
        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; margin-bottom: 8px; font-size: 13px; color: #a492b0; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 14px; background: #121114; border: 1px solid #2f2332; border-radius: 16px; color: white; outline: none; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .avatar-section { text-align: center; margin-bottom: 24px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: #1a1620; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 3px solid #ff6b4a; margin: 0 auto 12px; overflow: hidden; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .empty-state { text-align: center; padding: 40px; color: #a492b0; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar-small { width: 35px; height: 35px; border-radius: 50%; }
        @media (max-width: 768px) { .profile-sidebar { width: 100%; } .profile-menu { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; position: static; } .menu-item { padding: 10px 16px; border-left: none; border-radius: 40px; } .menu-item.active { background: linear-gradient(95deg, #b52b1a, #8a1c50); color: white; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="profile-container">
    <div class="profile-layout">
        <div class="profile-sidebar">
            <div class="profile-menu">
                <div class="menu-item active" data-tab="profile"><span class="menu-icon">👤</span><span class="menu-text">Мой профиль</span></div>
                <div class="menu-item" data-tab="listings"><span class="menu-icon">📋</span><span class="menu-text">Мои объявления</span></div>
                <div class="menu-item" data-tab="settings"><span class="menu-icon">⚙️</span><span class="menu-text">Настройки</span></div>
            </div>
        </div>
        
        <div class="profile-content">
            <div id="profileTab" class="tab-content active">
                <div class="content-card">
                    <h2>👤 Мой профиль</h2>
                    <div class="avatar-section"><div class="profile-avatar" id="profileAvatar">👤</div><button class="btn" id="changePhotoBtn">Сменить фото</button></div>
                    <div class="grid-2">
                        <div class="form-row"><label>Имя</label><input type="text" id="profileName"></div>
                        <div class="form-row"><label>Email</label><input type="email" id="profileEmail" readonly></div>
                        <div class="form-row"><label>Телефон</label><input type="tel" id="profilePhone"></div>
                        <div class="form-row"><label>Город</label><input type="text" id="profileCity"></div>
                    </div>
                    <button class="btn-primary" id="saveProfileBtn">💾 Сохранить</button>
                </div>
                <div class="content-card">
                    <h2>🔐 Смена пароля</h2>
                    <div class="grid-2">
                        <div class="form-row"><label>Текущий пароль</label><input type="password" id="currentPassword"></div>
                        <div class="form-row"><label>Новый пароль</label><input type="password" id="newPassword"></div>
                        <div class="form-row"><label>Повторите пароль</label><input type="password" id="confirmPassword"></div>
                    </div>
                    <button class="btn-primary" id="changePasswordBtn">🔄 Изменить пароль</button>
                </div>
            </div>
            
            <div id="listingsTab" class="tab-content">
                <div class="content-card"><h2>📋 Мои объявления</h2><div id="myListings"></div><a href="post-ad.html" class="btn-primary" style="margin-top:16px; display:inline-block;">➕ Создать</a></div>
            </div>
            
            <div id="settingsTab" class="tab-content">
                <div class="content-card">
                    <h2>⚙️ Настройки</h2>
                    <div class="form-row"><label>Тёмная тема</label><select id="themeSelect"><option value="dark">Тёмная</option><option value="light">Светлая</option></select></div>
                    <button class="btn" id="logoutAllBtn">🚪 Выйти из всех устройств</button>
                    <button class="btn" id="deleteAccountBtn" style="background:#7a1a2e; margin-top:12px;">🗑️ Удалить аккаунт</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        currentUser = user;
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar-small"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        await loadProfile();
        await loadListings();
    });
    
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            const tabId = item.dataset.tab;
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`${tabId}Tab`).classList.add('active');
        });
    });
    
    async function loadProfile() {
        const userDoc = await db.collection("users").doc(currentUser.uid).get();
        const data = userDoc.data() || {};
        document.getElementById('profileName').value = data.name || currentUser.displayName || '';
        document.getElementById('profileEmail').value = currentUser.email;
        document.getElementById('profilePhone').value = data.phone || '';
        document.getElementById('profileCity').value = data.city || '';
        const avatarDiv = document.getElementById('profileAvatar');
        if (data.photoURL || currentUser.photoURL) avatarDiv.innerHTML = `<img src="${data.photoURL || currentUser.photoURL}">`;
    }
    
    document.getElementById('saveProfileBtn').onclick = async () => {
        await db.collection("users").doc(currentUser.uid).update({
            name: document.getElementById('profileName').value,
            phone: document.getElementById('profilePhone').value,
            city: document.getElementById('profileCity').value
        });
        alert('✅ Профиль обновлён');
    };
    
    document.getElementById('changePasswordBtn').onclick = async () => {
        const current = document.getElementById('currentPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (!current || !newPass) { alert('Заполните все поля'); return; }
        if (newPass !== confirm) { alert('Пароли не совпадают'); return; }
        if (newPass.length < 6) { alert('Минимум 6 символов'); return; }
        try {
            const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, current);
            await currentUser.reauthenticateWithCredential(credential);
            await currentUser.updatePassword(newPass);
            alert('✅ Пароль изменён');
            document.getElementById('currentPassword').value = '';
            document.getElementById('newPassword').value = '';
            document.getElementById('confirmPassword').value = '';
        } catch (error) { alert('❌ Неверный текущий пароль'); }
    };
    
    async function loadListings() {
        const snapshot = await db.collection("listings").where("sellerId", "==", currentUser.uid).get();
        const listings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const container = document.getElementById('myListings');
        if (listings.length === 0) { container.innerHTML = '<div class="empty-state">У вас пока нет объявлений</div>'; return; }
        container.innerHTML = listings.map(ad => `<div style="padding:12px; border-bottom:1px solid #2d1e32;"><strong>${ad.title}</strong> - ${ad.price} ₽<br><small>${ad.status || 'active'}</small></div>`).join('');
    }
    
    document.getElementById('logoutAllBtn').onclick = async () => { await auth.signOut(); window.location.href = "login.html"; };
    document.getElementById('deleteAccountBtn').onclick = async () => { if(confirm('Удалить аккаунт навсегда?')) { await currentUser.delete(); window.location.href = "login.html"; } };
</script>
</body>
</html>
