<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой профиль — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .profile-layout { display: flex; gap: 30px; flex-wrap: wrap; }
        .profile-sidebar { width: 280px; flex-shrink: 0; }
        .profile-menu { background: white; border-radius: 24px; border: 1px solid #f0e6ff; overflow: hidden; position: sticky; top: 90px; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 14px 20px; cursor: pointer; transition: 0.3s; color: #666; border-left: 3px solid transparent; }
        .menu-item:hover { background: #f5f0ff; }
        .menu-item.active { background: linear-gradient(95deg, #f5f0ff, #fff5f8); border-left-color: #e84393; color: #e84393; }
        .profile-content { flex: 1; }
        .avatar-section { text-align: center; margin-bottom: 24px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #f5f0ff, #ffe6f0); display: flex; align-items: center; justify-content: center; font-size: 50px; margin: 0 auto 12px; border: 3px solid #e84393; overflow: hidden; cursor: pointer; }
        .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .stat-card { background: linear-gradient(135deg, #f5f0ff, #fff5f8); border-radius: 20px; padding: 20px; text-align: center; }
        .stat-value { font-size: 28px; font-weight: 800; color: #e84393; }
        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        @media (max-width: 768px) { .profile-sidebar { width: 100%; } .profile-menu { display: flex; flex-wrap: wrap; gap: 5px; padding: 10px; } .menu-item { width: auto; padding: 8px 16px; border-radius: 40px; border-left: none; } .menu-item.active { background: linear-gradient(135deg, #9b59b6, #e84393); color: white; } }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="main-wrapper" style="max-width:1400px; margin:30px auto; padding:0 24px;">
    <div class="profile-layout">
        <div class="profile-sidebar">
            <div class="profile-menu">
                <div class="menu-item active" data-tab="profile">👤 Мой профиль</div>
                <div class="menu-item" data-tab="listings">📋 Мои объявления</div>
                <div class="menu-item" data-tab="settings">⚙️ Настройки</div>
            </div>
        </div>
        <div class="profile-content">
            <div id="profileTab" class="tab-content active">
                <div class="content-card">
                    <h2>👤 Мой профиль</h2>
                    <div class="avatar-section">
                        <div class="profile-avatar" id="profileAvatar">👤</div>
                        <input type="file" id="avatarInput" accept="image/*" style="display:none">
                        <button class="btn" id="changePhotoBtn">Сменить фото</button>
                    </div>
                    <div class="grid-2">
                        <div class="form-row"><label>ФИО</label><input type="text" id="profileName"></div>
                        <div class="form-row"><label>Email</label><input type="email" id="profileEmail" readonly></div>
                        <div class="form-row"><label>Телефон</label><input type="tel" id="profilePhone"></div>
                        <div class="form-row"><label>Город</label><input type="text" id="profileCity"></div>
                    </div>
                    <button class="btn-primary" id="saveProfileBtn">💾 Сохранить</button>
                </div>
                <div class="content-card">
                    <h2>🔐 Смена пароля</h2>
                    <div class="grid-2">
                        <div class="form-row"><label>Текущий пароль</label><input type="password" id="currentPassword"></div>
                        <div class="form-row"><label>Новый пароль</label><input type="password" id="newPassword"></div>
                        <div class="form-row"><label>Подтверждение</label><input type="password" id="confirmPassword"></div>
                    </div>
                    <button class="btn-primary" id="changePasswordBtn">Изменить пароль</button>
                </div>
            </div>
            
            <div id="listingsTab" class="tab-content">
                <div class="content-card">
                    <h2>📋 Мои объявления</h2>
                    <div id="myListingsContainer" class="listings-grid"></div>
                </div>
            </div>
            
            <div id="settingsTab" class="tab-content">
                <div class="content-card">
                    <h2>⚙️ Настройки</h2>
                    <button class="btn" id="logoutAllBtn">🚪 Выйти из всех устройств</button>
                    <button class="btn-danger" id="deleteAccountBtn" style="margin-top:12px;">🗑️ Удалить аккаунт</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let currentUser = null;
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        currentUser = user;
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        await loadProfile();
        await loadMyListings();
    });
    
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            const tabId = item.dataset.tab;
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            item.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.getElementById(`${tabId}Tab`).classList.add('active');
        });
    });
    
    async function loadProfile() {
        const userDoc = await db.collection("users").doc(currentUser.uid).get();
        const data = userDoc.data() || {};
        document.getElementById('profileName').value = data.name || '';
        document.getElementById('profileEmail').value = currentUser.email;
        document.getElementById('profilePhone').value = data.phone || '';
        document.getElementById('profileCity').value = data.city || '';
        if (data.photoURL) document.getElementById('profileAvatar').innerHTML = `<img src="${data.photoURL}">`;
    }
    
    document.getElementById('changePhotoBtn').onclick = () => document.getElementById('avatarInput').click();
    document.getElementById('avatarInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = async () => {
            await db.collection("users").doc(currentUser.uid).update({ photoURL: reader.result });
            document.getElementById('profileAvatar').innerHTML = `<img src="${reader.result}">`;
        };
        reader.readAsDataURL(file);
    };
    
    document.getElementById('saveProfileBtn').onclick = async () => {
        await db.collection("users").doc(currentUser.uid).update({
            name: document.getElementById('profileName').value,
            phone: document.getElementById('profilePhone').value,
            city: document.getElementById('profileCity').value
        });
        alert('✅ Профиль обновлён');
    };
    
    document.getElementById('changePasswordBtn').onclick = async () => {
        const current = document.getElementById('currentPassword').value;
        const newPass = document.getElementById('newPassword').value;
        const confirm = document.getElementById('confirmPassword').value;
        if (!current || !newPass) { alert('Заполните поля'); return; }
        if (newPass !== confirm) { alert('Пароли не совпадают'); return; }
        try {
            const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, current);
            await currentUser.reauthenticateWithCredential(credential);
            await currentUser.updatePassword(newPass);
            alert('✅ Пароль изменён');
        } catch(e) { alert('Неверный текущий пароль'); }
    };
    
    async function loadMyListings() {
        const snapshot = await db.collection("listings").where("sellerId", "==", currentUser.uid).get();
        const listings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const container = document.getElementById('myListingsContainer');
        if (listings.length === 0) { container.innerHTML = '<div class="empty-state">У вас пока нет объявлений</div>'; return; }
        container.innerHTML = listings.map(ad => `
            <div class="listing-card" style="margin-bottom:16px;">
                <div class="listing-img" style="height:100px; width:100px;">${ad.image || '📦'}</div>
                <div><strong>${ad.title}</strong><br>${ad.price} ₽</div>
                <a href="post-ad.html?edit=${ad.id}" class="btn" style="padding:4px 12px;">✏️</a>
            </div>
        `).join('');
    }
    
    document.getElementById('logoutAllBtn').onclick = async () => { await auth.signOut(); window.location.href = "login.html"; };
    document.getElementById('deleteAccountBtn').onclick = async () => { if(confirm('Удалить аккаунт?')) { await currentUser.delete(); window.location.href = "login.html"; } };
</script>
</body>
</html>
