<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обработка платежа</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js">
    </script>
</head>
<body>
    <h1>Обработка платежа</h1>
    <pre id="log"></pre>

    <script>
        // ========================================
        // FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const db = firebase.firestore();

        // ========================================
        // КОНФИГУРАЦИЯ
        // ========================================
        const MNT_ID = '99389874';
        const MNT_INTEGRITY_CODE = '12345';

        const logEl = document.getElementById('log');

        function addLog(message) {
            logEl.textContent += message + '\n';
            console.log(message);
        }

        // ========================================
        // ПОЛУЧАЕМ ДАННЫЕ ИЗ URL
        // ========================================
        const urlParams = new URLSearchParams(window.location.search);

        const transactionId = urlParams.get('MNT_TRANSACTION_ID') || '';
        const amount = urlParams.get('MNT_AMOUNT') || '0';
        const operationId = urlParams.get('MNT_OPERATION_ID') || '';
        const subscriberId = urlParams.get('MNT_SUBSCRIBER_ID') || '';
        const testMode = urlParams.get('MNT_TEST_MODE') || '0';
        const signature = urlParams.get('MNT_SIGNATURE') || '';
        const currencyCode = urlParams.get('MNT_CURRENCY_CODE') || 'RUB';

        // ========================================
        // ЛОГИРУЕМ
        // ========================================
        addLog('📥 Получен запрос от PayAnyWay');
        addLog(`  MNT_TRANSACTION_ID: ${transactionId}`);
        addLog(`  MNT_AMOUNT: ${amount}`);
        addLog(`  MNT_OPERATION_ID: ${operationId}`);

        // ========================================
        // ПРОВЕРЯЕМ ПОДПИСЬ
        // ========================================
        const signatureData =
            MNT_ID +
            transactionId +
            operationId +
            amount +
            currencyCode +
            subscriberId +
            testMode +
            MNT_INTEGRITY_CODE;

        const expectedSignature = CryptoJS.MD5(signatureData).toString();

        if (signature !== expectedSignature) {
            addLog('❌ ПОДПИСЬ НЕ СОВПАДАЕТ!');
            document.body.innerHTML = `
                    <h1 style="color:red;">❌ Ошибка подписи</h1>
                    <pre>${logEl.textContent}</pre>
                `;
            return;
        }

        addLog('✅ ПОДПИСЬ ВЕРНА!');

        // ========================================
        // РАЗБИРАЕМ MNT_TRANSACTION_ID
        // ========================================
        const parts = transactionId.split('|');
        const userId = parts[1] || '';
        const parsedAmount = parseFloat(amount);

        addLog(`  userId: ${userId}`);
        addLog(`  parsedAmount: ${parsedAmount}`);

        // ========================================
        // ОБНОВЛЯЕМ БАЛАНС
        // ========================================
        async function processPayment() {
            try {
                if (userId && parsedAmount > 0) {
                    const userRef = db.collection("users").doc(userId);
                    const doc = await userRef.get();
                    const currentBalance = doc.exists ? doc.data().balance || 0 : 0;
                    const newBalance = currentBalance + parsedAmount;

                    await userRef.update({ balance: newBalance });

                    await db.collection("transactions").add({
                        userId: userId,
                        amount: parsedAmount,
                        description: 'Пополнение баланса через PayAnyWay',
                        status: 'completed',
                        transactionId: transactionId,
                        operationId: operationId,
                        createdAt: new Date().toISOString()
                    });

                    addLog('✅ Баланс обновлён!');
                }
            } catch (error) {
                addLog(`❌ Ошибка: ${error.message}`);
            }
        }

        // ========================================
        // ФОРМИРУЕМ ОТВЕТ ДЛЯ PAYANYWAY
        // ========================================
        // ✅ ВАЖНО! Добавляем номенклатуру для фискализации чека
        const productName = 'Пополнение баланса Куки';
        const productPrice = parseFloat(amount).toFixed(2);
        const productQuantity = 1;

        // Формируем XML ответ с номенклатурой
        const xmlResponse = `<?xml version="1.0" encoding="UTF-8"?>
        <MNT_RESPONSE>
            <MNT_ID>${MNT_ID}</MNT_ID>
            <MNT_TRANSACTION_ID>${transactionId}</MNT_TRANSACTION_ID>
            <MNT_RESULT_CODE>200</MNT_RESULT_CODE>
            <MNT_SIGNATURE>${CryptoJS.MD5('200' + MNT_ID + transactionId + MNT_INTEGRITY_CODE).toString()}</MNT_SIGNATURE>
            <MNT_ATTRIBUTES>
                <ATTRIBUTE>
                    <KEY>INVENTORY</KEY>
                    <VALUE>[{"name": "${productName}", "price": ${productPrice}, "quantity": ${productQuantity}, "vatTag": "none", "pm": "full_payment", "po": "service"}]</VALUE>
                </ATTRIBUTE>
                <ATTRIBUTE>
                    <KEY>CLIENT</KEY>
                    <VALUE>[{"email": "${subscriberId}"}]</VALUE>
                </ATTRIBUTE>
            </MNT_ATTRIBUTES>
        </MNT_RESPONSE>`;

        addLog('📤 Ответ PayAnyWay:');
        addLog(xmlResponse);

        // ========================================
        // ЗАПУСКАЕМ ОБРАБОТКУ И ОТВЕЧАЕМ
        // ========================================
        processPayment().then(() => {
            // Отправляем XML ответ
            document.body.innerHTML = `
                    <h1 style="color:green;">✅ Успешно!</h1>
                    <p>Баланс пополнен на ${parsedAmount} ₽</p>
                    <p>Пользователь: ${userId}</p>
                    <p>Операция: ${operationId}</p>
                    <pre>${logEl.textContent}</pre>
                    <hr>
                    <h3>📤 Ответ PayAnyWay (XML):</h3>
                    <pre style="background:#1a1625;padding:16px;border-radius:8px;overflow-x:auto;">${xmlResponse}</pre>
                `;

            // Если это callback-запрос, отправляем XML
            // PayAnyWay ожидает XML ответ
            if (window.location.search.includes('MNT_TRANSACTION_ID')) {
                document.write(xmlResponse);
            }
        }).catch(err => {
            addLog(`❌ Ошибка: ${err.message}`);
            document.body.innerHTML = `
                    <h1 style="color:red;">❌ Ошибка</h1>
                    <p>${err.message}</p>
                    <pre>${logEl.textContent}</pre>
                `;
        });

        addLog('✅ Обработка завершена');
    </script>
</body>
</html>
