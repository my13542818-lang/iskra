<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>История просмотров — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .history-container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 24px;
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            flex-wrap: wrap;
            gap: 12px;
        }
        .history-header h1 {
            font-size: 24px;
            font-weight: 700;
        }
        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .history-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: var(--transition);
        }
        .history-card:hover {
            transform: translateY(-5px);
            border-color: var(--secondary);
            box-shadow: var(--shadow-md);
        }
        .history-card .image {
            height: 180px;
            background: var(--bg-input);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            overflow: hidden;
        }
        .history-card .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .history-card .info {
            padding: 14px 16px;
        }
        .history-card .info .title {
            font-weight: 600;
            font-size: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .history-card .info .price {
            color: var(--secondary);
            font-weight: 700;
            font-size: 18px;
            margin-top: 4px;
        }
        .history-card .info .meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 4px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            grid-column: 1/-1;
        }
        .empty-state .icon {
            font-size: 64px;
            display: block;
            margin-bottom: 16px;
        }
        .empty-state h3 {
            font-size: 22px;
            margin-bottom: 8px;
        }
        .empty-state p {
            color: var(--text-muted);
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
        }
        .btn-danger {
            background: linear-gradient(135deg, #E74C3C, #C0392B);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: var(--radius-full);
            cursor: pointer;
            font-weight: 600;
            transition: var(--transition);
        }
        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(231, 76, 60, 0.4);
        }

        @media (max-width: 600px) {
            .history-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 400px) {
            .history-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- ===== HEADER ===== -->
    <header class="header">
        <div class="header-container">
            <a href="index.html" class="logo">🍪 Куки</a>
            <div class="header-actions" id="headerActions">
                <div class="loading-spinner" style="width:24px;height:24px;margin:0;"></div>
            </div>
        </div>
    </header>

    <!-- ===== HISTORY ===== -->
    <div class="history-container">
        <div class="history-header">
            <h1>👁️ История просмотров</h1>
            <button class="btn-danger" id="clearHistory">🗑️ Очистить</button>
        </div>
        <div id="historyList" class="history-grid">
            <div class="loading-spinner"></div>
        </div>
        <a href="index.html" class="back-link btn btn-secondary">← Вернуться на главную</a>
    </div>

    <script>
        // ========================================
        // FIREBASE
        // ========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
            authDomain: "kyki-5e91a.firebaseapp.com",
            projectId: "kyki-5e91a",
            storageBucket: "kyki-5e91a.firebasestorage.app",
            messagingSenderId: "315986487804",
            appId: "1:315986487804:web:29f131e8a57bffadac2a79",
            measurementId: "G-ETWXCGL9HK"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

        const auth = firebase.auth();
        const db = firebase.firestore();

        // ========================================
        // DOM REFS
        // ========================================
        const headerActions = document.getElementById('headerActions');
        const historyList = document.getElementById('historyList');

        // ========================================
        // AUTH
        // ========================================
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                window.location.href = 'login.html';
                return;
            }

            const doc = await db.collection("users").doc(user.uid).get();
            const data = doc.data() || {};

            headerActions.innerHTML = `
                <div class="balance-badge" onclick="window.location.href='wallet.html'">💰 ${(data.balance || 0).toLocaleString()} ₽</div>
                <a href="cart.html" class="btn btn-secondary btn-sm">🛒</a>
                <div class="header-user" onclick="window.location.href='profile/index.html'">
                    <img src="${data.photoURL || 'https://ui-avatars.com/api/?name=' + (data.name || 'User') + '&background=6C3B8E&color=fff'}" class="avatar">
                    <span class="name">${data.name?.split(' ')[0] || 'Профиль'}</span>
                </div>
            `;

            await loadHistory();
        });

        // ========================================
        // LOAD HISTORY
        // ========================================
        async function loadHistory() {
            const container = historyList;
            const history = JSON.parse(localStorage.getItem('viewHistory') || '[]');

            if (history.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">👁️</span>
                        <h3>Нет истории</h3>
                        <p>Просматривайте товары и они появятся здесь</p>
                        <a href="index.html" class="btn btn-primary" style="margin-top:16px;">🛍️ Начать покупки</a>
                    </div>
                `;
                return;
            }

            const listings = [];
            for (const id of history) {
                try {
                    const doc = await db.collection("listings").doc(id).get();
                    if (doc.exists) {
                        listings.push({ id: doc.id, ...doc.data() });
                    }
                } catch (e) {
                    console.warn('Listing not found:', id);
                }
            }

            if (listings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <span class="icon">📭</span>
                        <h3>Товары не найдены</h3>
                        <p>Возможно, они были удалены</p>
                        <button class="btn btn-secondary" onclick="localStorage.removeItem('viewHistory'); location.reload();" style="margin-top:16px;">🔄 Очистить историю</button>
                    </div>
                `;
                return;
            }

            container.innerHTML = listings.map(item => `
                <div class="history-card" onclick="window.location.href='product.html?id=${item.id}'">
                    <div class="image">
                        ${item.mediaFiles && item.mediaFiles.length > 0
                            ? `<img src="${item.mediaFiles[0].url}" alt="${escapeHtml(item.title)}" loading="lazy">`
                            : item.image && item.image.startsWith('http')
                                ? `<img src="${item.image}" alt="${escapeHtml(item.title)}" loading="lazy">`
                                : '📦'
                        }
                    </div>
                    <div class="info">
                        <div class="title">${escapeHtml(item.title)}</div>
                        <div class="price">${Number(item.price).toLocaleString()} ₽</div>
                        <div class="meta">📍 ${escapeHtml(item.location || 'Не указан')} • 👁️ ${item.views || 0}</div>
                    </div>
                </div>
            `).join('');
        }

        // ========================================
        // CLEAR HISTORY
        // ========================================
        document.getElementById('clearHistory').onclick = () => {
            if (confirm('Очистить историю просмотров?')) {
                localStorage.removeItem('viewHistory');
                loadHistory();
                showNotification('✅ История очищена', 'success');
            }
        };

        // ========================================
        // NOTIFICATIONS
        // ========================================
        function showNotification(message, type = 'info') {
            document.querySelectorAll('.notification').forEach(el => el.remove());

            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transform = 'translateX(100px)';
                setTimeout(() => notification.remove(), 300);
            }, 3500);
        }

        // ========================================
        // UTILITY
        // ========================================
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>"]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m]));
        }
    </script>
</body>
</html>
