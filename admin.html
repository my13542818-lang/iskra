<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .admin-container { max-width: 1600px; margin: 24px auto; padding: 0 24px; }
        .admin-title { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #9b59b6, #e84393); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: white; border-radius: 24px; padding: 20px; text-align: center; border: 1px solid #f0e6ff; }
        .stat-value { font-size: 28px; font-weight: 800; color: #e84393; }
        .stat-label { color: #b8a9d4; margin-top: 8px; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; border-bottom: 1px solid #f0e6ff; padding-bottom: 12px; }
        .admin-tab { padding: 10px 24px; background: white; border: 1px solid #e8d5f5; border-radius: 40px; cursor: pointer; color: #9b59b6; transition: all 0.3s ease; }
        .admin-tab:hover { background: #f8f4ff; }
        .admin-tab.active { background: linear-gradient(135deg, #9b59b6, #e84393); color: white; border-color: transparent; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-table { background: white; border-radius: 20px; overflow-x: auto; border: 1px solid #f0e6ff; }
        .admin-table table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 14px; text-align: left; border-bottom: 1px solid #f0e6ff; }
        .admin-table th { background: #f8f4ff; color: #9b59b6; font-weight: 600; }
        .admin-table tr:hover { background: #f8f4ff; }
        .btn-small { padding: 4px 12px; border-radius: 20px; font-size: 12px; cursor: pointer; border: none; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-warning { background: #f0ad4e; color: #000; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(45,27,78,0.9); backdrop-filter: blur(10px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 32px; padding: 32px; max-width: 500px; width: 90%; border: 2px solid #e84393; }
        .close-modal { float: right; font-size: 24px; cursor: pointer; color: #b8a9d4; }
        .form-control { width: 100%; padding: 12px; border: 1px solid #e8d5f5; border-radius: 16px; outline: none; }
        .form-row { margin-bottom: 16px; }
        .form-row label { display: block; margin-bottom: 6px; color: #6c5b7b; font-weight: 500; }
        @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }
        .status-badge { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 11px; }
        .status-completed { background: #2ecc71; color: white; }
        .status-pending { background: #f0ad4e; color: #000; }
        .status-rejected { background: #e74c3c; color: white; }
        .header { background: white; border-bottom: 1px solid #f0e6ff; padding: 12px 0; position: sticky; top: 0; z-index: 100; }
        .header-container { max-width: 1600px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; color: #9b59b6; text-decoration: none; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; border: 2px solid #e84393; }
        .btn { padding: 8px 20px; border-radius: 40px; border: 1px solid #e8d5f5; background: white; cursor: pointer; color: #9b59b6; transition: all 0.3s ease; }
        .btn:hover { background: #f8f4ff; }
        .btn-primary { padding: 12px 32px; border-radius: 40px; border: none; background: linear-gradient(135deg, #9b59b6, #e84393); color: white; cursor: pointer; font-weight: 600; transition: all 0.3s ease; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(232,67,147,0.3); }
        #userActions { display: flex; align-items: center; gap: 16px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ ADMIN</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="admin-container">
    <h1 class="admin-title">🔧 Панель управления</h1>
    
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card"><div class="stat-value" id="statUsers">0</div><div class="stat-label">👥 Пользователей</div></div>
        <div class="stat-card"><div class="stat-value" id="statListings">0</div><div class="stat-label">📦 Объявлений</div></div>
        <div class="stat-card"><div class="stat-value" id="statOrders">0</div><div class="stat-label">🛒 Заказов</div></div>
        <div class="stat-card"><div class="stat-value" id="statWithdrawals">0</div><div class="stat-label">💳 Заявок на вывод</div></div>
        <div class="stat-card"><div class="stat-value" id="statRevenue">0 ₽</div><div class="stat-label">💰 Выручка</div></div>
    </div>
    
    <div class="admin-tabs">
        <button class="admin-tab active" data-tab="users">👥 Пользователи</button>
        <button class="admin-tab" data-tab="listings">📦 Объявления</button>
        <button class="admin-tab" data-tab="orders">🛒 Заказы</button>
        <button class="admin-tab" data-tab="withdrawals">💳 Выводы</button>
        <button class="admin-tab" data-tab="support">🎫 Поддержка</button>
        <button class="admin-tab" data-tab="settings">⚙️ Настройки</button>
    </div>
    
    <!-- Пользователи -->
    <div id="usersTab" class="tab-content active">
        <div class="admin-table">
            <table>
                <thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Баланс</th><th>Роль</th><th>Действия</th></tr></thead>
                <tbody id="usersTable"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Объявления -->
    <div id="listingsTab" class="tab-content">
        <div class="admin-table">
            <table>
                <thead><tr><th>Название</th><th>Продавец</th><th>Цена</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody id="listingsTable"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Заказы -->
    <div id="ordersTab" class="tab-content">
        <div class="admin-table">
            <table>
                <thead><tr><th>Товар</th><th>Покупатель</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr></thead>
                <tbody id="ordersTable"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Выводы средств -->
    <div id="withdrawalsTab" class="tab-content">
        <div class="admin-table">
            <table>
                <thead><tr><th>ID</th><th>Пользователь</th><th>Сумма</th><th>Метод</th><th>Реквизиты</th><th>Статус</th><th>Дата</th><th>Действия</th></tr></thead>
                <tbody id="withdrawalsTable"></tbody>
            </table>
        </div>
    </div>
    
    <!-- Техподдержка -->
    <div id="supportTab" class="tab-content">
        <div class="admin-table">
            <div style="padding:40px; text-align:center;">Нет обращений</div>
        </div>
    </div>
    
    <!-- Настройки -->
    <div id="settingsTab" class="tab-content">
        <div class="admin-table" style="padding:24px;">
            <h3>⚙️ Настройки</h3>
            <div class="form-row"><label>Комиссия платформы (%)</label><input type="number" id="siteCommission" class="form-control" value="5"></div>
            <div class="form-row"><label>Минимальная сумма вывода</label><input type="number" id="minWithdrawal" class="form-control" value="500"></div>
            <button class="btn-primary" id="saveSettingsBtn">💾 Сохранить</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    // --- Tabs ---
    document.querySelectorAll('.admin-tab').forEach(tab => {
        tab.addEventListener('click', function() {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            document.getElementById(this.dataset.tab + 'Tab').classList.add('active');
        });
    });
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        const userDoc = await db.collection("users").doc(user.uid).get();
        if (userDoc.data()?.role !== 'admin') {
            document.body.innerHTML = '<div style="text-align:center; padding:50px;"><h2>⛔ Доступ запрещён</h2><a href="index.html" class="btn-primary">На главную</a></div>';
            return;
        }
        document.getElementById('userActions').innerHTML = `
            <div class="user-info">
                <img src="${user.photoURL || ''}" class="user-avatar" onerror="this.style.display='none'">
                <span>👑 ${user.displayName || 'Admin'}</span>
            </div>
            <button class="btn" id="logoutBtn">Выйти</button>
        `;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        await loadAllData();
    });
    
    async function loadAllData() {
        await loadUsers();
        await loadListings();
        await loadOrders();
        await loadWithdrawals();
        await loadStats();
    }
    
    async function loadUsers() {
        const snapshot = await db.collection("users").get();
        const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id.substring(0,12)}...</td>
                <td>${u.name || '-'}</td>
                <td>${u.email || '-'}</td>
                <td>${(u.balance || 0).toLocaleString()} ₽</td>
                <td>
                    <select class="user-role" data-id="${u.id}">
                        <option value="user" ${u.role === 'user' ? 'selected' : ''}>user</option>
                        <option value="admin" ${u.role === 'admin' ? 'selected' : ''}>admin</option>
                        <option value="moderator" ${u.role === 'moderator' ? 'selected' : ''}>moderator</option>
                        <option value="banned" ${u.role === 'banned' ? 'selected' : ''}>banned</option>
                    </select>
                </td>
                <td>
                    <button class="btn-small btn-success edit-balance" data-id="${u.id}" data-balance="${u.balance || 0}">💰 Баланс</button>
                    <button class="btn-small btn-danger delete-user" data-id="${u.id}">🗑️</button>
                </td>
            </tr>
        `).join('');
        
        document.querySelectorAll('.user-role').forEach(select => {
            select.onchange = async () => {
                await db.collection("users").doc(select.dataset.id).update({ role: select.value });
                alert('✅ Роль обновлена');
            };
        });
        document.querySelectorAll('.delete-user').forEach(btn => {
            btn.onclick = async () => {
                if(confirm('Удалить пользователя?')) {
                    await db.collection("users").doc(btn.dataset.id).delete();
                    loadAllData();
                }
            };
        });
        document.querySelectorAll('.edit-balance').forEach(btn => {
            btn.onclick = () => openBalanceModal(btn.dataset.id, btn.dataset.balance);
        });
    }
    
    async function loadListings() {
        const snapshot = await db.collection("listings").get();
        const listings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('listingsTable');
        if (listings.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Нет объявлений</td></tr>';
            return;
        }
        tbody.innerHTML = listings.map(l => `
            <tr>
                <td>${l.title || 'Без названия'}</td>
                <td>${l.sellerName || l.sellerId || '-'}</td>
                <td>${(l.price || 0).toLocaleString()} ₽</td>
                <td><span class="status-badge ${l.status === 'active' ? 'status-completed' : 'status-pending'}">${l.status || 'active'}</span></td>
                <td>
                    <button class="btn-small btn-warning toggle-listing" data-id="${l.id}" data-status="${l.status || 'active'}">${l.status === 'active' ? '🔒 Снять' : '✅ Активировать'}</button>
                    <button class="btn-small btn-danger delete-listing" data-id="${l.id}">🗑️</button>
                </td>
            </tr>
        `).join('');
        
        document.querySelectorAll('.toggle-listing').forEach(btn => {
            btn.onclick = async () => {
                const newStatus = btn.dataset.status === 'active' ? 'inactive' : 'active';
                await db.collection("listings").doc(btn.dataset.id).update({ status: newStatus });
                loadAllData();
            };
        });
        document.querySelectorAll('.delete-listing').forEach(btn => {
            btn.onclick = async () => {
                if(confirm('Удалить объявление?')) {
                    await db.collection("listings").doc(btn.dataset.id).delete();
                    loadAllData();
                }
            };
        });
    }
    
    async function loadOrders() {
        const snapshot = await db.collection("orders").get();
        const orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('ordersTable');
        if (orders.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">Нет заказов</td></tr>';
            return;
        }
        tbody.innerHTML = orders.map(o => `
            <tr>
                <td>${o.listingTitle || o.listingId || '-'}</td>
                <td>${o.buyerName || o.buyerId || '-'}</td>
                <td>${(o.total || 0).toLocaleString()} ₽</td>
                <td><span class="status-badge ${o.status === 'completed' ? 'status-completed' : o.status === 'rejected' ? 'status-rejected' : 'status-pending'}">${o.status || 'pending'}</span></td>
                <td>
                    ${o.status === 'pending' ? `
                        <button class="btn-small btn-success approve-order" data-id="${o.id}">✅</button>
                        <button class="btn-small btn-danger reject-order" data-id="${o.id}">❌</button>
                    ` : '-'}
                </td>
            </tr>
        `).join('');
        
        document.querySelectorAll('.approve-order').forEach(btn => {
            btn.onclick = async () => {
                await db.collection("orders").doc(btn.dataset.id).update({ status: 'completed' });
                loadAllData();
            };
        });
        document.querySelectorAll('.reject-order').forEach(btn => {
            btn.onclick = async () => {
                await db.collection("orders").doc(btn.dataset.id).update({ status: 'rejected' });
                loadAllData();
            };
        });
    }
    
    async function loadWithdrawals() {
        const snapshot = await db.collection("withdrawals").get();
        const withdrawals = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('withdrawalsTable');
        if (withdrawals.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;">Нет заявок на вывод</td></tr>';
            return;
        }
        tbody.innerHTML = withdrawals.map(w => `
            <tr>
                <td>${w.id.substring(0,8)}...</td>
                <td>${w.userName || w.userId || '-'}</td>
                <td>${(w.amount || 0).toLocaleString()} ₽</td>
                <td>${w.method || '-'}</td>
                <td>${w.details || '-'}</td>
                <td><span class="status-badge ${w.status === 'completed' ? 'status-completed' : w.status === 'rejected' ? 'status-rejected' : 'status-pending'}">${w.status || 'pending'}</span></td>
                <td>${w.createdAt ? new Date(w.createdAt).toLocaleDateString() : '-'}</td>
                <td>
                    ${w.status === 'pending' ? `
                        <button class="btn-small btn-success approve-withdrawal" data-id="${w.id}">✅</button>
                        <button class="btn-small btn-danger reject-withdrawal" data-id="${w.id}">❌</button>
                    ` : '-'}
                </td>
            </tr>
        `).join('');
        
        document.querySelectorAll('.approve-withdrawal').forEach(btn => {
            btn.onclick = async () => {
                const withdrawalRef = db.collection("withdrawals").doc(btn.dataset.id);
                const withdrawal = await withdrawalRef.get();
                const data = withdrawal.data();
                await withdrawalRef.update({ status: 'completed' });
                // Обновляем баланс пользователя (вычитаем сумму)
                const userRef = db.collection("users").doc(data.userId);
                const user = await userRef.get();
                await userRef.update({ balance: (user.data()?.balance || 0) - data.amount });
                loadAllData();
                alert('✅ Вывод одобрен');
            };
        });
        document.querySelectorAll('.reject-withdrawal').forEach(btn => {
            btn.onclick = async () => {
                const withdrawalRef = db.collection("withdrawals").doc(btn.dataset.id);
                const withdrawal = await withdrawalRef.get();
                const data = withdrawal.data();
                await withdrawalRef.update({ status: 'rejected' });
                // Возвращаем деньги пользователю
                const userRef = db.collection("users").doc(data.userId);
                const user = await userRef.get();
                await userRef.update({ balance: (user.data()?.balance || 0) + data.amount });
                loadAllData();
                alert('❌ Вывод отклонён, средства возвращены');
            };
        });
    }
    
    async function loadStats() {
        const usersSnapshot = await db.collection("users").get();
        const listingsSnapshot = await db.collection("listings").get();
        const ordersSnapshot = await db.collection("orders").get();
        const withdrawalsSnapshot = await db.collection("withdrawals").get();
        
        document.getElementById('statUsers').textContent = usersSnapshot.size;
        document.getElementById('statListings').textContent = listingsSnapshot.size;
        document.getElementById('statOrders').textContent = ordersSnapshot.size;
        document.getElementById('statWithdrawals').textContent = withdrawalsSnapshot.size;
        
        let revenue = 0;
        ordersSnapshot.forEach(doc => {
            const data = doc.data();
            if (data.status === 'completed') revenue += (data.total || 0);
        });
        document.getElementById('statRevenue').textContent = revenue.toLocaleString() + ' ₽';
    }
    
    // --- Balance Modal ---
    function openBalanceModal(userId, currentBalance) {
        const modalHtml = `
            <div id="balanceModal" class="modal-overlay">
                <div class="modal-content">
                    <span class="close-modal" onclick="closeBalanceModal()">&times;</span>
                    <h3>💰 Управление балансом</h3>
                    <div class="form-row">
                        <label>Текущий баланс: ${Number(currentBalance).toLocaleString()} ₽</label>
                    </div>
                    <div class="form-row">
                        <label>Сумма изменения</label>
                        <input type="number" id="balanceChange" class="form-control" placeholder="Введите сумму">
                    </div>
                    <div class="form-row">
                        <label>Действие</label>
                        <select id="balanceAction" class="form-control">
                            <option value="add">➕ Добавить</option>
                            <option value="subtract">➖ Вычесть</option>
                            <option value="set">🎯 Установить</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>Причина</label>
                        <input type="text" id="balanceReason" class="form-control" placeholder="Причина изменения">
                    </div>
                    <div style="display:flex; gap:12px; margin-top:24px;">
                        <button class="btn" onclick="closeBalanceModal()">Отмена</button>
                        <button class="btn-primary" id="saveBalanceBtn">💾 Сохранить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        document.getElementById('saveBalanceBtn').onclick = async () => {
            const amount = parseInt(document.getElementById('balanceChange').value);
            const action = document.getElementById('balanceAction').value;
            const reason = document.getElementById('balanceReason').value || 'Ручное изменение';
            
            if (!amount || amount <= 0) { alert('Введите корректную сумму'); return; }
            
            const userRef = db.collection("users").doc(userId);
            const userDoc = await userRef.get();
            const currentBalance = userDoc.data()?.balance || 0;
            let newBalance;
            let description;
            
            switch(action) {
                case 'add':
                    newBalance = currentBalance + amount;
                    description = `+${amount} ₽ (${reason})`;
                    break;
                case 'subtract':
                    if (currentBalance < amount) { alert('Недостаточно средств'); return; }
                    newBalance = currentBalance - amount;
                    description = `-${amount} ₽ (${reason})`;
                    break;
                case 'set':
                    newBalance = amount;
                    description = `Установлен баланс: ${amount} ₽ (${reason})`;
                    break;
            }
            
            await userRef.update({ balance: newBalance });
            await db.collection("transactions").add({
                userId: userId,
                amount: newBalance - currentBalance,
                description: description,
                status: 'completed',
                createdAt: new Date().toISOString()
            });
            
            alert('✅ Баланс обновлён!');
            closeBalanceModal();
            loadAllData();
        };
    }
    
    function closeBalanceModal() {
        const modal = document.getElementById('balanceModal');
        if (modal) modal.remove();
    }
    
    // Настройки
    document.getElementById('saveSettingsBtn')?.addEventListener('click', async () => {
        const commission = document.getElementById('siteCommission').value;
        const minWithdrawal = document.getElementById('minWithdrawal').value;
        await db.collection("settings").doc("platform").set({
            commission: parseFloat(commission),
            minWithdrawal: parseFloat(minWithdrawal),
            updatedAt: new Date().toISOString()
        });
        alert('✅ Настройки сохранены!');
    });
</script>
</body>
</html>
