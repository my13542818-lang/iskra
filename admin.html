<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — Куки</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a0c; color: white; }
        .header { background: #0b0b0e; border-bottom: 1px solid #2a1a2c; padding: 12px 20px; }
        .header-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .btn { padding: 8px 16px; border-radius: 40px; border: 1px solid #441d46; background: #111014; color: white; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #ac2f3a; border-color: #d44545; }
        .admin-container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
        .admin-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 25px; }
        .admin-stat-card { background: #0f0e13; border-radius: 16px; padding: 15px; text-align: center; border: 1px solid #2d1e32; }
        .admin-stat-value { font-size: 28px; font-weight: 800; color: #ff6b4a; }
        .admin-tabs { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; border-bottom: 1px solid #2a1a2c; padding-bottom: 10px; }
        .admin-tab { padding: 8px 20px; background: #121114; border: 1px solid #2f2332; border-radius: 40px; cursor: pointer; }
        .admin-tab.active { background: #ac2f3a; }
        .admin-table { background: #0f0e13; border-radius: 16px; overflow-x: auto; border: 1px solid #2d1e32; }
        .admin-table table { width: 100%; border-collapse: collapse; }
        .admin-table th, .admin-table td { padding: 12px; text-align: left; border-bottom: 1px solid #2a1a2c; }
        .admin-table th { background: #1a1620; color: #ffcfbf; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .admin-action-btn { padding: 4px 10px; border-radius: 20px; border: none; cursor: pointer; margin: 2px; font-size: 12px; }
        .admin-delete { background: #7a1a2e; color: white; }
        .admin-edit { background: #2a4b7a; color: white; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .modal-content { background: #0f0e13; border-radius: 32px; padding: 32px; max-width: 500px; width: 90%; border: 1px solid #b6474a; }
        .form-row { margin-bottom: 16px; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 12px; background: #121114; border: 1px solid #2f2332; border-radius: 20px; color: white; outline: none; }
        .ticket-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-open { background: #f0ad4e; color: #000; }
        .status-in-progress { background: #5bc0de; color: #000; }
        .status-resolved { background: #5cb85c; color: #000; }
        .status-closed { background: #d9534f; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ ADMIN</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="admin-container">
    <div class="admin-stats" id="adminStats">
        <div class="admin-stat-card"><div class="admin-stat-value" id="totalUsers">0</div><div>Пользователей</div></div>
        <div class="admin-stat-card"><div class="admin-stat-value" id="totalListings">0</div><div>Объявлений</div></div>
        <div class="admin-stat-card"><div class="admin-stat-value" id="totalOrders">0</div><div>Заказов</div></div>
        <div class="admin-stat-card"><div class="admin-stat-value" id="totalTickets">0</div><div>Активных тикетов</div></div>
    </div>
    
    <div class="admin-tabs">
        <button class="admin-tab active" data-tab="users">👥 Пользователи</button>
        <button class="admin-tab" data-tab="listings">📦 Объявления</button>
        <button class="admin-tab" data-tab="orders">🛒 Заказы</button>
        <button class="admin-tab" data-tab="support">🎧 Техподдержка</button>
    </div>
    
    <div id="usersTab" class="tab-content active">
        <div class="admin-table"><table><thead><tr><th>ID</th><th>Имя</th><th>Email</th><th>Роль</th><th>Действия</th></tr></thead><tbody id="usersTable"></tbody></table></div>
    </div>
    <div id="listingsTab" class="tab-content">
        <div class="admin-table"><table><thead><tr><th>Название</th><th>Продавец</th><th>Цена</th><th>Статус</th><th>Действия</th></tr></thead><tbody id="listingsTable"></tbody></table></div>
    </div>
    <div id="ordersTab" class="tab-content">
        <div class="admin-table"><table><thead><tr><th>Товар</th><th>Покупатель</th><th>Сумма</th><th>Статус</th><th>Действия</th></tr></thead><tbody id="ordersTable"></tbody></table></div>
    </div>
    <div id="supportTab" class="tab-content">
        <div class="admin-table"><table><thead><tr><th>№</th><th>Пользователь</th><th>Тема</th><th>Статус</th><th>Действия</th></tr></thead><tbody id="ticketsTable"></tbody></table></div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentAdmin = null;
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        
        // Проверяем роль администратора
        const userDoc = await db.collection("users").doc(user.uid).get();
        const userData = userDoc.data();
        
        if (userData?.role !== 'admin') {
            document.body.innerHTML = '<div style="text-align:center; padding:50px;"><h2>⛔ Доступ запрещён</h2><a href="index.html" class="btn btn-primary">На главную</a></div>';
            return;
        }
        
        currentAdmin = user;
        
        document.getElementById('userActions').innerHTML = `
            <div class="user-info">
                <img src="${user.photoURL || ''}" class="user-avatar">
                <span>👑 ${user.displayName}</span>
            </div>
            <button class="btn" id="logoutBtn">Выйти</button>
        `;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = 'index.html');
        
        await loadAllData();
    });
    
    async function loadAllData() {
        await loadUsers();
        await loadListings();
        await loadOrders();
        await loadTickets();
        updateStats();
    }
    
    async function loadUsers() {
        const snapshot = await db.collection("users").get();
        const users = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = users.map(u => `
            <tr>
                <td>${u.id.substring(0,12)}...</td>
                <td>${u.name || '—'}</td>
                <td>${u.email || '—'}</td>
                <td><select class="admin-action-btn" data-user="${u.id}" data-role><option value="user" ${u.role === 'user' ? 'selected' : ''}>user</option><option value="admin" ${u.role === 'admin' ? 'selected' : ''}>admin</option><option value="banned" ${u.role === 'banned' ? 'selected' : ''}>banned</option></select></td>
                <td><button class="admin-action-btn admin-delete" onclick="deleteUser('${u.id}')">🗑️</button></td>
            </tr>
        `).join('');
        
        document.querySelectorAll('[data-role]').forEach(select => {
            select.onchange = async () => {
                await db.collection("users").doc(select.dataset.user).update({ role: select.value });
                await loadUsers();
            };
        });
    }
    
    async function loadListings() {
        const snapshot = await db.collection("listings").get();
        const listings = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('listingsTable');
        tbody.innerHTML = listings.map(l => `
            <tr>
                <td>${l.title || '—'}</td>
                <td>${l.sellerName || '—'}</td>
                <td>${l.price || 0} ₽</td>
                <td><select class="admin-action-btn" data-listing="${l.id}" data-lstatus><option value="active" ${l.status === 'active' ? 'selected' : ''}>active</option><option value="blocked" ${l.status === 'blocked' ? 'selected' : ''}>blocked</option><option value="sold" ${l.status === 'sold' ? 'selected' : ''}>sold</option></select></td>
                <td><button class="admin-action-btn admin-delete" onclick="deleteListing('${l.id}')">🗑️</button></td>
            </tr>
        `).join('');
        
        document.querySelectorAll('[data-lstatus]').forEach(select => {
            select.onchange = async () => {
                await db.collection("listings").doc(select.dataset.listing).update({ status: select.value });
                await loadListings();
            };
        });
    }
    
    async function loadOrders() {
        const snapshot = await db.collection("orders").orderBy("createdAt", "desc").get();
        const orders = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('ordersTable');
        tbody.innerHTML = orders.map(o => `
            <tr>
                <td>${o.listingTitle || '—'}</td>
                <td>${o.buyerName || '—'}</td>
                <td>${o.price || 0} ₽</td>
                <td><span class="ticket-status status-${o.status}">${o.status}</span></td>
                <td><button class="admin-action-btn admin-edit" onclick="updateOrder('${o.id}', 'completed')">✅ Завершить</button></td>
            </tr>
        `).join('');
    }
    
    async function loadTickets() {
        const snapshot = await db.collection("support_tickets").orderBy("createdAt", "desc").get();
        const tickets = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        const tbody = document.getElementById('ticketsTable');
        if (tickets.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5">Нет обращений</td></tr>';
            return;
        }
        tbody.innerHTML = tickets.map(t => `
            <tr>
                <td>#${t.id.substring(0,8)}</td>
                <td>${t.userName}<br><small>${t.userEmail}</small></td>
                <td><strong>${t.subject}</strong><br><small>${t.message.substring(0,50)}...</small></td>
                <td><span class="ticket-status status-${t.status}">${t.status === 'open' ? '🟡 Открыт' : t.status === 'in-progress' ? '🔵 В работе' : t.status === 'resolved' ? '🟢 Решён' : '⚫ Закрыт'}</span></td>
                <td><button class="admin-action-btn admin-edit" onclick="openTicketModal('${t.id}', '${t.userId}', '${t.subject}', '${t.message}', '${t.status}')">✏️ Ответить</button></td>
            </tr>
        `).join('');
    }
    
    async function updateStats() {
        const users = (await db.collection("users").get()).size;
        const listings = (await db.collection("listings").get()).size;
        const orders = (await db.collection("orders").get()).size;
        const tickets = (await db.collection("support_tickets").where("status", "in", ["open", "in-progress"]).get()).size;
        
        document.getElementById('totalUsers').textContent = users;
        document.getElementById('totalListings').textContent = listings;
        document.getElementById('totalOrders').textContent = orders;
        document.getElementById('totalTickets').textContent = tickets;
    }
    
    window.deleteUser = async (id) => {
        if(confirm('Удалить пользователя?')) {
            await db.collection("users").doc(id).delete();
            await loadUsers();
            await updateStats();
        }
    };
    
    window.deleteListing = async (id) => {
        if(confirm('Удалить объявление?')) {
            await db.collection("listings").doc(id).delete();
            await loadListings();
            await updateStats();
        }
    };
    
    window.updateOrder = async (orderId, status) => {
        await db.collection("orders").doc(orderId).update({ status: status, updatedAt: new Date().toISOString() });
        await loadOrders();
        alert('Статус заказа обновлён');
    };
    
    window.openTicketModal = (ticketId, userId, subject, message, currentStatus) => {
        const modalHtml = `
            <div id="ticketModal" class="modal-overlay">
                <div class="modal-content">
                    <h3>🎧 Ответ на тикет #${ticketId.substring(0,8)}</h3>
                    <div style="background:#1a1620; border-radius:16px; padding:16px; margin:16px 0;">
                        <strong>Тема:</strong> ${subject}<br>
                        <strong>Сообщение:</strong><br>${message}
                    </div>
                    <div class="form-row"><label>Ответ администратора</label><textarea id="adminResponse" rows="4"></textarea></div>
                    <div class="form-row"><label>Изменить статус</label>
                        <select id="ticketStatus">
                            <option value="open" ${currentStatus === 'open' ? 'selected' : ''}>🟡 Открыт</option>
                            <option value="in-progress" ${currentStatus === 'in-progress' ? 'selected' : ''}>🔵 В работе</option>
                            <option value="resolved" ${currentStatus === 'resolved' ? 'selected' : ''}>🟢 Решён</option>
                            <option value="closed" ${currentStatus === 'closed' ? 'selected' : ''}>⚫ Закрыт</option>
                        </select>
                    </div>
                    <div style="display:flex; gap:12px; margin-top:24px;">
                        <button class="btn" id="closeTicketModal">Отмена</button>
                        <button class="btn-primary" id="sendTicketResponse">📨 Отправить</button>
                    </div>
                </div>
            </div>
        `;
        document.body.insertAdjacentHTML('beforeend', modalHtml);
        
        document.getElementById('closeTicketModal').onclick = () => document.getElementById('ticketModal').remove();
        document.getElementById('sendTicketResponse').onclick = async () => {
            const response = document.getElementById('adminResponse').value;
            const newStatus = document.getElementById('ticketStatus').value;
            if (!response.trim()) { alert('Введите ответ'); return; }
            
            await db.collection("support_tickets").doc(ticketId).update({
                adminResponse: response,
                status: newStatus,
                adminRespondedAt: new Date().toISOString(),
                updatedAt: new Date().toISOString()
            });
            
            await db.collection("notifications").add({
                userId: userId,
                message: `Ответ на тикет #${ticketId.substring(0,8)}: ${response.substring(0,100)}`,
                type: "ticket",
                linkId: ticketId,
                read: false,
                createdAt: new Date().toISOString()
            });
            
            alert('✅ Ответ отправлен');
            document.getElementById('ticketModal').remove();
            await loadTickets();
        };
    };
    
    // Вкладки
    const tabs = document.querySelectorAll('.admin-tab');
    tabs.forEach(tab => {
        tab.onclick = () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(`${tab.dataset.tab}Tab`).classList.add('active');
        };
    });
</script>
</body>
</html>
