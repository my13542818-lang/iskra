<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать объявление — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .post-container { max-width: 700px; margin: 30px auto; padding: 0 24px; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <div id="userActions"></div>
    </div>
</div>
<div class="post-container">
    <div class="content-card">
        <h2 id="formTitle">📢 Создать объявление</h2>
        <div id="errorMsg" class="error-message" style="display:none; background:#f8d7da; color:#721c24; padding:12px; border-radius:12px; margin-bottom:16px;"></div>
        <div class="form-row"><label>Название</label><input type="text" id="title"></div>
        <div class="form-row"><label>Цена (₽)</label><input type="number" id="price"></div>
        <div class="form-row"><label>Категория</label>
            <select id="category"><option value="электроника">📱 Электроника</option><option value="одежда">👕 Одежда</option><option value="авто">🚗 Авто</option><option value="недвижимость">🏠 Недвижимость</option><option value="для дома">🛋️ Для дома</option><option value="спорт">⚽ Спорт</option><option value="игрушки">🧸 Игрушки</option><option value="услуги">🔧 Услуги</option></select>
        </div>
        <div class="form-row"><label>Состояние</label><select id="condition"><option value="new">✨ Новое</option><option value="used">🔄 Б/У</option></select></div>
        <div class="form-row"><label>Город</label><input type="text" id="location"></div>
        <div class="form-row"><label>Описание</label><textarea id="description" rows="4"></textarea></div>
        <div class="form-row"><label>Ссылка на фото</label><input type="text" id="imageUrl" placeholder="https://example.com/photo.jpg"></div>
        <button class="btn-primary" id="submitBtn" style="width:100%; padding:14px;">📤 Опубликовать</button>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    let editingId = null;
    const urlParams = new URLSearchParams(window.location.search);
    const editId = urlParams.get('edit');
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        if (editId) {
            editingId = editId;
            document.getElementById('formTitle').innerHTML = '✏️ Редактировать объявление';
            document.getElementById('submitBtn').innerHTML = '💾 Сохранить';
            await loadListing();
        }
    });
    
    async function loadListing() {
        const doc = await db.collection("listings").doc(editingId).get();
        if (doc.exists) {
            const data = doc.data();
            document.getElementById('title').value = data.title;
            document.getElementById('price').value = data.price;
            document.getElementById('category').value = data.category;
            document.getElementById('condition').value = data.condition;
            document.getElementById('location').value = data.location || '';
            document.getElementById('description').value = data.description || '';
            document.getElementById('imageUrl').value = data.imageUrl || '';
        }
    }
    
    document.getElementById('submitBtn').onclick = async () => {
        const title = document.getElementById('title').value.trim();
        const price = parseInt(document.getElementById('price').value);
        if (!title || !price) { alert('Заполните название и цену'); return; }
        const data = {
            title, price, category: document.getElementById('category').value,
            condition: document.getElementById('condition').value,
            location: document.getElementById('location').value || 'Не указан',
            description: document.getElementById('description').value,
            image: document.getElementById('imageUrl').value || '📦',
            imageUrl: document.getElementById('imageUrl').value,
            status: 'active', views: 0
        };
        if (editingId) {
            await db.collection("listings").doc(editingId).update({ ...data, updatedAt: new Date().toISOString() });
            alert('✅ Обновлено!');
            window.location.href = 'profile.html';
        } else {
            data.sellerId = auth.currentUser.uid;
            data.sellerName = auth.currentUser.displayName;
            data.createdAt = new Date().toISOString();
            await db.collection("listings").add(data);
            alert('✅ Опубликовано!');
            window.location.href = 'index.html';
        }
    };
</script>
</body>
</html>
