<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Куки</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a0c; color: white; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #0f0e13; border-radius: 32px; padding: 40px; max-width: 450px; width: 90%; border: 1px solid #b6474a; text-align: center; }
        .form-row { margin-bottom: 20px; text-align: left; }
        .form-row label { display: block; margin-bottom: 8px; font-size: 14px; color: #a492b0; }
        .form-row input { width: 100%; padding: 14px; background: #121114; border: 1px solid #2f2332; border-radius: 24px; color: white; font-size: 16px; outline: none; }
        .btn-primary { background: #ac2f3a; color: white; width: 100%; padding: 14px; border: none; border-radius: 40px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .btn-primary:hover { background: #c13a44; }
        .test-numbers { background: #1a1620; padding: 15px; border-radius: 16px; margin-top: 20px; font-size: 12px; }
        .test-numbers code { display: block; background: #0a0a0c; padding: 8px; margin-top: 8px; border-radius: 8px; color: #ff6b4a; }
        .error-msg { background: #d9534f; padding: 10px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .success-msg { background: #5cb85c; padding: 10px; border-radius: 10px; margin-bottom: 20px; display: none; }
        .divider { text-align: center; margin: 20px 0; position: relative; }
        .divider::before { content: ""; position: absolute; top: 50%; left: 0; right: 0; height: 1px; background: #2d1e32; }
        .divider span { background: #0f0e13; padding: 0 15px; position: relative; color: #a492b0; font-size: 13px; }
    </style>
</head>
<body>

<div class="auth-card">
    <h2>🍪 КУКИ</h2>
    <p style="color: #a492b0; margin: 10px 0 20px;">Вход по номеру телефона</p>
    
    <div id="errorMsg" class="error-msg"></div>
    <div id="successMsg" class="success-msg"></div>
    
    <div id="phoneView">
        <div class="form-row">
            <label>📱 Номер телефона</label>
            <input type="tel" id="phoneNumber" placeholder="+1 650-555-3434" value="+1 650-555-3434">
        </div>
        <button class="btn-primary" id="sendCodeBtn">📨 Отправить код</button>
    </div>
    
    <div id="codeView" style="display: none;">
        <div class="form-row">
            <label>🔐 Код подтверждения</label>
            <input type="text" id="verificationCode" placeholder="6-значный код">
        </div>
        <button class="btn-primary" id="verifyCodeBtn">✅ Войти</button>
        <button id="backBtn" style="margin-top: 15px; background: none; border: none; color: #a492b0; cursor: pointer;">← Назад</button>
        <div id="codeTimer" style="color: #ff6b4a; font-size: 12px; margin-top: 15px;"></div>
    </div>
    
    <div class="divider"><span>или</span></div>
    
    <button id="googleBtn" style="background: #111014; border: 1px solid #441d46; color: white; width: 100%; padding: 14px; border-radius: 40px; cursor: pointer; font-size: 16px;">📧 Войти через Google</button>
    
    <div class="test-numbers">
        📌 <strong>Тестовые номера (SMS не требуется):</strong>
        <code>+1 650-555-3434 → код 123456</code>
        <code>+7 999 1234567 → код 123456</code>
    </div>
</div>

<div id="recaptcha-container"></div>

<script type="module">
    import { auth, db, RecaptchaVerifier, signInWithPhoneNumber, signInWithGoogle, doc, getDoc, setDoc } from './firebase-config.js';

    let confirmationResult = null;
    let recaptchaVerifier = null;
    let timerInterval = null;
    let resendTimeout = 60;

    const errorDiv = document.getElementById('errorMsg');
    const successDiv = document.getElementById('successMsg');
    const phoneView = document.getElementById('phoneView');
    const codeView = document.getElementById('codeView');

    function showError(msg) {
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }

    function showSuccess(msg) {
        successDiv.textContent = msg;
        successDiv.style.display = 'block';
        setTimeout(() => successDiv.style.display = 'none', 3000);
    }

    // Инициализация reCAPTCHA
    function initRecaptcha() {
        if (recaptchaVerifier) return;
        try {
            recaptchaVerifier = new RecaptchaVerifier(auth, 'recaptcha-container', {
                'size': 'invisible'
            });
            console.log('✅ reCAPTCHA инициализирована');
        } catch (e) {
            console.error(e);
        }
    }

    // Отправка кода
    document.getElementById('sendCodeBtn').onclick = async () => {
        let phone = document.getElementById('phoneNumber').value.trim();
        if (!phone) { showError('Введите номер телефона'); return; }
        if (!phone.startsWith('+')) phone = '+' + phone;
        
        try {
            initRecaptcha();
            showSuccess('📨 Отправка кода...');
            const result = await signInWithPhoneNumber(auth, phone, recaptchaVerifier);
            confirmationResult = result;
            showSuccess('✅ Код отправлен!');
            phoneView.style.display = 'none';
            codeView.style.display = 'block';
            startTimer();
        } catch (error) {
            console.error(error);
            let msg = error.message;
            if (error.code === 'auth/operation-not-allowed') {
                msg = '❌ Вход по телефону не включён в Firebase Console';
            } else if (error.code === 'auth/billing-not-enabled') {
                msg = '❌ Требуется привязать платёжный аккаунт. Используйте тестовые номера!';
            }
            showError(msg);
        }
    };
    
    // ============ ПОДТВЕРЖДЕНИЕ КОДА + ПЕРЕНАПРАВЛЕНИЕ ============
    document.getElementById('verifyCodeBtn').onclick = async () => {
        const code = document.getElementById('verificationCode').value.trim();
        
        if (!code || code.length !== 6) {
            showError('Введите 6-значный код');
            return;
        }
        
        try {
            const result = await confirmationResult.confirm(code);
            console.log('✅ Успешный вход:', result.user);
            
            // Сохраняем пользователя в Firestore
            const userRef = doc(db, "users", result.user.uid);
            const userSnap = await getDoc(userRef);
            
            if (!userSnap.exists()) {
                await setDoc(userRef, {
                    uid: result.user.uid,
                    name: result.user.phoneNumber,
                    email: result.user.email || null,
                    phone: result.user.phoneNumber,
                    role: "user",
                    createdAt: new Date().toISOString(),
                    rating: 0,
                    completedDeals: 0
                });
            }
            
            // Сохраняем в localStorage для быстрого доступа
            localStorage.setItem("currentUser", JSON.stringify({
                uid: result.user.uid,
                name: result.user.phoneNumber,
                email: result.user.email,
                phone: result.user.phoneNumber
            }));
            
            showSuccess('✅ Вход выполнен! Перенаправление...');
            
            // ПЕРЕНАПРАВЛЕНИЕ НА ГЛАВНУЮ
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1000);
            
        } catch (error) {
            console.error('❌ Ошибка подтверждения:', error);
            showError('Неверный код подтверждения');
        }
    };
    
    // Таймер
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        const timerDiv = document.getElementById('codeTimer');
        resendTimeout = 60;
        timerInterval = setInterval(() => {
            if (resendTimeout <= 0) {
                clearInterval(timerInterval);
                timerDiv.innerHTML = '';
            } else {
                timerDiv.innerHTML = `⏱️ Повторная отправка через ${resendTimeout} сек`;
                resendTimeout--;
            }
        }, 1000);
    }
    
    // Назад
    document.getElementById('backBtn').onclick = () => {
        codeView.style.display = 'none';
        phoneView.style.display = 'block';
        if (timerInterval) clearInterval(timerInterval);
    };
    
    // Вход через Google
    document.getElementById('googleBtn').onclick = async () => {
        await signInWithGoogle();
    };
</script>
</body>
</html>
