<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Завершение регистрации — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .complete-container { max-width: 600px; margin: 50px auto; padding: 0 24px; }
        .avatar-section { text-align: center; margin-bottom: 24px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: linear-gradient(135deg, #f5f0ff, #ffe6f0); display: flex; align-items: center; justify-content: center; font-size: 50px; margin: 0 auto 12px; border: 3px solid #e84393; cursor: pointer; overflow: hidden; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <div id="userActions"></div>
    </div>
</div>
<div class="complete-container">
    <div class="content-card">
        <h2>🍪 Завершите регистрацию</h2>
        <div class="avatar-section">
            <div class="profile-avatar" id="profileAvatar">👤</div>
            <input type="file" id="avatarInput" accept="image/*" style="display:none">
            <button class="btn" id="changePhotoBtn">Сменить фото</button>
        </div>
        <div class="form-row"><label>ФИО *</label><input type="text" id="fullName" placeholder="Иванов Иван Иванович"></div>
        <div class="form-row"><label>Телефон *</label><input type="tel" id="phone" placeholder="+7 XXX XXX XX XX"></div>
        <div class="form-row"><label>Город *</label><input type="text" id="city" placeholder="Москва"></div>
        <div class="form-row"><label>О себе</label><textarea id="bio" rows="3" placeholder="Расскажите о себе..."></textarea></div>
        <button class="btn-primary" id="saveBtn" style="width:100%;">✅ Сохранить и продолжить</button>
    </div>
</div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
    });
    
    document.getElementById('changePhotoBtn').onclick = () => document.getElementById('avatarInput').click();
    document.getElementById('avatarInput').onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onloadend = async () => {
            await db.collection("users").doc(auth.currentUser.uid).update({ photoURL: reader.result });
            document.getElementById('profileAvatar').innerHTML = `<img src="${reader.result}">`;
        };
        reader.readAsDataURL(file);
    };
    
    document.getElementById('saveBtn').onclick = async () => {
        const name = document.getElementById('fullName').value;
        const phone = document.getElementById('phone').value;
        const city = document.getElementById('city').value;
        const bio = document.getElementById('bio').value;
        if (!name || !phone || !city) { alert('Заполните обязательные поля'); return; }
        await db.collection("users").doc(auth.currentUser.uid).update({ name, phone, city, bio, profileCompleted: true });
        window.location.href = "index.html";
    };
</script>
</body>
</html>
