<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Завершение регистрации — Куки</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body {
            background: linear-gradient(135deg, #0a0a0c 0%, #1a0a2e 50%, #0a0a0c 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .profile-card {
            background: rgba(15,14,19,0.9);
            backdrop-filter: blur(20px);
            border-radius: 48px;
            padding: 48px;
            max-width: 550px;
            width: 100%;
            border: 1px solid rgba(255,107,74,0.3);
        }
        h1 { font-size: 28px; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-align: center; margin-bottom: 24px; }
        .subtitle { color: #a492b0; text-align: center; margin-bottom: 32px; font-size: 14px; }
        .form-row { margin-bottom: 20px; }
        .form-row label { display: block; margin-bottom: 8px; font-size: 13px; color: #a492b0; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 14px 16px; background: #121114; border: 1px solid #2f2332; border-radius: 60px; color: white; font-size: 16px; outline: none; transition: all 0.3s ease; }
        .form-row input:focus, .form-row select:focus { border-color: #ff6b4a; box-shadow: 0 0 0 3px rgba(255,107,74,0.2); }
        .avatar-section { text-align: center; margin-bottom: 24px; }
        .profile-avatar { width: 100px; height: 100px; border-radius: 50%; background: #1a1620; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 3px solid #ff6b4a; margin: 0 auto 12px; overflow: hidden; cursor: pointer; }
        .btn { width: 100%; padding: 14px; border-radius: 60px; font-size: 16px; font-weight: bold; cursor: pointer; border: none; transition: all 0.3s ease; margin-top: 10px; }
        .btn-primary { background: linear-gradient(95deg, #b52b1a, #8a1c50); color: white; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(255,107,74,0.5); }
        .error-message { background: #d9534f; padding: 12px; border-radius: 12px; margin-bottom: 20px; display: none; text-align: center; }
    </style>
</head>
<body>

<div class="profile-card">
    <h1>🍪 Завершите регистрацию</h1>
    <p class="subtitle">Расскажите о себе</p>
    
    <div id="errorMessage" class="error-message"></div>
    
    <div class="avatar-section">
        <div class="profile-avatar" id="profileAvatar">👤</div>
        <button class="btn" id="changePhotoBtn" style="background: #111014; border: 1px solid #3a253e; margin-top: 8px;">Сменить фото</button>
    </div>
    
    <div class="form-row">
        <label>👤 ФИО *</label>
        <input type="text" id="fullName" placeholder="Иванов Иван Иванович">
    </div>
    
    <div class="form-row">
        <label>📞 Телефон *</label>
        <input type="tel" id="phone" placeholder="+7 XXX XXX XX XX">
    </div>
    
    <div class="form-row">
        <label>📍 Город *</label>
        <input type="text" id="city" placeholder="Москва, Санкт-Петербург...">
    </div>
    
    <div class="form-row">
        <label>📝 О себе</label>
        <textarea id="bio" rows="3" placeholder="Расскажите о себе, чем занимаетесь..."></textarea>
    </div>
    
    <button class="btn btn-primary" id="saveProfileBtn">✅ Сохранить и продолжить</button>
    <button class="btn" id="skipBtn" style="background: #111014; border: 1px solid #3a253e;">Пропустить (заполню позже)</button>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    let currentUser = null;
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = "login.html";
            return;
        }
        currentUser = user;
        
        // Загружаем существующие данные (если есть)
        const userDoc = await db.collection("users").doc(user.uid).get();
        const data = userDoc.data() || {};
        
        if (data.name) {
            document.getElementById('fullName').value = data.name;
        }
        if (data.phone) {
            document.getElementById('phone').value = data.phone;
        }
        if (data.city) {
            document.getElementById('city').value = data.city;
        }
        if (data.bio) {
            document.getElementById('bio').value = data.bio;
        }
        if (data.photoURL) {
            document.getElementById('profileAvatar').innerHTML = `<img src="${data.photoURL}" style="width:100%;height:100%;object-fit:cover;">`;
        }
    });
    
    function showError(msg) {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.textContent = msg;
        errorDiv.style.display = 'block';
        setTimeout(() => errorDiv.style.display = 'none', 5000);
    }
    
    document.getElementById('saveProfileBtn').onclick = async () => {
        const name = document.getElementById('fullName').value.trim();
        const phone = document.getElementById('phone').value.trim();
        const city = document.getElementById('city').value.trim();
        const bio = document.getElementById('bio').value.trim();
        
        if (!name) {
            showError('Введите ФИО');
            return;
        }
        if (!phone) {
            showError('Введите номер телефона');
            return;
        }
        if (!city) {
            showError('Введите город');
            return;
        }
        
        try {
            await db.collection("users").doc(currentUser.uid).update({
                name: name,
                phone: phone,
                city: city,
                bio: bio,
                profileCompleted: true,
                updatedAt: new Date().toISOString()
            });
            
            window.location.href = "index.html";
        } catch (error) {
            showError('Ошибка сохранения: ' + error.message);
        }
    };
    
    document.getElementById('skipBtn').onclick = async () => {
        await db.collection("users").doc(currentUser.uid).update({
            profileCompleted: false,
            updatedAt: new Date().toISOString()
        });
        window.location.href = "index.html";
    };
    
    // Смена фото (через URL)
    document.getElementById('changePhotoBtn').onclick = () => {
        const url = prompt('Введите URL фото (ссылка на изображение):');
        if (url && url.startsWith('http')) {
            document.getElementById('profileAvatar').innerHTML = `<img src="${url}" style="width:100%;height:100%;object-fit:cover;">`;
            db.collection("users").doc(currentUser.uid).update({ photoURL: url });
        } else if (url) {
            alert('Введите корректный URL (начинается с http:// или https://)');
        }
    };
</script>
</body>
</html>
