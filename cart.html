<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Корзина — Куки</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        .cart-container { max-width: 1000px; margin: 30px auto; padding: 0 24px; }
        .cart-item { display: flex; gap: 20px; background: white; border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #f0e6ff; align-items: center; flex-wrap: wrap; }
        .cart-item-img { width: 80px; height: 80px; background: #f5f0ff; border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .cart-item-info { flex: 1; }
        .cart-item-title { font-weight: 600; }
        .cart-item-price { color: #e84393; font-weight: bold; }
        .total-card { background: white; border-radius: 24px; padding: 24px; text-align: right; margin-top: 20px; border: 1px solid #f0e6ff; }
        .total-amount { font-size: 32px; font-weight: 800; color: #e84393; }
        .delivery-form { background: white; border-radius: 24px; padding: 24px; margin-top: 20px; border: 1px solid #f0e6ff; }
    </style>
</head>
<body>
<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <a href="index.html" class="btn">🏠 На главную</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="cart-container">
    <h1 style="margin-bottom: 24px;">🛒 Корзина</h1>
    <div id="cartItems"></div>
    <div id="cartTotal" class="total-card" style="display:none;">
        <p>Итого: <span class="total-amount" id="totalAmount">0</span> ₽</p>
        <button class="btn-primary" id="checkoutBtn" style="margin-top:16px;">✅ Оформить заказ</button>
    </div>
    <div id="deliveryForm" class="delivery-form" style="display:none;">
        <h3>🚚 Доставка</h3>
        <div class="form-row"><label>ФИО</label><input type="text" id="recipientName"></div>
        <div class="form-row"><label>Адрес</label><input type="text" id="deliveryAddress"></div>
        <div class="form-row"><label>Компания</label><select id="deliveryCompany"><option>СДЭК</option><option>Почта России</option><option>Boxberry</option></select></div>
        <div class="form-row"><label>Телефон</label><input type="tel" id="contactPhone"></div>
        <button class="btn-primary" id="confirmOrderBtn">✅ Подтвердить заказ</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        document.getElementById('userActions').innerHTML = `<div class="user-info"><img src="${user.photoURL || ''}" class="user-avatar"><span>${user.displayName?.split(' ')[0] || 'User'}</span></div><button class="btn" id="logoutBtn">Выйти</button>`;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = "login.html");
        await loadCart();
    });
    
    let cart = [];
    async function loadCart() {
        cart = JSON.parse(localStorage.getItem('cart') || '[]');
        const container = document.getElementById('cartItems');
        const totalDiv = document.getElementById('cartTotal');
        const deliveryForm = document.getElementById('deliveryForm');
        if (cart.length === 0) { container.innerHTML = '<div class="empty-state"><h3>🛒 Корзина пуста</h3><a href="index.html" class="btn-primary" style="margin-top:16px;">Перейти к покупкам</a></div>'; totalDiv.style.display = 'none'; return; }
        let total = 0;
        let itemsHtml = '';
        for (const item of cart) {
            const doc = await db.collection("listings").doc(item.id).get();
            if (doc.exists) {
                const ad = doc.data();
                total += ad.price;
                itemsHtml += `<div class="cart-item"><div class="cart-item-img">${ad.image || '📦'}</div><div class="cart-item-info"><div class="cart-item-title">${ad.title}</div><div class="cart-item-price">${ad.price} ₽</div></div><button class="btn-danger remove-item" data-id="${item.id}" style="padding:4px 12px;">🗑️</button></div>`;
            }
        }
        container.innerHTML = itemsHtml;
        document.getElementById('totalAmount').innerHTML = total.toLocaleString();
        totalDiv.style.display = 'block';
        deliveryForm.style.display = 'block';
        document.querySelectorAll('.remove-item').forEach(btn => { btn.onclick = () => { cart = cart.filter(i => i.id !== btn.dataset.id); localStorage.setItem('cart', JSON.stringify(cart)); loadCart(); }; });
    }
    
    document.getElementById('confirmOrderBtn').onclick = async () => {
        const name = document.getElementById('recipientName').value;
        const address = document.getElementById('deliveryAddress').value;
        const company = document.getElementById('deliveryCompany').value;
        const phone = document.getElementById('contactPhone').value;
        if (!name || !address || !phone) { alert('Заполните все поля'); return; }
        alert('✅ Заказ оформлен! Спасибо за покупку!');
        localStorage.removeItem('cart');
        window.location.href = 'index.html';
    };
</script>
</body>
</html>
