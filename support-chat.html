<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чат поддержки — Куки</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: system-ui, sans-serif; }
        body { background: #0a0a0c; color: white; }
        .header { background: #0b0b0e; border-bottom: 1px solid #2a1a2c; padding: 12px 20px; }
        .header-container { max-width: 800px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 800; background: linear-gradient(135deg, #ff3b2f, #b02ce6); -webkit-background-clip: text; background-clip: text; color: transparent; text-decoration: none; }
        .btn { padding: 8px 16px; border-radius: 40px; border: 1px solid #441d46; background: #111014; color: white; cursor: pointer; text-decoration: none; }
        .btn-primary { background: #ac2f3a; border-color: #d44545; }
        .main-container { max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .messages-container { height: 500px; overflow-y: auto; background: #0f0e13; border-radius: 20px; padding: 20px; border: 1px solid #2d1e32; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .message { max-width: 70%; padding: 10px 16px; border-radius: 20px; }
        .message.user { background: #1a1620; align-self: flex-start; }
        .message.admin { background: #ac2f3a; align-self: flex-end; }
        .input-area { display: flex; gap: 12px; background: #0f0e13; border-radius: 60px; padding: 8px 16px; border: 1px solid #2d1e32; }
        .input-area input { flex: 1; background: transparent; border: none; color: white; outline: none; padding: 10px 0; }
        .input-area button { background: #ac2f3a; border: none; padding: 8px 20px; border-radius: 40px; color: white; cursor: pointer; }
        .empty-state { text-align: center; padding: 40px; color: #a492b0; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        .ticket-info { background: #1a1620; border-radius: 16px; padding: 16px; margin-bottom: 20px; }
        .ticket-status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
        .status-open { background: #f0ad4e; color: #000; }
        .status-in-progress { background: #5bc0de; color: #000; }
        .status-resolved { background: #5cb85c; color: #000; }
        .status-closed { background: #d9534f; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-container">
        <a href="index.html" class="logo">🍪 КУКИ</a>
        <div id="userActions"></div>
    </div>
</div>

<div class="main-container">
    <div id="chatContent">
        <div class="empty-state">Загрузка...</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBLN8XTBFl8cKWfnjsc0h_2ZSuZeKc7dhQ",
        authDomain: "kyki-5e91a.firebaseapp.com",
        projectId: "kyki-5e91a",
        storageBucket: "kyki-5e91a.firebasestorage.app",
        messagingSenderId: "315986487804",
        appId: "1:315986487804:web:29f131e8a57bffadac2a79",
        measurementId: "G-ETWXCGL9HK"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const auth = firebase.auth();
    const db = firebase.firestore();
    
    const urlParams = new URLSearchParams(window.location.search);
    const ticketId = urlParams.get('ticketId');
    
    let currentUser = null;
    let isAdmin = false;
    
    auth.onAuthStateChanged(async (user) => {
        if (!user) {
            window.location.href = 'index.html';
            return;
        }
        
        currentUser = user;
        
        // Проверяем, админ ли
        const userDoc = await db.collection("users").doc(user.uid).get();
        isAdmin = userDoc.data()?.role === 'admin';
        
        document.getElementById('userActions').innerHTML = `
            <div class="user-info">
                <img src="${user.photoURL || ''}" class="user-avatar">
                <span>${user.displayName?.split(' ')[0] || 'User'}</span>
            </div>
            <a href="index.html" class="btn">🏠</a>
            <button class="btn" id="logoutBtn">🚪</button>
        `;
        document.getElementById('logoutBtn').onclick = () => auth.signOut().then(() => window.location.href = 'index.html');
        
        if (ticketId) {
            await loadTicket();
            loadMessages();
        } else {
            document.getElementById('chatContent').innerHTML = '<div class="empty-state">Не указан тикет</div>';
        }
    });
    
    async function loadTicket() {
        const ticketDoc = await db.collection("support_tickets").doc(ticketId).get();
        if (!ticketDoc.exists) {
            document.getElementById('chatContent').innerHTML = '<div class="empty-state">Тикет не найден</div>';
            return;
        }
        
        const ticket = ticketDoc.data();
        const statusClass = ticket.status === 'open' ? 'status-open' : ticket.status === 'in-progress' ? 'status-in-progress' : ticket.status === 'resolved' ? 'status-resolved' : 'status-closed';
        const statusText = ticket.status === 'open' ? '🟡 Открыт' : ticket.status === 'in-progress' ? '🔵 В работе' : ticket.status === 'resolved' ? '🟢 Решён' : '⚫ Закрыт';
        
        document.getElementById('chatContent').innerHTML = `
            <div class="ticket-info">
                <strong>📋 Тикет #${ticketId.substring(0,8)}</strong>
                <div>Тема: ${ticket.subject}</div>
                <div class="ticket-status ${statusClass}">${statusText}</div>
            </div>
            <div id="messagesContainer" class="messages-container">
                <div class="empty-state">Загрузка сообщений...</div>
            </div>
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="Введите сообщение...">
                <button id="sendBtn">➤</button>
            </div>
        `;
        
        document.getElementById('sendBtn').onclick = sendMessage;
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    }
    
    async function sendMessage() {
        const input = document.getElementById('messageInput');
        const text = input.value.trim();
        if (!text) return;
        
        await db.collection("support_messages").add({
            ticketId: ticketId,
            senderId: currentUser.uid,
            senderName: currentUser.displayName,
            senderRole: isAdmin ? 'admin' : 'user',
            message: text,
            timestamp: new Date().toISOString()
        });
        
        await db.collection("support_tickets").doc(ticketId).update({
            lastMessage: text,
            lastMessageTime: new Date().toISOString(),
            updatedAt: new Date().toISOString(),
            status: isAdmin ? 'in-progress' : 'open'
        });
        
        input.value = '';
    }
    
    function loadMessages() {
        db.collection("support_messages")
            .where("ticketId", "==", ticketId)
            .orderBy("timestamp", "asc")
            .onSnapshot((snapshot) => {
                const messages = snapshot.docs.map(doc => doc.data());
                const container = document.getElementById('messagesContainer');
                
                if (messages.length === 0) {
                    container.innerHTML = '<div class="empty-state">Нет сообщений</div>';
                    return;
                }
                
                container.innerHTML = messages.map(msg => `
                    <div class="message ${msg.senderRole === 'admin' ? 'admin' : 'user'}">
                        <div><strong>${msg.senderName} ${msg.senderRole === 'admin' ? '👑' : ''}</strong></div>
                        <div>${escapeHtml(msg.message)}</div>
                        <div style="font-size: 10px; color: #666;">${msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString() : ''}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            });
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
</script>
</body>
</html>
